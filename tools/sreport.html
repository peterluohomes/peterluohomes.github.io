<style>
  :root {
    --navy: #1B365D;
    --navy-dark: #122440;
    --gold: #C5A55A;
    --gold-light: #D4BA7A;
    --gold-bg: #FAF6EE;
    --cream: #FDFBF7;
    --light-navy: #EDF1F7;
    --white: #FFFFFF;
    --gray-800: #333333;
    --gray-600: #666666;
    --gray-400: #999999;
    --gray-200: #E5E5E5;
    --gray-100: #F5F5F5;
    --green: #2E7D4F;
    --green-bg: #F0F9F2;
    --radius: 8px;
    --shadow-sm: 0 1px 3px rgba(27,54,93,0.08);
    --shadow-md: 0 4px 12px rgba(27,54,93,0.1);
    --shadow-lg: 0 8px 30px rgba(27,54,93,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--cream); color: var(--gray-800); line-height: 1.6; -webkit-font-smoothing: antialiased; }

  .report-header { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%); padding: 48px 40px 44px; text-align: center; position: relative; overflow: hidden; }
  .report-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 30% 20%, rgba(197,165,90,0.12) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(197,165,90,0.08) 0%, transparent 50%); }
  .report-header * { position: relative; z-index: 1; }
  .report-header h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; color: var(--white); letter-spacing: 0.5px; margin-bottom: 4px; }
  .report-header h2 { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
  .header-divider { width: 120px; height: 2px; background: var(--gold); margin: 20px auto; opacity: 0.6; }
  .header-subtitle { font-size: 1rem; color: rgba(255,255,255,0.7); font-weight: 400; }
  .header-subtitle strong { color: var(--white); font-weight: 600; }

  .address-bar { background: var(--white); border-bottom: 2px solid var(--gold); padding: 20px 40px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow-sm); }
  .address-bar label { font-family: 'Playfair Display', serif; font-weight: 600; color: var(--navy); font-size: 1.05rem; white-space: nowrap; }
  .address-bar input { flex: 1; border: 1px solid var(--gray-200); border-radius: 6px; padding: 10px 16px; font-family: 'Source Sans 3', sans-serif; font-size: 1rem; color: var(--gray-800); background: var(--gray-100); transition: all 0.2s; }
  .address-bar input:focus { outline: none; border-color: var(--gold); background: var(--white); box-shadow: 0 0 0 3px rgba(197,165,90,0.15); }

  .toolbar { background: var(--white); padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); flex-wrap: wrap; gap: 10px; }
  .toolbar-stats { display: flex; align-items: center; gap: 24px; }
  .stat-badge { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--gray-600); }
  .stat-number { font-weight: 700; font-size: 1.3rem; color: var(--navy); }
  .stat-number.green { color: var(--green); }
  .progress-ring { width: 44px; height: 44px; position: relative; }
  .progress-ring svg { transform: rotate(-90deg); width: 44px; height: 44px; }
  .progress-ring .bg { stroke: var(--gray-200); }
  .progress-ring .fg { stroke: var(--green); transition: stroke-dashoffset 0.5s ease; }
  .progress-pct { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.65rem; font-weight: 700; color: var(--navy); }
  .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 8px 16px; border-radius: 6px; font-family: 'Source Sans 3', sans-serif; font-size: 0.84rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .btn-select-all { background: var(--light-navy); color: var(--navy); }
  .btn-select-all:hover { background: #D8E2F0; }
  .btn-clear { background: var(--gray-100); color: var(--gray-600); }
  .btn-clear:hover { background: var(--gray-200); }
  .btn-json-save { background: var(--gold-bg); color: #8B7030; border: 1px solid var(--gold-light); }
  .btn-json-save:hover { background: #F0E8D0; }
  .btn-json-load { background: var(--gold-bg); color: #8B7030; border: 1px solid var(--gold-light); }
  .btn-json-load:hover { background: #F0E8D0; }
  .btn-pdf { background: var(--navy); color: var(--white); }
  .btn-pdf:hover { background: var(--navy-dark); box-shadow: var(--shadow-md); }

  .main-content { max-width: 960px; margin: 0 auto; padding: 32px 24px 80px; }

  .category-section { margin-bottom: 28px; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; border: 1px solid rgba(0,0,0,0.04); }
  .category-header { padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; transition: background 0.15s; border-bottom: 2px solid var(--gold); background: linear-gradient(135deg, rgba(27,54,93,0.03) 0%, rgba(197,165,90,0.04) 100%); }
  .category-header:hover { background: linear-gradient(135deg, rgba(27,54,93,0.05) 0%, rgba(197,165,90,0.07) 100%); }
  .category-header-left { display: flex; align-items: center; gap: 14px; }
  .category-number { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.3rem; color: var(--gold); min-width: 28px; }
  .category-title { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 1.1rem; color: var(--navy); }
  .category-header-right { display: flex; align-items: center; gap: 14px; }
  .category-count { font-size: 0.8rem; color: var(--gray-400); font-weight: 500; }
  .category-count .checked-count { color: var(--green); font-weight: 700; }
  .collapse-icon { width: 20px; height: 20px; color: var(--gray-400); transition: transform 0.3s ease; }
  .category-section.collapsed .collapse-icon { transform: rotate(-90deg); }
  .category-section.collapsed .category-items { display: none; }
  .category-items { padding: 8px 0; }

  .checklist-item { padding: 14px 24px; display: flex; align-items: flex-start; gap: 14px; transition: background 0.15s; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.03); }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-item:hover { background: rgba(197,165,90,0.04); }
  .checklist-item.checked { background: var(--green-bg); }
  .checklist-item.checked:hover { background: #E2F3E6; }
  .checkbox-wrapper { flex-shrink: 0; margin-top: 2px; }
  .checkbox-wrapper input { display: none; }
  .checkbox-visual { width: 22px; height: 22px; border: 2px solid #ccc; border-radius: 5px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: var(--white); }
  .checklist-item.checked .checkbox-visual { background: var(--green); border-color: var(--green); }
  .checkbox-visual svg { width: 14px; height: 14px; opacity: 0; transform: scale(0.5); transition: all 0.2s; color: var(--white); }
  .checklist-item.checked .checkbox-visual svg { opacity: 1; transform: scale(1); }
  .item-content { flex: 1; }
  .item-title { font-weight: 600; color: var(--navy); font-size: 0.95rem; display: inline; }
  .item-description { color: var(--gray-600); font-size: 0.95rem; display: inline; }

  /* PDF styles for direct string rendering */
  .pdf-content { width: 740px; background: #fff; font-family: 'Source Sans 3', Arial, sans-serif; color: #333; line-height: 1.5; padding: 0 20px 20px; box-sizing: border-box; }
  .pdf-content .ph { text-align: center; padding: 0 20px 18px; border-bottom: 3px solid #C5A55A; margin-bottom: 6px; }
  .pdf-content .ph h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; color: #1B365D; margin-top: 0; margin-bottom: 2px; }
  .pdf-content .ph h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; color: #C5A55A; margin-top: 0; margin-bottom: 10px; }
  .pdf-content .pa { font-size: 13px; color: #666; margin-bottom: 3px; }
  .pdf-content .pa strong { color: #1B365D; }
  .pdf-content .pc { margin-top: 16px; }
  .pdf-content .pct { font-family: 'Playfair Display', Georgia, serif; font-size: 13.5px; font-weight: 700; color: #1B365D; padding: 7px 12px; background: #EDF1F7; border-left: 4px solid #C5A55A; margin-bottom: 4px; }
  .pdf-content .pcc { font-family: 'Source Sans 3', sans-serif; font-weight: 400; font-size: 10.5px; color: #999; margin-left: 8px; }
  .pdf-content .pi { padding: 4px 12px 4px 16px; font-size: 11px; line-height: 1.5; display: flex; align-items: flex-start; gap: 7px; border-bottom: 1px solid #f0f0f0; }
  .pdf-content .pi:last-child { border-bottom: none; }
  .pdf-content .pk { color: #2E7D4F; font-weight: 700; font-size: 13px; flex-shrink: 0; line-height: 1.3; }
  .pdf-content .pt { font-weight: 600; color: #1B365D; }
  .pdf-content .pd { color: #666; }
  .pdf-content .pe { text-align: center; padding: 40px 20px; color: #999; font-style: italic; font-size: 14px; }

  .pdf-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(27,54,93,0.7); z-index: 9999; align-items: center; justify-content: center; }
  .pdf-overlay.active { display: flex; }
  .pdf-overlay-content { background: var(--white); padding: 32px 48px; border-radius: 12px; text-align: center; box-shadow: var(--shadow-lg); }
  .pdf-overlay-content .spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #jsonFileInput { display: none; }

  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: var(--white); padding: 12px 28px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 10000; opacity: 0; transition: all 0.35s ease; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .report-header { padding: 32px 20px; }
    .report-header h1, .report-header h2 { font-size: 1.7rem; }
    .address-bar { padding: 16px 20px; flex-wrap: wrap; }
    .toolbar { padding: 12px 16px; }
    .main-content { padding: 20px 12px 60px; }
    .category-header { padding: 14px 16px; }
    .checklist-item { padding: 12px 16px; }
    .btn { padding: 7px 12px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="report-header">
  <h1>The Complete Property</h1>
  <h2>Strength Report</h2>
  <div class="header-divider"></div>
  <div class="header-subtitle">What I Researched About Your Property — <strong id="totalItemsHeader">110</strong> Items Across <strong>9</strong> Categories</div>
</div>

<div class="address-bar">
  <label>Property Address:</label>
  <input type="text" id="propertyAddress" placeholder="Enter the property address here..." />
</div>

<div class="toolbar">
  <div class="toolbar-stats">
    <div class="progress-ring">
      <svg viewBox="0 0 44 44">
        <circle class="bg" cx="22" cy="22" r="18" fill="none" stroke-width="4"/>
        <circle class="fg" id="progressCircle" cx="22" cy="22" r="18" fill="none" stroke-width="4" stroke-dasharray="113.1" stroke-dashoffset="113.1" stroke-linecap="round"/>
      </svg>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="stat-badge">
      <span class="stat-number green" id="checkedCount">0</span>
      <span>of <span id="totalCount">110</span> confirmed</span>
    </div>
  </div>
  <div class="toolbar-actions">
    <button class="btn btn-select-all" onclick="selectAll()">&#9745; Select All</button>
    <button class="btn btn-clear" onclick="clearAll()" style="color:#c0736a;">&#128465; Clear All</button>
    <button class="btn btn-json-save" onclick="saveToJSON()">&#128190; Save JSON</button>
    <button class="btn btn-json-load" onclick="document.getElementById('jsonFileInput').click()">&#128194; Load JSON</button>
    <input type="file" id="jsonFileInput" accept=".json" onchange="loadFromJSON(event)">
    <button class="btn btn-pdf" onclick="generatePDF()">&#11015; Save PDF</button>
  </div>
</div>

<div class="main-content" id="mainContent"></div>

<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-overlay-content">
    <div class="spinner"></div>
    <div style="color:var(--navy);font-weight:600;">Generating PDF...</div>
    <div style="color:var(--gray-400);font-size:0.85rem;margin-top:4px;">Only checked items will be included</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const categories=[{number:1,title:"Environmental & Location Advantages",items:[{title:"Outside Flood Zones",desc:"Property is NOT located in a 100-year or 500-year floodplain \u2014 verified through conservation authority mapping, eliminating flood insurance requirements and buyer anxiety."},{title:"No Landfill Proximity",desc:"No active or capped landfill sites within a significant radius \u2014 confirmed through municipal environmental records."},{title:"Low Geological/Climate Risk",desc:"Property is not in a wildfire zone, on a fault line, in a sinkhole-prone area, or subject to erosion \u2014 a stable, low-risk natural setting."},{title:"Clean Environmental History",desc:"No brownfield designation, no former industrial use, gas station, or dry cleaner contamination on or adjacent to the property."},{title:"Low Radon Levels",desc:"Radon testing completed with results well below Health Canada\u2019s guideline of 200 Bq/m\u00B3 \u2014 a proactive disclosure that builds buyer confidence."},{title:"No Buried Oil Tanks",desc:"Property has been scanned or documented as free from buried oil tanks \u2014 eliminating a costly remediation risk common in older Ontario homes."},{title:"Healthy Trees & No Invasive Species",desc:"Mature trees in good health with no emerald ash borer damage or hazardous deadwood \u2014 trees add curb appeal, shade, and measurable property value."},{title:"Lead Paint Cleared or Post-1978 Build",desc:"Home built after 1978, or pre-1978 home has been professionally tested and cleared of lead-based paint \u2014 important for families with children."},{title:"No Abandoned Wells",desc:"For semi-rural properties: no undocumented or improperly decommissioned wells on the lot \u2014 confirmed through well records or ground survey."},{title:"Good Soil Quality / No Fill Issues",desc:"Property is built on stable, natural ground \u2014 not on filled land common in newer subdivisions where settling can cause foundation shifting and structural problems over time."},{title:"No EMF Concerns from Electrical Substations",desc:"No hidden electrical substations in close proximity \u2014 different from visible power lines, substations are often tucked behind fences or buildings and discovered only after purchase."},{title:"No Sidewalk",desc:"Elimination of legal liability and physical maintenance, as you are no longer responsible for clearing snow, repairing cracked concrete, or being held liable for pedestrian slip-and-fall accidents."}]},{number:2,title:"Structural, Mechanical & Property Condition Strengths",items:[{title:"Solid Foundation",desc:"Professionally inspected or recently underpinned foundation with no signs of cracking, shifting, or water infiltration \u2014 a major confidence builder for buyers, especially in older GTA homes."},{title:"Upgraded Electrical Panel",desc:"200-amp service panel with modern breakers \u2014 eliminates a common buyer objection and supports today\u2019s electrical demands without costly upgrades."},{title:"Dry Basement with No Mold History",desc:"No evidence of previous water damage, flooding, or mold \u2014 documented through inspection records or waterproofing receipts, removing a top buyer concern."},{title:"Proper Grading & Drainage",desc:"Lot slopes away from the foundation with functional weeping tile, sump pump, or French drain system \u2014 a proactive selling point that prevents future water issues."},{title:"Newer Roof & HVAC Systems",desc:"Roof, furnace, and/or A/C replaced within the last 5\u201310 years with documented receipts \u2014 saves the buyer $10,000\u2013$25,000+ in near-term capital costs."},{title:"All Mechanical Systems Operational",desc:"Every system (humidifier, fireplace, sump pump, etc.) is connected, functional, and demonstrable during showings \u2014 signals transparency and well-maintained ownership."},{title:"Healthy Sewer Lateral Line",desc:"Recent camera inspection confirms the sewer lateral is in good condition with no root intrusion or deterioration \u2014 especially valuable for older homes with clay pipes."},{title:"No Pest or Insect Issues",desc:"No history of termites, carpenter ants, mice, or bats \u2014 or professionally documented treatment and clearance certificates on file."},{title:"Asbestos-Free or Professionally Abated",desc:"Pre-1990 home has been tested and cleared of asbestos in floor tiles, pipe wrapping, and drywall compound, or abatement has been professionally completed and documented."},{title:"Proper Attic Insulation & Ventilation",desc:"Adequate attic insulation (R-50+) and soffit/ridge ventilation that prevents ice damming \u2014 a key durability factor in Canadian winters that informed buyers appreciate."},{title:"Water Heater Age & Ownership",desc:"Water heater is relatively new, in good condition, and ideally owned (not rented) \u2014 eliminating a common closing surprise and ongoing rental cost for the buyer."},{title:"Quality Windows (Double/Triple Pane)",desc:"Windows have been updated to double- or triple-pane, argon-filled glass \u2014 old single-pane windows signal $15,000\u2013$30,000+ in replacement costs that deter buyers."},{title:"Confirmed Copper Plumbing Throughout",desc:"Plumbing is confirmed copper throughout \u2014 beyond simply \u201Cno Kitec/Poly-B,\u201D proactively verifying copper gives buyers maximum confidence in the system\u2019s longevity."},{title:"Backwater Valve Installed",desc:"A backwater valve is installed to prevent sewer backup during heavy storms \u2014 many GTA municipalities now require or subsidize these, and insurers increasingly ask about them."},{title:"Smoke/CO Detectors Compliant",desc:"Working smoke and carbon monoxide detectors are installed on every level as required by the Ontario Fire Code \u2014 confirmed compliance removes a common home inspection flag."}]},{number:3,title:"Clean Property History & No Stigma",items:[{title:"No Cemetery Adjacency",desc:"Property is not directly adjacent to a cemetery \u2014 removing a cultural and psychological deterrent that affects a significant portion of the buyer pool."},{title:"No Stigma Events",desc:"No history of highly publicized violent crime, death under unusual circumstances, or negative local reputation \u2014 the property has a clean narrative."},{title:"No Former Drug Manufacturing",desc:"Property has never been used as a meth lab or drug manufacturing site \u2014 no toxic chemical residue concerns."},{title:"No Grow-Op History",desc:"No history of marijuana grow operations \u2014 eliminating concerns about hidden mold, moisture damage, and electrical hazards that plague formerly-used properties in Ontario."}]},{number:4,title:"Sensory & Lifestyle Quality",items:[{title:"Low Noise Environment",desc:"Property is well-buffered from major highways, busy intersections, train tracks, and airport flight paths \u2014 a peaceful living environment that buyers will notice on first visit."},{title:"Clean Air & No Odor Issues",desc:"Not downwind from sewage treatment plants, industrial farms, paper mills, or chemical factories \u2014 fresh air is an underrated selling advantage."},{title:"No Light Pollution",desc:"Not adjacent to 24-hour gas stations, commercial parking lots, or sports stadiums \u2014 dark, restful nights are a genuine lifestyle benefit."},{title:"No High-Voltage Power Lines Nearby",desc:"No massive transmission towers near the property line \u2014 eliminating buzzing noise, visual impact, and EMF concerns that deter many buyers."},{title:"No Cell Tower Proximity",desc:"No cell towers within close visual range \u2014 avoids the aesthetic and perceived health concerns that reduce buyer interest."},{title:"No Wind Turbine Impact",desc:"For rural/semi-rural: no wind turbines causing noise, shadow flicker, or resale resistance in the immediate area."},{title:"No Construction Staging Nearby",desc:"Property is not adjacent to a designated construction staging zone \u2014 no years of heavy equipment noise, dust, or truck traffic disruption."},{title:"Good Natural Light & Lot Orientation",desc:"South- or west-facing backyard, generous window placement, and not boxed in by tall neighboring structures \u2014 natural light is one of the first things buyers feel when they walk in."},{title:"Privacy from Neighbors",desc:"Property is not directly overlooked by neighboring windows, balconies, or multi-story buildings \u2014 a genuine lifestyle differentiator that buyers value highly, especially in denser GTA neighborhoods."},{title:"Mature Street Trees / Tree-Lined Street",desc:"Located on a tree-lined street with mature canopy coverage \u2014 directly correlated with higher property values, beautiful photography, and an immediate positive emotional response from buyers."}]},{number:5,title:"Modern & Safe Building Systems",items:[{title:"Updated Wiring (No Knob-and-Tube)",desc:"Electrical system has been fully updated from any knob-and-tube wiring \u2014 no insurance refusal risk, no premium surcharges, and full coverage availability."},{title:"No Aluminum Wiring (or Professionally Pigtailed)",desc:"Home has copper wiring throughout, or all aluminum connections have been professionally pigtailed \u2014 with documentation for insurance."},{title:"No Vermiculite/Asbestos Insulation",desc:"Insulation has been tested or is known to be free of vermiculite/asbestos \u2014 removes a common deal-breaker for informed buyers."},{title:"No UFFI",desc:"Property has no Urea Formaldehyde Foam Insulation \u2014 eliminating a historical stigma that still affects insurability and buyer perception."},{title:"No Kitec Plumbing",desc:"Plumbing system is free of Kitec (common in 1995\u20132007 GTA builds) \u2014 no failure risk, no insurance flags, and no expensive replacement needed."},{title:"No Poly-B Piping",desc:"No polybutylene piping from the 1980s\u201390s \u2014 eliminating sudden leak risks and a well-known insurance concern."},{title:"No Galvanized Steel Plumbing",desc:"Plumbing has been updated from galvanized steel \u2014 full wa const totalItems = categories.reduce((s, c) => s + c.items.length, 0);

function renderChecklist() {
  const container = document.getElementById('mainContent');
  document.getElementById('totalItemsHeader').textContent = totalItems;
  document.getElementById('totalCount').textContent = totalItems;
  let gi = 0;
  categories.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.dataset.catNum = cat.number;
    sec.innerHTML = `<div class="category-header" onclick="toggleCategory(this)"><div class="category-header-left"><span class="category-number">${cat.number}.</span><span class="category-title">${cat.title}</span></div><div class="category-header-right"><span class="category-count"><span class="checked-count" data-cat="${cat.number}">0</span> / ${cat.items.length}</span><svg class="collapse-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg></div></div><div class="category-items" id="catItems${cat.number}"></div>`;
    const ic = sec.querySelector(`#catItems${cat.number}`);
    cat.items.forEach((item, ii) => {
      const d = document.createElement('div');
      d.className = 'checklist-item';
      d.dataset.cat = cat.number;
      d.dataset.idx = ii;
      d.onclick = () => toggleItem(d);
      d.innerHTML = `<div class="checkbox-wrapper"><input type="checkbox" id="item_${gi}"><div class="checkbox-visual"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 7.5L5.5 10.5L11.5 3.5"/></svg></div></div><div class="item-content"><span class="item-title">${item.title}:</span><span class="item-description"> ${item.desc}</span></div>`;
      ic.appendChild(d);
      gi++;
    });
    container.appendChild(sec);
  });
  updateStats();
}

function toggleCategory(h) { h.closest('.category-section').classList.toggle('collapsed'); }
function toggleItem(d) { d.classList.toggle('checked'); d.querySelector('input').checked = d.classList.contains('checked'); updateStats(); autoSave(); }
function selectAll() { document.querySelectorAll('.checklist-item').forEach(i => { i.classList.add('checked'); i.querySelector('input').checked = true; }); updateStats(); autoSave(); }
function clearAll() {
  if(!confirm('Clear all data and reset the form?\nThis will also wipe saved data. Cannot be undone.')) return;
  document.querySelectorAll('.checklist-item').forEach(i => { i.classList.remove('checked'); i.querySelector('input').checked = false; });
  document.getElementById('propertyAddress').value = '';
  updateStats();
  if(_db){ dbClearStore().catch(e=>console.error('Clear error:',e)); }
  showToast('Cleared.');
}

function updateStats() {
  const ck = document.querySelectorAll('.checklist-item.checked').length;
  const pct = totalItems > 0 ? Math.round((ck / totalItems) * 100) : 0;
  document.getElementById('checkedCount').textContent = ck;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressCircle').setAttribute('stroke-dashoffset', 113.1 - (pct / 100) * 113.1);
  categories.forEach(cat => {
    const cc = document.querySelectorAll(`.checklist-item.checked[data-cat="${cat.number}"]`).length;
    const b = document.querySelector(`.checked-count[data-cat="${cat.number}"]`);
    if (b) b.textContent = cc;
  });
}

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

function saveToJSON() {
  const address = document.getElementById('propertyAddress').value;
  const checkedMap = {};
  document.querySelectorAll('.checklist-item').forEach(el => { const k = el.dataset.cat + '-' + el.dataset.idx; if (el.classList.contains('checked')) checkedMap[k] = true; });
  const data = { reportType: "Property Strength & Value Report", version: "1.0", savedAt: new Date().toISOString(), propertyAddress: address, checkedItems: checkedMap };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Strength_Report_${(address || 'Property').replace(/[^a-zA-Z0-9\s]/g, '').trim().replace(/\s+/g, '_')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('JSON saved successfully');
}

function loadFromJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.propertyAddress) document.getElementById('propertyAddress').value = data.propertyAddress;
      document.querySelectorAll('.checklist-item').forEach(i => { i.classList.remove('checked'); i.querySelector('input').checked = false; });
      if (data.checkedItems) {
        Object.keys(data.checkedItems).forEach(k => {
          if (!data.checkedItems[k]) return;
          const [cat, idx] = k.split('-');
          const el = document.querySelector(`.checklist-item[data-cat="${cat}"][data-idx="${idx}"]`);
          if (el) { el.classList.add('checked'); el.querySelector('input').checked = true; }
        });
      }
      updateStats();
      autoSave();
      showToast('Loaded: ' + (data.propertyAddress || 'Property data'));
    } catch (err) { alert('Error reading JSON file.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function generatePDF() {
  const overlay = document.getElementById('pdfOverlay');
  overlay.classList.add('active');
  const address = document.getElementById('propertyAddress').value || 'Address not specified';
  const checkedTotal = document.querySelectorAll('.checklist-item.checked').length;

  let h = `<div class="pdf-content">`;
  h += `<div class="ph"><h1>The Complete Property</h1><h2>Strength Report</h2><div class="pa"><strong>Property:</strong> ${escapeHtml(address)}</div></div>`;

  if (checkedTotal === 0) {
    h += `<div class="pe">No items have been checked. Please select confirmed advantages before generating the PDF.</div>`;
  } else {
    categories.forEach(cat => {
      const ci = [];
      document.querySelectorAll(`.checklist-item.checked[data-cat="${cat.number}"]`).forEach(el => ci.push(cat.items[parseInt(el.dataset.idx)]));
      if (ci.length === 0) return;
      h += `<div class="pc"><div class="pct">${cat.number}. ${cat.title}<span class="pcc">${ci.length} of ${cat.items.length} confirmed</span></div>`;
      ci.forEach(item => { h += `<div class="pi"><span class="pk">\u2713</span><div><span class="pt">${item.title}:</span> <span class="pd">${item.desc}</span></div></div>`; });
      h += `</div>`;
    });
  }

  h += `</div>`; 

  const safeName = (address || 'Property').replace(/[^a-zA-Z0-9\s]/g, '').trim().replace(/\s+/g, '_');

  // Convert HTML string to a real DOM element
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = h;
  const pdfElement = tempDiv.firstChild;
  document.body.appendChild(pdfElement);

  setTimeout(() => {
    html2pdf().set({
      margin: [25.4, 12, 25, 12], 
      filename: `Property_Strength_Report_${safeName}.pdf`,
      image: { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'mm', format: 'letter', orientation: 'portrait' },
      pagebreak: { mode: ['css', 'legacy'], avoid: ['.ph', '.pct', '.pi'] }
    })
    .from(pdfElement)
    .toPdf()
    .get('pdf')
    .then(function (pdf) {
      const totalPages = pdf.internal.getNumberOfPages();
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const centerX = pageWidth / 2;

      for (let i = 1; i <= totalPages; i++) {
        pdf.setPage(i);
        
        pdf.setDrawColor(197, 165, 90);
        pdf.setLineWidth(0.6);
        pdf.line(centerX - 40, pageHeight - 19, centerX + 40, pageHeight - 19);

        pdf.setFont("times", "bold");
        pdf.setFontSize(10);
        pdf.setTextColor(27, 54, 93); 
        pdf.text("Prepared by Peter Luo", centerX, pageHeight - 14, { align: "center" });
        
        pdf.setFont("helvetica", "normal");
        pdf.setFontSize(8);
        pdf.setTextColor(102, 102, 102); 
        pdf.text("RE/MAX Realtron Realty Inc., Brokerage", centerX, pageHeight - 10, { align: "center" });
        
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(8);
        pdf.setTextColor(197, 165, 90); 
        pdf.text("SRS \u00B7 MCNE \u00B7 FRI", centerX, pageHeight - 6, { align: "center" });
      }
    })
    .save()
    .then(() => {
      document.body.removeChild(pdfElement);
      overlay.classList.remove('active');
    })
    .catch(err => {
      console.error('PDF error:', err);
      if (document.body.contains(pdfElement)) document.body.removeChild(pdfElement);
      overlay.classList.remove('active');
      alert('PDF generation failed. Please try again.');
    });
  }, 500);
}

// ── IndexedDB STORAGE LAYER ──────────────────────────────────────────────────
const DB_NAME='plSreportDB';
const DB_VERSION=1;
const STORE_NAME='sreport';
const DB_KEY='sreportState';
let _db=null;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE_NAME))db.createObjectStore(STORE_NAME);};
    req.onsuccess=e=>{_db=e.target.result;resolve(_db);};
    req.onerror=e=>reject(e.target.error);
  });
}
function dbGet(key){
  return new Promise((resolve,reject)=>{
    const tx=_db.transaction(STORE_NAME,'readonly');
    const req=tx.objectStore(STORE_NAME).get(key);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function dbPut(key,val){
  return new Promise((resolve,reject)=>{
    const tx=_db.transaction(STORE_NAME,'readwrite');
    const req=tx.objectStore(STORE_NAME).put(val,key);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
function dbClearStore(){
  return new Promise((resolve,reject)=>{
    const tx=_db.transaction(STORE_NAME,'readwrite');
    tx.objectStore(STORE_NAME).clear();
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error);
  });
}

// ── Auto-save (debounced) ────────────────────────────────────────────────────
let _saveTimer=null;
function autoSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    if(!_db) return;
    const address=document.getElementById('propertyAddress').value;
    const checkedMap={};
    document.querySelectorAll('.checklist-item').forEach(el=>{
      const k=el.dataset.cat+'-'+el.dataset.idx;
      if(el.classList.contains('checked')) checkedMap[k]=true;
    });
    dbPut(DB_KEY,{propertyAddress:address,checkedItems:checkedMap}).catch(e=>console.error('IndexedDB save error:',e));
  },400);
}

function restoreFromDB(data){
  if(data.propertyAddress) document.getElementById('propertyAddress').value=data.propertyAddress;
  if(data.checkedItems){
    Object.keys(data.checkedItems).forEach(k=>{
      if(!data.checkedItems[k]) return;
      const [cat,idx]=k.split('-');
      const el=document.querySelector(`.checklist-item[data-cat="${cat}"][data-idx="${idx}"]`);
      if(el){el.classList.add('checked');el.querySelector('input').checked=true;}
    });
  }
  updateStats();
}

// ── Attach auto-save to address input ────────────────────────────────────────
document.getElementById('propertyAddress').addEventListener('input',autoSave);

// ── INIT ──────────────────────────────────────────────────────────────────────
renderChecklist();

openDB().then(()=>dbGet(DB_KEY)).then(saved=>{
  if(saved&&typeof saved==='object'&&(saved.propertyAddress||saved.checkedItems)){
    restoreFromDB(saved);
  }
}).catch(err=>{
  console.error('IndexedDB init failed:',err);
});
</script>
