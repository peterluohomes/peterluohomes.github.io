<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Showing Sheet – Peter Luo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:    #1a2744;
  --navy2:   #243259;
  --gold:    #c8a96e;
  --goldlt:  #e2ca96;
  --cream:   #faf7f2;
  --creamd:  #f0ebe0;
  --text:    #2a2a2a;
  --muted:   #8a8070;
  --line:    #ddd5c5;
  --green:   #2e7d52;
  --red:     #c0392b;
  --shadow:  0 2px 14px rgba(26,39,68,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--navy);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60;box-shadow:0 2px 10px rgba(0,0,0,.3);}
.hl h1{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.2rem;line-height:1.1;}
.hl p{color:rgba(255,255,255,.45);font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}
.hbtns{display:flex;gap:6px;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;}
.btn{font-size:.72rem;font-weight:600;padding:7px 13px;border-radius:6px;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.bg{background:var(--gold);color:var(--navy);}
.bo{background:transparent;color:var(--gold);border:1.5px solid var(--gold);}
.filebtn{font-size:.72rem;font-weight:600;padding:7px 13px;border-radius:6px;background:transparent;color:var(--gold);border:1.5px solid var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── DATE BAR ── */
.datebar{background:var(--navy2);padding:8px 16px;display:flex;align-items:center;gap:10px;}
.datebar label{font-size:.6rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;}
.datebar input[type=date]{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;color:var(--gold);background:transparent;border:none;outline:none;cursor:pointer;}
.datebar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) sepia(1) saturate(2) hue-rotate(10deg);cursor:pointer;}
.showing-count{margin-left:auto;font-size:.62rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em;}

/* ── MAIN ── */
.main{padding:14px 12px 80px;max-width:1100px;margin:0 auto;}
.thead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.thead h2{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--navy);}
.badge{background:var(--navy);color:var(--gold);font-size:.62rem;font-weight:600;padding:3px 9px;border-radius:20px;}

/* ── SHOWING CARD ── */
.scard{background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s;}
.scard:hover{box-shadow:0 4px 20px rgba(26,39,68,.15);}

/* Main body row — everything in one flex row */
.smain{display:flex;align-items:stretch;padding:8px 10px;gap:8px;}

/* LEFT: address block stacked */
.saddr-block{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:1px;cursor:pointer;}
.saddr-block:hover .sa1{text-decoration:underline;text-decoration-color:var(--gold);}
.sa1{font-weight:700;font-size:.82rem;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sa2{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sa3{font-size:.67rem;color:var(--muted);margin-top:2px;}
.sa3 strong{color:var(--navy);font-weight:600;}

/* TIME block: stacked start/end, right-aligned, fixed width */
.stime-block{flex:0 0 54px;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:1px;border-left:1px solid var(--creamd);padding-left:7px;}
.st{cursor:pointer;padding:1px 3px;border-radius:3px;transition:background .15s;text-align:right;}
.st:hover{background:var(--creamd);}
.st-val{font-size:.78rem;font-weight:700;line-height:1.3;white-space:nowrap;display:block;}
.st-val.start{color:var(--navy);}
.st-val.end{color:var(--green);}
.st-val.empty{color:#ccc;font-weight:400;font-size:.72rem;}

/* DIVIDER between time and pills */
.sv-div{width:1px;background:var(--line);align-self:stretch;flex-shrink:0;margin:0 4px;}

/* RIGHT: pills + actions stacked */
.sright{display:flex;flex-direction:column;justify-content:center;gap:5px;flex-shrink:0;}
.spills{display:flex;gap:4px;align-items:center;}
.pill{font-size:.6rem;font-weight:600;padding:4px 9px;border-radius:20px;border:1px solid var(--line);background:var(--creamd);color:var(--navy);cursor:pointer;transition:all .15s;white-space:nowrap;}
.pill:hover,.pill.has-data{background:var(--navy);color:var(--gold);border-color:var(--navy);}
.sactions{display:flex;gap:4px;align-items:center;justify-content:flex-end;}
.sedit{width:26px;height:26px;flex-shrink:0;border-radius:6px;background:var(--creamd);border:1px solid var(--line);color:var(--muted);font-size:.78rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.sedit:hover{background:var(--navy);color:var(--gold);border-color:var(--navy);}
.sdel{width:22px;height:22px;flex-shrink:0;border-radius:5px;background:transparent;border:1px solid #e0d0d0;color:#c0736a;font-size:.78rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.sdel:hover{background:#fdf0ef;border-color:var(--red);}
/* ── DETAIL PANEL (pencil) ── */
.detail-panel{display:none;border-top:1px solid var(--creamd);background:var(--cream);padding:14px 14px 16px;}
.detail-panel.open{display:block;}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.dp-sec{background:#fff;border-radius:8px;border:1px solid var(--line);padding:12px;}
.dp-sec h4{font-family:'Playfair Display',serif;font-size:.72rem;color:var(--navy);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--line);}
.dp-sec.full{grid-column:1/-1;}
.fr{margin-bottom:8px;}
.fr label{display:block;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.fr input,.fr select,.fr textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--text);background:var(--cream);border:1px solid var(--line);border-radius:5px;padding:6px 8px;outline:none;transition:border-color .2s;}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--gold);background:#fff;}
.fr textarea{resize:vertical;min-height:70px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.dp-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:4px;}
.bsave{background:var(--navy);color:var(--gold);font-size:.74rem;font-weight:600;padding:8px 20px;border-radius:6px;cursor:pointer;border:none;}
.bsave:hover{background:var(--navy2);}
.bdiscard{background:transparent;color:var(--muted);font-size:.74rem;border:1px solid var(--line);padding:8px 14px;border-radius:6px;cursor:pointer;}

/* ── POPUP OVERLAY ── */
.pop-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
.pop-overlay.open{display:flex;}
.popup{background:#fff;border-radius:16px 16px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;animation:slideUp .22s ease;max-height:88vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.popup h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.popup h3 span{font-size:.8rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;}
.pfooter{display:flex;gap:8px;margin-top:16px;}
.pfooter button{flex:1;padding:10px;border-radius:7px;font-size:.8rem;font-weight:600;}

/* Instructions checkboxes */
.instr-list{display:flex;flex-direction:column;gap:8px;}
.instr-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid var(--line);cursor:pointer;transition:background .15s;}
.instr-item:hover{background:var(--creamd);}
.instr-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--navy);cursor:pointer;flex-shrink:0;}
.instr-item label{font-size:.82rem;color:var(--text);cursor:pointer;font-weight:500;}
.instr-item.checked{background:var(--navy);border-color:var(--navy);}
.instr-item.checked label{color:#fff;}

/* Time editor in popup */
.time-row{display:flex;gap:8px;align-items:center;}
.time-row input[type=time]{font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);background:var(--cream);border:1px solid var(--line);border-radius:5px;padding:6px 10px;outline:none;}
.time-row input[type=time]:focus{border-color:var(--gold);}
.time-sep{font-size:.8rem;color:var(--muted);}

/* ── ADD MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px 14px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;animation:slideUp .22s ease;max-height:92vh;overflow-y:auto;}
.modal h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--navy);margin-bottom:16px;}
.mfooter{display:flex;gap:8px;margin-top:14px;}
.mfooter button{flex:1;padding:10px;border-radius:7px;font-size:.8rem;font-weight:600;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ei{font-size:2.5rem;margin-bottom:10px;}
.empty p{font-size:.85rem;line-height:1.6;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:var(--gold);font-size:.8rem;font-weight:500;padding:9px 22px;border-radius:30px;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:400;transition:transform .28s ease;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .smain{gap:5px;padding:7px 8px;}
  .pill{font-size:.55rem;padding:3px 7px;}
  .stime-block{flex:0 0 68px;}
  .st-val{font-size:.68rem;}
  .dp-grid{grid-template-columns:1fr;}
  .dp-sec.full{grid-column:1;}
}
@media(min-width:768px){
  .main{padding:18px 24px 80px;}
  .dp-grid{grid-template-columns:1fr 1fr;}
  .popup,.modal{border-radius:14px;max-width:520px;}
  .pop-overlay,.modal-overlay{align-items:center;}
  .sa1{font-size:.88rem;}
  .pill{font-size:.65rem;padding:5px 11px;}
}
@media(min-width:1200px){
  .main{padding:22px 40px 80px;}
  .sa1{font-size:.92rem;}
  .sa2{font-size:.74rem;}
  .pill{font-size:.68rem;padding:5px 12px;}
  .stime-block{flex:0 0 88px;}
  .st-val{font-size:.8rem;}
}

/* ── LOAD/SAVE BAR ── */
.iobar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}

/* ── SORT BUTTON ── */
.sort-btn{display:inline-flex;align-items:center;gap:4px;font-size:.62rem;font-weight:600;padding:4px 10px;border-radius:20px;background:transparent;color:var(--muted);border:1.5px solid var(--line);cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.sort-btn:hover{background:var(--creamd);color:var(--navy);border-color:var(--navy);}
.sort-btn.active{background:var(--navy);color:var(--gold);border-color:var(--navy);}
.sort-icon{font-size:.75rem;transition:transform .2s;}
.sort-btn.asc .sort-icon{transform:rotate(0deg);}
.sort-btn.desc .sort-icon{transform:rotate(180deg);}
</style>
</head>
<body>

<header>
  <div class="hl">
    <h1>🏠 Showing Sheet</h1>
    <p>Pinnacle Listing System · Peter Luo</p>
  </div>
  <div class="hbtns">
    <span id="autosave-status" style="font-family:'DM Mono',monospace;font-size:10px;color:#7c9a5e;opacity:0.4;display:flex;align-items:center;transition:opacity 0.4s;white-space:nowrap;">✓ saved</span>
    <label class="filebtn">📂 Load<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    <button class="btn bo" onclick="exportData()">💾 Save</button>
    <button class="btn bo" onclick="newSession()">🆕 New</button>
    <button class="btn bg" onclick="openAddModal()">+ Add</button>
    <label class="btn bo" style="cursor:pointer;">⊕ Append<input type="file" accept=".json" style="display:none" onchange="appendData(event)"></label>
  </div>
</header>

<div class="datebar">
  <label>Showing Date</label>
  <input type="date" id="showingDate" onchange="saveDate()">
  <span class="showing-count" id="showingCount"></span>
</div>

<div class="main">
  <div class="thead">
    <h2>Properties</h2>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="sort-btn" id="sortTimeBtn" onclick="toggleSortByTime()" title="Sort by showing time">
        <span>⏱ Time</span>
        <span class="sort-icon" id="sortIcon">↑</span>
      </button>
      <span class="badge" id="cntBadge">0 showings</span>
    </div>
  </div>
  <div class="iobar"></div>
  <div id="showingList"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="ei">🗓</div>
    <p>No showings yet.<br>Tap <strong>+ Add</strong> to add a property.</p>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Add Property</h3>
    <div class="fr"><label>Address *</label><input type="text" id="mAddr" placeholder="e.g. 47 Birchwood Cres, North York ON"></div>
    <div class="fr"><label>Unit / Suite</label><input type="text" id="mUnit" placeholder="e.g. Unit 704"></div>
    <div class="g2">
      <div class="fr"><label>Start Time (EST)</label><input type="time" id="mStart" value="15:30"></div>
      <div class="fr"><label>End Time (EST)</label><input type="time" id="mEnd" value="16:00"></div>
    </div>
    <div class="fr"><label>List Price ($)</label><input type="text" id="mPrice" placeholder="1,388,000" oninput="fmtPI(this)"></div>
    <div class="mfooter">
      <button class="btn bo" onclick="closeAddModal()">Cancel</button>
      <button class="btn bg" onclick="addShowing()">Add</button>
    </div>
  </div>
</div>

<!-- ACCESS POPUP -->
<div class="pop-overlay" id="accessPop">
  <div class="popup">
    <h3>🔑 Access <span id="accessAddr"></span></h3>
    <div class="fr"><label>Lockbox Type</label>
      <select id="aLockType">
        <option>—</option>
        <option>Combination Lock Box</option>
        <option>Electronic Lock Box (Supra)</option>
        <option>Electronic Lock Box (SentriLock)</option>
        <option>Door Code</option>
        <option>Concierge / Security</option>
        <option>Key with Agent</option>
        <option>Tenant – Call Ahead</option>
        <option>Other</option>
      </select>
    </div>
    <div class="fr"><label>Code / PIN</label><input type="text" id="aCode" placeholder="e.g. 0317"></div>
    <div class="fr"><label>Location / Notes</label><textarea id="aLocation" rows="3" placeholder="e.g. P1 top rack on the right with The Richards Group logo"></textarea></div>
    <div class="pfooter">
      <button class="btn bo" onclick="closePop('accessPop')">Cancel</button>
      <button class="btn bg" onclick="saveAccess()">Save</button>
    </div>
  </div>
</div>

<!-- INSTRUCTIONS POPUP -->
<div class="pop-overlay" id="instrPop">
  <div class="popup">
    <h3>📋 Instructions <span id="instrAddr"></span></h3>
    <div class="instr-list" id="instrList"></div>
    <div class="fr" style="margin-top:12px"><label>Other Notes</label><textarea id="instrNotes" rows="2" placeholder="Any additional instructions…"></textarea></div>
    <div class="pfooter">
      <button class="btn bo" onclick="closePop('instrPop')">Cancel</button>
      <button class="btn bg" onclick="saveInstr()">Save</button>
    </div>
  </div>
</div>

<!-- CONTACT POPUP -->
<div class="pop-overlay" id="contactPop">
  <div class="popup">
    <h3>📞 Contact <span id="contactAddr"></span></h3>
    <div style="background:var(--creamd);border-radius:8px;padding:10px 12px;margin-bottom:14px;">
      <div style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Agent</div>
      <div class="g2">
        <div class="fr"><label>Name</label><input type="text" id="cAgentName" placeholder="MARK RICHARDS"></div>
        <div class="fr"><label>Phone</label><input type="text" id="cAgentPhone" placeholder="(416) 699-0303"></div>
      </div>
    </div>
    <div style="background:var(--creamd);border-radius:8px;padding:10px 12px;">
      <div style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Brokerage</div>
      <div class="g2">
        <div class="fr"><label>Name</label><input type="text" id="cBrokName" placeholder="RE/MAX HALLMARK"></div>
        <div class="fr"><label>Phone</label><input type="text" id="cBrokPhone" placeholder="(416) 699-0303"></div>
      </div>
    </div>
    <div class="pfooter">
      <button class="btn bo" onclick="closePop('contactPop')">Cancel</button>
      <button class="btn bg" onclick="saveContact()">Save</button>
    </div>
  </div>
</div>

<!-- TIME EDIT POPUP -->
<div class="pop-overlay" id="timePop">
  <div class="popup">
    <h3>🕐 Edit Time <span id="timeAddr"></span></h3>
    <div class="g2">
      <div class="fr"><label>Start Time (EST)</label><input type="time" id="tStart"></div>
      <div class="fr"><label>End Time (EST)</label><input type="time" id="tEnd"></div>
    </div>
    <div class="pfooter">
      <button class="btn bo" onclick="closePop('timePop')">Cancel</button>
      <button class="btn bg" onclick="saveTime()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){

// ── DATA ──────────────────────────────────────────────────────────
var showings = [];
var _popIdx = null;

var INSTR_OPTIONS = [
  'Turn Off Lights',
  'Leave Card',
  'Remove Shoes',
  'Lock Doors',
  'Knock First',
  'Do Not Disturb Tenant',
  'Pet in Home – Be Careful',
  'Schedule Through Brokerage',
  'Call Agent Before Entry'
];

function g(id){ return document.getElementById(id); }

// ── INDEXEDDB PERSISTENCE ────────────────────────────────────────
var DB_NAME = 'PinnacleShowings';
var DB_VERSION = 1;
var STORE_NAME = 'sessions';
var SESSION_KEY = 'current';
var _db = null;
var _saveTimer = null;

function _openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      var database = e.target.result;
      if (!database.objectStoreNames.contains(STORE_NAME)) database.createObjectStore(STORE_NAME);
    };
    req.onsuccess = function(e) {
      _db = e.target.result;
      _db.onclose = function() { _db = null; };
      resolve(_db);
    };
    req.onerror = function(e) { reject(e.target.error); };
  });
}

function _ensureDB() {
  if (_db) return Promise.resolve(true);
  return _openDB().then(function() { return true; }).catch(function() { return false; });
}

function _getSessionData() {
  return { date: g('showingDate').value, showings: showings, savedAt: new Date().toISOString() };
}

function _persistAsync() {
  if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }
  return _ensureDB().then(function(ok) {
    if (!ok) return;
    var tx = _db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(_getSessionData(), SESSION_KEY);
    return new Promise(function(res) {
      tx.oncomplete = function() { _flashSave(); res(); };
      tx.onerror = function() { res(); };
    });
  }).catch(function(err) { console.warn('Auto-save failed:', err); });
}

function _persistSync() {
  if (!_db) return;
  try { var tx = _db.transaction(STORE_NAME, 'readwrite'); tx.objectStore(STORE_NAME).put(_getSessionData(), SESSION_KEY); } catch(e) {}
}

function _scheduleSave() {
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_persistAsync, 500);
}

function _flashSave() {
  var el = g('autosave-status');
  if (!el) return;
  el.textContent = '✓ saved'; el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0.4'; }, 1200);
}

window.addEventListener('beforeunload', function() { if (_saveTimer) clearTimeout(_saveTimer); _persistSync(); });
document.addEventListener('visibilitychange', function() { if (document.visibilityState === 'hidden') { if (_saveTimer) clearTimeout(_saveTimer); _persistSync(); } });
window.addEventListener('pagehide', function() { if (_saveTimer) clearTimeout(_saveTimer); _persistSync(); });

function _loadFromDB() {
  return _ensureDB().then(function(ok) {
    if (!ok) return false;
    var tx = _db.transaction(STORE_NAME, 'readonly');
    var req = tx.objectStore(STORE_NAME).get(SESSION_KEY);
    return new Promise(function(resolve) {
      req.onsuccess = function() {
        var session = req.result;
        if (!session || !Array.isArray(session.showings) || session.showings.length === 0) { resolve(false); return; }
        showings = session.showings;
        if (session.date) g('showingDate').value = session.date;
        nid = Math.max(0, ...showings.map(function(s){ return s.id||0; })) + 1;
        render();
        resolve(true);
      };

// ── SORT STATE ────────────────────────────────────────────────────
var _sortDir = 0; // 0=original, 1=asc, -1=desc
var _origOrder = null; // snapshot of original order (ids)

function timeToMins(t){
  if(!t) return 9999;
  var p=t.split(':'); return parseInt(p[0],10)*60+parseInt(p[1],10);
}

function updateSortBtn(){
  var btn=g('sortTimeBtn'), icon=g('sortIcon');
  if(!btn||!icon) return;
  if(_sortDir===0){
    btn.classList.remove('active','asc','desc');
    icon.textContent='↑';
  } else if(_sortDir===1){
    btn.classList.add('active'); btn.classList.remove('desc'); btn.classList.add('asc');
    icon.textContent='↑';
  } else {
    btn.classList.add('active'); btn.classList.remove('asc'); btn.classList.add('desc');
    icon.textContent='↓';
  }
}

window.toggleSortByTime=function(){
  if(_sortDir===0){
    _origOrder = showings.map(function(s){ return s.id; });
    _sortDir=1;
  } else if(_sortDir===1){
    _sortDir=-1;
  } else {
    if(_origOrder){
      showings.sort(function(a,b){
        return _origOrder.indexOf(a.id)-_origOrder.indexOf(b.id);
      });
    }
    _sortDir=0;
    render();
    updateSortBtn();
    return;
  }
  showings.sort(function(a,b){
    var sa=timeToMins(a.timeStart), sb=timeToMins(b.timeStart);
    if(sa!==sb) return _sortDir*(sa-sb);
    return _sortDir*(timeToMins(a.timeEnd)-timeToMins(b.timeEnd));
  });
  render();
  updateSortBtn();
};

function fmt12(t){
  if(!t) return '—';
  var p=t.split(':'); var h=parseInt(p[0]),m=p[1];
  var ampm=h>=12?'P':'A'; h=h%12||12;
  return h+':'+m+ampm;
}
function fmtTime(s){
  if(!s.timeStart&&!s.timeEnd) return '<span style="color:#ccc;font-size:.7rem;">Set Time</span>';
  return fmt12(s.timeStart)+(s.timeEnd?' – '+fmt12(s.timeEnd):'');
}

  var a=document.createElement('a');

window.importData=function(ev){
  var file=ev.target.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(d.showings&&Array.isArray(d.showings)){
        showings=d.showings;
        if(d.date) g('showingDate').value=d.date;
        nid=Math.max(0,...showings.map(function(s){return s.id||0;}))+1;
        persist(); render(); toast('✓ Loaded');
      }
    }catch(err){ alert('Invalid file.'); }
  };
  r.readAsText(file); ev.target.value='';
};
window.appendData=function(ev){
  var file=ev.target.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      var incoming=d.showings&&Array.isArray(d.showings)?d.showings:(Array.isArray(d)?d:[]);
      if(!incoming.length){ toast('No showings found in file.'); return; }
      // Build set of existing MLS numbers
      var existing={};
      showings.forEach(function(s){ var m=s.detail&&s.detail.mls; if(m) existing[m.toUpperCase()]=true; });
      var added=0, skipped=0;
      incoming.forEach(function(s){
        var m=s.detail&&s.detail.mls;
        if(m && existing[m.toUpperCase()]){ skipped++; return; }
        s.id=nid++; s._open=false;
        showings.push(s);
        if(m) existing[m.toUpperCase()]=true;
        added++;
      });
      persist(); render();
      var msg='✓ Appended '+added+' showing'+(added!==1?'s':'');
      if(skipped) msg+=' · '+skipped+' duplicate'+(skipped!==1?'s':'')+' skipped';
      toast(msg);
    }catch(err){ alert('Invalid file.'); }
  };
  r.readAsText(file); ev.target.value='';
};
