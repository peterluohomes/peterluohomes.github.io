    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;700&display=swap');
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .signature {
            max-width: 620px;
            background-color: #1f1f1f;
            border-radius: 10px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .headshot {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 3px solid #e60000;
        }
        .info { flex: 1; }
        .name {
            color: #e60000;
            font-size: 32px;
            font-weight: bold;
            margin: 0 0 4px 0;
        }
        .title {
            color: #cccccc;
            font-size: 17px;
            margin: 0 0 18px 0;
        }
        .company {
            color: #00aaff;
            font-size: 17px;
            margin-bottom: 22px;
        }
        .contact {
            margin-bottom: 12px;
            font-size: 15.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .contact a {
            color: #00aaff;
            text-decoration: none;
        }
        .contact a:hover { text-decoration: underline; }
        .address {
            margin-top: 18px;
            font-size: 14.5px;
            color: #aaaaaa;
        }
        .remax-logo {
            margin-top: 20px;
            height: 55px;
        }
    </style>
</head>
