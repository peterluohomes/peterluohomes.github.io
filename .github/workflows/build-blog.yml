name: Build blog

# Renders /blog from the scheduler repo's public queue.json and commits it here.
# No PAT: queue.json is fetched over HTTPS, and the commit uses this repo's
# built-in GITHUB_TOKEN. Hardened so a stale/empty queue fetch can't wipe the
# index: cache-busted + -f fetch, and we abort if the queue is missing/empty.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-blog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch queue.json (cache-busted, fail on error)
        run: |
          curl -fsSL -H 'Cache-Control: no-cache' \
            "https://raw.githubusercontent.com/peterluohomes/scheduler/main/queue.json?nocache=${{ github.run_id }}-${{ github.run_attempt }}" \
            -o queue.json

      - name: Sanity-check the queue before building
        # Abort (don't rebuild) if the fetch returned junk or an empty post list,
        # so a bad fetch can never overwrite a good index with "No posts yet".
        run: |
          python - <<'PY'
          import json, sys
          try:
              d = json.load(open("queue.json"))
          except Exception as e:
              print("queue.json is not valid JSON:", e); sys.exit(1)
          posts = d.get("posts", d) if isinstance(d, dict) else d
          if not posts:
              print("queue has 0 posts — refusing to rebuild"); sys.exit(1)
          print(f"queue OK: {len(posts)} post(s)")
          PY

      - name: Rebuild /blog
        run: python build_blog_from_queue.py

      - name: Commit /blog if it changed
        run: |
          git config user.name  "blog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add blog
          git diff --cached --quiet || (git commit -m "Rebuild blog $(date -u +%FT%TZ)" && git push)
