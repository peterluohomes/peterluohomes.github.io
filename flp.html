<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Listing Presentation – Audio Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B3A6B;
    --navy-dark: #132B52;
    --gold: #B8952A;
    --gold-light: #D4AF37;
    --cream: #FDFAF4;
    --cream-dark: #F5EFE3;
    --text: #2C2C2C;
    --text-muted: #6B6B6B;
    --border: #E8E0D0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .header p {
    color: var(--gold-light);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 12px 20px;
    background: var(--navy-dark);
    border-bottom: 1px solid rgba(184,149,42,0.2);
  }
  .stat { text-align: center; }
  .stat-val {
    font-family: 'Playfair Display', serif;
    color: var(--gold-light);
    font-size: 18px;
    font-weight: 700;
  }
  .stat-label {
    color: rgba(253,250,244,0.5);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Content ── */
  .content { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* ── Phase Card ── */
  .phase-card {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.3s;
  }
  .phase-card.active {
    border-color: var(--gold);
    box-shadow: 0 4px 20px rgba(184,149,42,0.15);
  }

  .phase-header {
    display: flex;
    align-items: center;
    padding: 16px;
    cursor: pointer;
    gap: 14px;
    user-select: none;
    -webkit-user-select: none;
  }
  .phase-num {
    width: 38px; height: 38px;
    background: var(--navy);
    color: var(--gold-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 700;
    flex-shrink: 0;
  }
  .phase-card.active .phase-num {
    background: var(--gold);
    color: #fff;
  }
  .phase-info { flex: 1; min-width: 0; }
  .phase-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 600;
    color: var(--navy);
  }
  .phase-meta {
    font-size: 12px; color: var(--text-muted);
    margin-top: 2px;
  }
  .phase-toggle {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .phase-card.open .phase-toggle { transform: rotate(180deg); }

  /* ── Expandable Body ── */
  .phase-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .phase-body-inner {
    padding: 0 16px 16px;
  }

  /* ── Speed Selector ── */
  .speed-row {
    display: flex; gap: 8px; margin-bottom: 14px;
  }
  .speed-btn {
    flex: 1;
    padding: 10px 0;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .speed-btn.selected {
    border-color: var(--navy);
    background: var(--navy);
    color: #fff;
  }
  .speed-btn .speed-label {
    display: block;
    font-size: 10px;
    font-weight: 400;
    margin-top: 1px;
    opacity: 0.7;
  }

  /* ── Player Controls ── */
  .player-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--cream);
    border-radius: 10px;
    padding: 12px;
  }
  .play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--navy);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .play-btn:active { background: var(--gold); }
  .play-btn svg { fill: #fff; width: 18px; height: 18px; }
  .play-btn.playing svg { width: 16px; height: 16px; }

  .progress-area { flex: 1; min-width: 0; }
  .progress-bar {
    width: 100%; height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy), var(--gold));
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s linear;
  }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* ── Play Count Badge ── */
  .play-count {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
  }
  .play-count svg { width: 12px; height: 12px; fill: var(--gold); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Listing Presentation</h1>
  <p>Audio Practice · English</p>
</div>
<div class="stats-bar">
  <div class="stat">
    <div class="stat-val" id="totalPlays">0</div>
    <div class="stat-label">Plays</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="totalTime">0:00</div>
    <div class="stat-label">Listened</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="streak">0</div>
    <div class="stat-label">Day Streak</div>
  </div>
</div>

<div class="content" id="app"></div>
<div class="footer">PINNACLE LISTING SYSTEM</div>

<script>
const PHASES = [
  {
    num: 1, title: 'Walk-Through',
    files: [
      { speed: '1.25×', label: 'Slow', file: '1.Walk-Through-EN-1.25.mp3' },
      { speed: '1.37×', label: 'Medium', file: '1.Walk-Through-EN-1.37.mp3' },
      { speed: '1.49×', label: 'Fast', file: '1.Walk-Through-EN-1.49.mp3' },
    ]
  },
  {
    num: 2, title: 'Discovery',
    files: [
      { speed: '1.25×', label: 'Slow', file: '2.Discovery-L-EN1.25.mp3' },
      { speed: '1.37×', label: 'Medium', file: '2.Discovery-L-EN1.37.mp3' },
      { speed: '1.46×', label: 'Fast', file: '2.Discovery-L-EN1.46.mp3' },
    ]
  },
  {
    num: 3, title: 'Plan of Action',
    files: [
      { speed: '1.25×', label: 'Slow', file: '3.POA-L-EN1.25.mp3' },
      { speed: '1.37×', label: 'Medium', file: '3.POA-L-EN1.37.mp3' },
      { speed: '1.50×', label: 'Fast', file: '3.POA-L-EN1.50.mp3' },
    ]
  },
  {
    num: 4, title: 'Price Presentation',
    files: [
      { speed: '1.25×', label: 'Slow', file: '4.Price-presentation-EN1.25.mp3' },
      { speed: '1.37×', label: 'Medium', file: '4.Price-presentation-EN1.37.mp3' },
      { speed: '1.50×', label: 'Fast', file: '4.Price-presentation-EN1.50.mp3' },
    ]
  }
];

const BASE_URL = 'https://peterluo.homes/mp3/';
const STORAGE_KEY = 'lpen_stats_v1';

// ── State ──
let stats = loadStats();
let currentAudio = null;
let currentPhase = null;
let selectedSpeed = {}; // phaseNum -> index
let openPhase = null;
let rafId = null;

function loadStats() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && d.plays) return d;
  } catch(e) {}
  return { plays: {}, totalSeconds: 0, days: [] };
}
function saveStats() { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); }

function recordPlay(file) {
  stats.plays[file] = (stats.plays[file] || 0) + 1;
  const today = new Date().toISOString().slice(0,10);
  if (!stats.days.includes(today)) stats.days.push(today);
  saveStats();
  updateStatsUI();
}

function addListenTime(sec) {
  stats.totalSeconds = (stats.totalSeconds || 0) + sec;
  saveStats();
  updateStatsUI();
}

function getStreak() {
  const days = (stats.days || []).slice().sort().reverse();
  if (!days.length) return 0;
  let streak = 1;
  for (let i = 1; i < days.length; i++) {
    const prev = new Date(days[i-1]);
    const curr = new Date(days[i]);
    const diff = (prev - curr) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  // Check if streak includes today or yesterday
  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (days[0] !== today && days[0] !== yesterday) return 0;
  return streak;
}

function fmtTime(s) {
  if (isNaN(s) || s < 0) s = 0;
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function fmtTotalTime(s) {
  if (s >= 3600) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    return h + 'h ' + m + 'm';
  }
  return Math.floor(s / 60) + 'm';
}

function getTotalPlays() {
  return Object.values(stats.plays).reduce((a, b) => a + b, 0);
}

function getFilePlays(file) {
  return stats.plays[file] || 0;
}

// ── Render ──
function render() {
  const app = document.getElementById('app');
  app.innerHTML = PHASES.map(p => {
    const isOpen = openPhase === p.num;
    const isActive = currentPhase === p.num;
    const si = selectedSpeed[p.num] || 0;
    const f = p.files[si];
    const plays = getFilePlays(f.file);
    return `
      <div class="phase-card ${isOpen ? 'open' : ''} ${isActive ? 'active' : ''}" data-phase="${p.num}">
        <div class="phase-header" onclick="togglePhase(${p.num})">
          <div class="phase-num">${p.num}</div>
          <div class="phase-info">
            <div class="phase-title">${p.title}</div>
            <div class="phase-meta">Phase ${p.num} · ${p.files.length} speeds</div>
          </div>
          <div class="phase-toggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="phase-body" id="body-${p.num}">
          <div class="phase-body-inner">
            <div class="speed-row">
              ${p.files.map((f, i) => `
                <button class="speed-btn ${i === si ? 'selected' : ''}" onclick="selectSpeed(${p.num}, ${i})">
                  ${f.speed}<span class="speed-label">${f.label}</span>
                </button>
              `).join('')}
            </div>
            <div class="player-controls">
              <button class="play-btn ${isActive && currentAudio && !currentAudio.paused ? 'playing' : ''}" onclick="togglePlay(${p.num})">
                ${isActive && currentAudio && !currentAudio.paused
                  ? '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'
                  : '<svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>'}
              </button>
              <div class="progress-area">
                <div class="progress-bar" onclick="seek(event, ${p.num})" id="pbar-${p.num}">
                  <div class="progress-fill" id="pfill-${p.num}"></div>
                </div>
                <div class="time-row">
                  <span id="tcur-${p.num}">0:00</span>
                  <span id="tdur-${p.num}">0:00</span>
                </div>
              </div>
            </div>
            ${plays > 0 ? `<div class="play-count"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg> Played ${plays} time${plays > 1 ? 's' : ''}</div>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Expand open phase
  if (openPhase) {
    const body = document.getElementById('body-' + openPhase);
    if (body) body.style.maxHeight = body.scrollHeight + 'px';
  }
}

function updateStatsUI() {
  document.getElementById('totalPlays').textContent = getTotalPlays();
  document.getElementById('totalTime').textContent = fmtTotalTime(stats.totalSeconds || 0);
  document.getElementById('streak').textContent = getStreak();
}

function togglePhase(num) {
  openPhase = openPhase === num ? null : num;
  render();
}

function selectSpeed(phaseNum, speedIdx) {
  const wasPlaying = currentPhase === phaseNum && currentAudio && !currentAudio.paused;
  if (currentPhase === phaseNum && currentAudio) {
    currentAudio.pause();
    currentAudio = null;
    currentPhase = null;
  }
  selectedSpeed[phaseNum] = speedIdx;
  render();
  if (wasPlaying) togglePlay(phaseNum);
}

let lastTimeSample = 0;

function togglePlay(phaseNum) {
  const si = selectedSpeed[phaseNum] || 0;
  const file = PHASES[phaseNum - 1].files[si].file;
  const url = BASE_URL + encodeURIComponent(file);

  // If clicking a different phase, stop current
  if (currentPhase && currentPhase !== phaseNum && currentAudio) {
    currentAudio.pause();
    flushListenTime();
    currentAudio = null;
    currentPhase = null;
  }

  // If same phase, toggle
  if (currentPhase === phaseNum && currentAudio) {
    if (currentAudio.paused) {
      currentAudio.play();
      lastTimeSample = Date.now();
      startProgressLoop();
    } else {
      currentAudio.pause();
      flushListenTime();
      cancelAnimationFrame(rafId);
    }
    render();
    return;
  }

  // New playback
  currentAudio = new Audio(url);
  currentPhase = phaseNum;
  lastTimeSample = Date.now();

  currentAudio.addEventListener('loadedmetadata', () => {
    const durEl = document.getElementById('tdur-' + phaseNum);
    if (durEl) durEl.textContent = fmtTime(currentAudio.duration);
  });

  currentAudio.addEventListener('ended', () => {
    flushListenTime();
    recordPlay(file);
    currentAudio.currentTime = 0;
    lastTimeSample = Date.now();
    currentAudio.play();
    render();
  });

  currentAudio.play().then(() => {
    render();
    startProgressLoop();
  }).catch(e => {
    console.error('Playback failed:', e);
    currentAudio = null;
    currentPhase = null;
  });
}

function flushListenTime() {
  if (lastTimeSample) {
    const elapsed = (Date.now() - lastTimeSample) / 1000;
    if (elapsed > 0 && elapsed < 3600) addListenTime(elapsed);
    lastTimeSample = 0;
  }
}

function startProgressLoop() {
  function tick() {
    if (!currentAudio || currentAudio.paused) return;
    const fill = document.getElementById('pfill-' + currentPhase);
    const tcur = document.getElementById('tcur-' + currentPhase);
    if (fill && currentAudio.duration) {
      fill.style.width = (currentAudio.currentTime / currentAudio.duration * 100) + '%';
    }
    if (tcur) tcur.textContent = fmtTime(currentAudio.currentTime);
    rafId = requestAnimationFrame(tick);
  }
  cancelAnimationFrame(rafId);
  tick();
}

function seek(e, phaseNum) {
  if (currentPhase !== phaseNum || !currentAudio || !currentAudio.duration) return;
  const bar = document.getElementById('pbar-' + phaseNum);
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  currentAudio.currentTime = pct * currentAudio.duration;
}

// ── Init ──
render();
updateStatsUI();
</script>
</body>
</html>
