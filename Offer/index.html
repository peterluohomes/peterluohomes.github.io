<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Offer Tracking — Pinnacle Listing System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2b4a;--gold:#c9a84c;--gold2:#e0c070;--cream:#faf6ee;--cream2:#f0e8d5;--border:#ddd3bc;--text:#2c2c2c;--muted:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--navy);border-bottom:3px solid var(--gold);padding:28px 24px 22px;text-align:center}
header h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold);letter-spacing:.5px}
header p{font-size:11px;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
main{flex:1;padding:28px 20px;max-width:480px;margin:0 auto;width:100%}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:0 2px 10px rgba(26,43,74,.06);transition:transform .15s,box-shadow .15s}
.card:active{transform:scale(.98);box-shadow:0 1px 4px rgba(26,43,74,.1)}
.card a{display:flex;align-items:center;gap:16px;padding:20px;text-decoration:none;color:inherit;min-height:80px}
.card-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.card-icon.single{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3)}
.card-icon.multi{background:rgba(26,43,74,.08);border:1px solid rgba(26,43,74,.2)}
.card-info{flex:1;min-width:0}
.card-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--navy);line-height:1.3}
.card-desc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4}
.card-arrow{font-size:20px;color:var(--border);flex-shrink:0}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);letter-spacing:.5px}
.footer strong{color:var(--navy)}
</style>
</head>
<body>
<header>
  <h1>Offer Tracking</h1>
  <p>Pinnacle Listing System</p>
</header>
<main>
  <div class="card">
    <a href="./soffer">
      <div class="card-icon single">📋</div>
      <div class="card-info">
        <div class="card-title">Single Offer Review</div>
        <div class="card-desc">Review and track one offer with full details, conditions, and clauses</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>
  <div class="card">
    <a href="./moffer">
      <div class="card-icon multi">📊</div>
      <div class="card-info">
        <div class="card-title">Multiple Offers Review</div>
        <div class="card-desc">Compare offers side-by-side in a tracking sheet</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>
</main>
<div class="footer"><strong>Peter Luo</strong> · RE/MAX Realtron Realty Inc., Brokerage · 647-824-3718</div>
</body>
</html>
