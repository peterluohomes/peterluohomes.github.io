<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" width="600" height="550">
  <defs>
    <!-- Red body gradients -->
    <linearGradient id="bodyFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="bodySide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#8E1414"/>
    </linearGradient>
    <linearGradient id="bodyTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <!-- Lid gradients -->
    <linearGradient id="lidFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <linearGradient id="lidSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#A21B1B"/>
    </linearGradient>
    <linearGradient id="lidTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F44336"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
    <!-- Inside dark gradient -->
    <linearGradient id="insideDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#1a2328"/>
    </linearGradient>
    <linearGradient id="insideSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <!-- Metal / steel gradient -->
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="40%" stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#90A4AE"/>
    </linearGradient>
    <linearGradient id="steelDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#78909C"/>
    </linearGradient>
    <!-- Yellow handle gradient -->
    <linearGradient id="yellowHandle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <!-- Orange screwdriver -->
    <linearGradient id="orangeHandle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="50%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <!-- Clasp metal -->
    <linearGradient id="claspMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="50%" stop-color="#BDBDBD"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
    <!-- Tape measure -->
    <linearGradient id="tapeYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="tapeDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <!-- Shadow -->
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(0,0,0,0.3)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Saw gradient -->
    <linearGradient id="sawBlade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#90A4AE"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="280" cy="510" rx="220" ry="35" fill="url(#shadow)"/>

  <!-- ============================================ -->
  <!-- TOOLBOX BODY (isometric open box) -->
  <!-- ============================================ -->

  <!-- Body - front face -->
  <path d="M80,340 L350,340 L350,470 L80,470 Z" fill="url(#bodyFront)"/>
  <!-- Body - right side face -->
  <path d="M350,340 L480,290 L480,420 L350,470 Z" fill="url(#bodySide)"/>
  <!-- Body - top rim front -->
  <path d="M80,340 L350,340 L480,290 L210,290 Z" fill="url(#bodyTop)"/>

  <!-- Inside back wall -->
  <path d="M90,290 L340,290 L470,245 L220,245 Z" fill="url(#insideDark)"/>
  <!-- Inside right wall -->
  <path d="M340,290 L470,245 L470,290 L340,340 Z" fill="url(#insideSide)"/>
  <!-- Inside bottom -->
  <path d="M90,340 L340,340 L470,290 L220,290 Z" fill="#1a2328"/>

  <!-- Front face highlight -->
  <path d="M80,340 L350,340 L350,348 L80,348 Z" fill="rgba(255,255,255,0.1)"/>

  <!-- Clasp left -->
  <rect x="160" y="332" width="30" height="22" rx="3" fill="url(#claspMetal)"/>
  <rect x="164" y="340" width="22" height="6" rx="2" fill="rgba(0,0,0,0.15)"/>
  <!-- Clasp right -->
  <rect x="260" y="332" width="30" height="22" rx="3" fill="url(#claspMetal)"/>
  <rect x="264" y="340" width="22" height="6" rx="2" fill="rgba(0,0,0,0.15)"/>

  <!-- ============================================ -->
  <!-- LID (open, tilted back in isometric) -->
  <!-- ============================================ -->

  <!-- Lid outside top face -->
  <path d="M210,110 L460,70 L530,120 L280,160 Z" fill="url(#lidTop)"/>
  <!-- Lid front face (visible because it's open) -->
  <path d="M210,110 L280,160 L280,200 L210,155 Z" fill="url(#lidFront)"/>
  <!-- Lid right side face -->
  <path d="M280,160 L530,120 L530,160 L280,200 Z" fill="url(#lidSide)"/>

  <!-- Lid inner face (dark) -->
  <path d="M220,120 L270,162 L270,195 L220,150 Z" fill="#263238"/>
  <path d="M270,162 L520,124 L520,155 L270,195 Z" fill="#37474F"/>

  <!-- Lid clasps (small silver rectangles) -->
  <g transform="translate(340, 134) rotate(-5)">
    <rect x="-8" y="-5" width="16" height="10" rx="2" fill="#B0BEC5"/>
  </g>
  <g transform="translate(430, 122) rotate(-5)">
    <rect x="-8" y="-5" width="16" height="10" rx="2" fill="#B0BEC5"/>
  </g>

  <!-- Hinge connecting lid to body -->
  <path d="M210,155 L210,290" stroke="#8E1414" stroke-width="3" fill="none"/>
  <path d="M215,160 L215,288" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>

  <!-- ============================================ -->
  <!-- TOOLS -->
  <!-- ============================================ -->

  <!-- === WRENCH (left, open-end spanner) === -->
  <g transform="translate(145, 135) rotate(-25)">
    <!-- Shaft -->
    <rect x="-5" y="0" width="11" height="160" rx="3" fill="url(#steel)"/>
    <rect x="-2" y="5" width="3" height="148" rx="1" fill="rgba(255,255,255,0.35)"/>
    <!-- Open-end head top -->
    <path d="M-14,-4 L-10,10 L-5,10 L-5,-8 L-2,-18 L3,-18 L6,-8 L6,10 L11,10 L15,-4 Q15,-24 0,-26 Q-14,-24 -14,-4Z" fill="url(#steel)" stroke="#90A4AE" stroke-width="0.8"/>
    <!-- Box-end bottom -->
    <ellipse cx="0.5" cy="162" rx="12" ry="12" fill="url(#steelDark)" stroke="#78909C" stroke-width="1"/>
    <ellipse cx="0.5" cy="162" rx="6" ry="6" fill="none" stroke="#607D8B" stroke-width="1.5"/>
  </g>

  <!-- === ADJUSTABLE WRENCH (behind) === -->
  <g transform="translate(195, 110) rotate(-12)">
    <!-- Shaft -->
    <rect x="-6" y="20" width="12" height="150" rx="3" fill="url(#steel)"/>
    <rect x="-3" y="25" width="3" height="140" rx="1" fill="rgba(255,255,255,0.3)"/>
    <!-- Fixed jaw -->
    <path d="M-6,20 L-6,-10 L-12,-10 L-12,-30 L-4,-30 L-4,0 L6,0 L6,20Z" fill="url(#steel)" stroke="#90A4AE" stroke-width="0.7"/>
    <!-- Movable jaw -->
    <path d="M6,20 L6,-5 L14,-5 L14,-25 L6,-25 L6,-10 L10,-10 L10,0 Z" fill="url(#steelDark)" stroke="#78909C" stroke-width="0.7"/>
    <!-- Worm screw -->
    <circle cx="0" cy="10" r="5" fill="#90A4AE" stroke="#78909C" stroke-width="0.8"/>
    <line x1="-3" y1="10" x2="3" y2="10" stroke="#607D8B" stroke-width="1"/>
  </g>

  <!-- === SCREWDRIVER (yellow/orange handle) === -->
  <g transform="translate(250, 100) rotate(-5)">
    <!-- Handle -->
    <rect x="-9" y="0" width="18" height="55" rx="6" fill="url(#orangeHandle)"/>
    <!-- Handle ridges -->
    <line x1="-7" y1="10" x2="-7" y2="48" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
    <line x1="7" y1="10" x2="7" y2="48" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
    <line x1="-4" y1="8" x2="-4" y2="50" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Handle cap -->
    <ellipse cx="0" cy="4" rx="8" ry="5" fill="#FFB300"/>
    <!-- Ferrule -->
    <rect x="-5" y="52" width="10" height="10" rx="2" fill="#9E9E9E"/>
    <!-- Shaft -->
    <rect x="-3" y="60" width="6" height="110" rx="2" fill="url(#steel)"/>
    <rect x="-1" y="65" width="2" height="100" rx="1" fill="rgba(255,255,255,0.4)"/>
    <!-- Tip (flathead) -->
    <polygon points="-4.5,170 4.5,170 3,185 -3,185" fill="#78909C"/>
  </g>

  <!-- === LEVEL/RULER (tall, behind) === -->
  <g transform="translate(300, 80) rotate(4)">
    <!-- Body -->
    <rect x="-7" y="0" width="14" height="180" rx="2" fill="url(#steel)"/>
    <rect x="-5" y="5" width="10" height="170" rx="1" fill="#B0BEC5"/>
    <!-- Level bubble -->
    <rect x="-4" y="75" width="8" height="18" rx="3" fill="#80CBC4" opacity="0.7"/>
    <ellipse cx="0" cy="84" rx="2.5" ry="2.5" fill="#4DB6AC" opacity="0.8"/>
    <!-- Edge highlight -->
    <rect x="-7" y="0" width="3" height="180" rx="1" fill="rgba(255,255,255,0.15)"/>
    <!-- Measurement marks -->
    <line x1="-4" y1="20" x2="4" y2="20" stroke="#78909C" stroke-width="0.5"/>
    <line x1="-4" y1="40" x2="4" y2="40" stroke="#78909C" stroke-width="0.5"/>
    <line x1="-4" y1="60" x2="4" y2="60" stroke="#78909C" stroke-width="0.5"/>
    <line x1="-4" y1="100" x2="4" y2="100" stroke="#78909C" stroke-width="0.5"/>
    <line x1="-4" y1="120" x2="4" y2="120" stroke="#78909C" stroke-width="0.5"/>
    <line x1="-4" y1="140" x2="4" y2="140" stroke="#78909C" stroke-width="0.5"/>
    <line x1="-4" y1="160" x2="4" y2="160" stroke="#78909C" stroke-width="0.5"/>
  </g>

  <!-- === HAMMER (right side) === -->
  <g transform="translate(370, 105) rotate(18)">
    <!-- Handle -->
    <rect x="-5" y="30" width="10" height="140" rx="3" fill="url(#yellowHandle)"/>
    <!-- Handle grip lines -->
    <line x1="-3" y1="60" x2="-3" y2="160" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    <line x1="3" y1="60" x2="3" y2="160" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    <rect x="-2" y="35" width="2.5" height="130" rx="1" fill="rgba(255,255,255,0.12)"/>
    <!-- Hammer head -->
    <rect x="-25" y="0" width="50" height="32" rx="5" fill="#78909C"/>
    <rect x="-25" y="0" width="50" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
    <!-- Face -->
    <rect x="-25" y="4" width="12" height="24" rx="3" fill="#607D8B"/>
    <!-- Claw -->
    <path d="M20,32 Q30,32 33,18 L28,18 Q27,28 22,28 Z" fill="#607D8B"/>
    <path d="M18,32 Q22,36 28,22 L24,20 Q22,30 18,28 Z" fill="#546E7A"/>
  </g>

  <!-- === SAW (right edge, blade sticking out bottom-right) === -->
  <g transform="translate(420, 180) rotate(35)">
    <!-- Handle -->
    <path d="M-15,-5 Q-15,-18 -5,-18 L20,-18 L25,-12 L25,12 L20,18 L-5,18 Q-15,18 -15,5 Z" fill="url(#yellowHandle)"/>
    <!-- Handle hole -->
    <ellipse cx="5" cy="0" rx="8" ry="10" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
    <!-- Blade -->
    <rect x="22" y="-3" width="130" height="6" fill="url(#sawBlade)"/>
    <!-- Saw teeth -->
    <path d="M22,3 L30,8 L38,3 L46,8 L54,3 L62,8 L70,3 L78,8 L86,3 L94,8 L102,3 L110,8 L118,3 L126,8 L134,3 L142,8 L150,3 L150,3 L22,3Z" fill="#90A4AE" stroke="#78909C" stroke-width="0.5"/>
    <!-- Blade highlight -->
    <rect x="25" y="-2" width="125" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- ============================================ -->
  <!-- TAPE MEASURE (front, leaning against box) -->
  <!-- ============================================ -->
  <g transform="translate(115, 400)">
    <!-- Tape body -->
    <circle cx="0" cy="0" r="42" fill="url(#tapeYellow)"/>
    <circle cx="0" cy="0" r="38" fill="#F9A825"/>
    <!-- Dark center ring -->
    <circle cx="0" cy="0" r="22" fill="url(#tapeDark)"/>
    <!-- Text "25'" -->
    <text x="0" y="2" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="bold" fill="#FFD54F">25'</text>
    <!-- Highlight -->
    <ellipse cx="-12" cy="-14" rx="18" ry="12" fill="rgba(255,255,255,0.12)" transform="rotate(-20)"/>
    <!-- Lock switch -->
    <rect x="18" y="-5" width="8" height="10" rx="2" fill="#333"/>
    <!-- Tape strip coming out -->
    <path d="M38,-3 L95,-28 L95,-22 L38,3 Z" fill="#FDD835" stroke="#F9A825" stroke-width="0.5"/>
    <path d="M38,-3 L95,-28" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
    <!-- Tape hook -->
    <rect x="92" y="-32" width="6" height="14" rx="1" fill="#90A4AE"/>
    <!-- Measurement marks on tape -->
    <line x1="50" y1="-18" x2="50" y2="-14" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>
    <line x1="60" y1="-21" x2="60" y2="-17" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>
    <line x1="70" y1="-24" x2="70" y2="-20" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>
    <line x1="80" y1="-27" x2="80" y2="-23" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>
  </g>

  <!-- Body bottom edge shadow -->
  <path d="M80,470 L350,470 L480,420 L480,425 L350,475 L80,475 Z" fill="rgba(0,0,0,0.15)"/>

</svg>