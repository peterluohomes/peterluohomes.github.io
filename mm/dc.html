<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A1A2E;--blue:#2C5F7C;--blue-light:#3A7CA5;--green:#2E7D32;--green-bg:#E8F5E9;--orange:#D4760A;--orange-bg:#FFF3E0;--gray:#64748B;--light:#F8FAFC;--lighter:#EBF3F8;--white:#FFFFFF;--red:#C62828;--red-bg:#FFEBEE;--radius:12px;--shadow:0 2px 12px rgba(26,26,46,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--navy);min-height:100vh}
.nav{background:var(--navy);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.nav-title{color:var(--white);font-size:18px;font-weight:700;letter-spacing:-0.3px}
.nav-modes{display:flex;gap:6px;margin-left:auto}
.nav-btn{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.nav-btn:hover{background:rgba(255,255,255,0.15);color:var(--white)}
.nav-btn.active{background:var(--blue);color:var(--white);border-color:var(--blue-light)}
.container{max-width:860px;margin:0 auto;padding:32px 24px}
.section{margin-bottom:32px;animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section-header{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--navy);color:var(--white);border-radius:var(--radius) var(--radius) 0 0;font-size:15px;font-weight:700;letter-spacing:0.5px;cursor:pointer;user-select:none;transition:background 0.2s}
.section-header:hover{background:#252542}
.section-header .emoji{font-size:20px}
.section-header .toggle{margin-left:auto;font-size:18px;transition:transform 0.3s}
.section-header.collapsed .toggle{transform:rotate(-90deg)}
.section-body{background:var(--white);border:1px solid #E2E8F0;border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:20px;overflow:hidden;transition:max-height 0.4s ease,padding 0.3s}
.section-body.hidden{max-height:0;padding:0 20px;border:none}
.delivery-cue{background:var(--green-bg);border-left:3px solid var(--green);padding:10px 16px;border-radius:0 8px 8px 0;margin-bottom:16px;font-size:13px;color:var(--green);font-style:italic}
.delivery-cue::before{content:"🎯 "}
.flow-map{background:var(--lighter);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.flow-map .label{font-weight:700;color:var(--blue);margin-right:4px}
.flow-step{background:var(--white);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;color:var(--navy);border:1px solid #E2E8F0}
.flow-arrow{color:var(--blue-light);font-size:14px}
.beat-label{font-size:13px;font-weight:600;color:var(--blue);font-style:italic;margin:16px 0 8px;padding-left:4px}
.anchor-line{padding:12px 16px;margin:8px 0;border-radius:8px;border-left:3px solid var(--orange);background:#FFFAF5;transition:all 0.2s;cursor:pointer;position:relative}
.anchor-line:hover{background:var(--orange-bg);transform:translateX(2px)}
.anchor-word{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--orange);background:rgba(212,118,10,0.1);padding:2px 8px;border-radius:4px;margin-right:8px}
.anchor-script{font-size:14.5px;line-height:1.65;color:var(--navy)}
.anchor-cue{display:block;margin-top:6px;font-size:12px;font-style:italic;color:var(--green)}
.response-box{background:#FFF8E1;border-left:3px solid #F9A825;padding:10px 16px;border-radius:0 8px 8px 0;margin:8px 0;font-size:13px;color:#7B6B2E}
.response-box::before{content:"↩ ";font-weight:700}
.goal-box{background:#F0F4FF;border-left:3px solid #5B7FDB;padding:10px 16px;border-radius:0 8px 8px 0;margin-bottom:16px;font-size:13px;color:#3B5998}
.goal-box::before{content:"🎯 Goal: ";font-weight:700}
.tip-box{background:#F3E5F5;border-left:3px solid #9C27B0;padding:10px 16px;border-radius:0 8px 8px 0;margin:8px 0;font-size:13px;color:#6A1B9A}
.tip-box::before{content:"💡 ";font-weight:700}
.stage-dir{font-size:13px;font-style:italic;color:var(--gray);padding:4px 0 4px 20px}
/* Quiz */
.quiz-container{text-align:center;padding:40px 20px}
.quiz-progress{display:flex;gap:4px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.quiz-dot{width:28px;height:6px;border-radius:3px;background:#E2E8F0;transition:all 0.3s}
.quiz-dot.done{background:var(--green)}.quiz-dot.current{background:var(--orange);width:40px}.quiz-dot.wrong{background:var(--red)}
.score-bar{background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;gap:20px;box-shadow:var(--shadow)}
.score-label{font-size:13px;color:var(--gray);font-weight:500}.score-value{font-size:24px;font-weight:700;color:var(--navy)}.score-detail{font-size:13px;color:var(--gray);margin-left:auto}
.quiz-section-label{font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.quiz-prompt{font-size:28px;font-weight:700;color:var(--navy);margin-bottom:8px}
.quiz-hint{font-size:14px;color:var(--gray);margin-bottom:32px}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:500px;margin:0 auto 24px}
.quiz-option{padding:16px;border:2px solid #E2E8F0;border-radius:var(--radius);background:var(--white);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--navy)}
.quiz-option:hover{border-color:var(--blue);background:var(--lighter)}
.quiz-option.correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.quiz-reveal{background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:24px;margin:24px auto;max-width:600px;text-align:left;box-shadow:var(--shadow)}
.quiz-reveal .script{font-size:15px;line-height:1.7;color:var(--navy)}
.quiz-next-btn{background:var(--blue);color:var(--white);border:none;padding:14px 32px;border-radius:8px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:16px}
.quiz-next-btn:hover{background:var(--blue-light);transform:translateY(-1px)}
/* Fill */
.fill-container{padding:20px 0}.fill-card{background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.fill-section-tag{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.fill-anchor{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--orange);background:rgba(212,118,10,0.1);padding:2px 8px;border-radius:4px;margin-bottom:12px;display:inline-block}
.fill-text{font-size:15px;line-height:1.75;color:var(--navy)}
.fill-blank{display:inline-block;min-width:100px;border-bottom:2px dashed var(--orange);color:transparent;padding:0 4px;margin:0 2px;cursor:pointer;transition:all 0.3s;border-radius:2px;user-select:none}
.fill-blank:hover{background:rgba(212,118,10,0.05)}
.fill-blank.revealed{color:var(--green);font-weight:600;border-bottom-color:var(--green);background:rgba(46,125,50,0.05)}
.fill-controls{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.fill-ctrl-btn{background:var(--white);color:var(--navy);border:1px solid #E2E8F0;padding:10px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.fill-ctrl-btn:hover{border-color:var(--blue);background:var(--lighter)}
.fill-ctrl-btn.active{background:var(--blue);color:var(--white);border-color:var(--blue)}
/* Teleprompter */
.teleprompter-container{background:#0A0A14;border-radius:var(--radius);padding:40px 32px;min-height:500px;position:relative;overflow:hidden}
.teleprompter-text{color:rgba(255,255,255,0.35);font-size:22px;line-height:2;transition:all 0.3s}
.teleprompter-text .tp-line{display:block;padding:8px 0;transition:all 0.4s;cursor:pointer}
.teleprompter-text .tp-line.active{color:rgba(255,255,255,0.95);font-size:24px;transform:scale(1.01)}
.teleprompter-text .tp-line.near{color:rgba(255,255,255,0.55)}
.teleprompter-text .tp-line .tp-anchor{color:var(--orange);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;background:rgba(212,118,10,0.2);padding:2px 6px;border-radius:4px;margin-right:6px}
.teleprompter-text .tp-line .tp-section-break{display:block;color:var(--blue-light);font-size:13px;font-weight:700;letter-spacing:1px;margin-top:20px;margin-bottom:4px;text-transform:uppercase}
.tp-controls{display:flex;justify-content:center;gap:12px;margin-top:24px}
.tp-btn{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.15);padding:10px 24px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.tp-btn:hover{background:rgba(255,255,255,0.15);color:white}
.tp-speed{color:rgba(255,255,255,0.5);font-size:13px;text-align:center;margin-top:12px}
@media(max-width:640px){.nav{flex-wrap:wrap;padding:12px 16px}.nav-modes{width:100%;overflow-x:auto}.nav-btn{white-space:nowrap;font-size:12px;padding:6px 12px}.quiz-options{grid-template-columns:1fr}.quiz-prompt{font-size:22px}.teleprompter-text{font-size:18px}.teleprompter-text .tp-line.active{font-size:20px}}

.fl-word{cursor:pointer;transition:all 0.2s;border-bottom:1px dotted var(--orange);padding:0 1px}
.fl-word:hover{background:rgba(212,118,10,0.05)}
.fl-word.fl-revealed{border-bottom-color:var(--green);color:var(--green);font-weight:600}

.fl-container{padding:20px 0}
.fl-card{background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.fl-text{font-size:15px;line-height:2;color:var(--navy);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-title">🔍 Discovery Trainer</div>
  <div class="nav-modes">
    <button class="nav-btn active" onclick="setMode('read')">📖 Read</button>
    <button class="nav-btn" onclick="setMode('quiz')">🧠 Quiz</button>
    <button class="nav-btn" onclick="setMode('fill')">✏️ Fill Blanks</button>
    <button class="nav-btn" onclick="setMode('firstletter')">🔤 First Letter</button>
    <button class="nav-btn" onclick="setMode('teleprompter')">📺 Teleprompter</button>
  </div>
</nav>
<div class="container" id="app"></div>
<script>
const DATA=[
{id:"agenda",emoji:"⚡",title:"THE AGENDA (Sitting Down)",cue:"Confident, calm. Reduce their anxiety by showing you have a clear roadmap.",flow:["Promise","Multiple opinions?","3-step roadmap","Permission to ask"],lines:[
{anchor:"PROMISE",script:"Jane, Mike… Before we dive in, I promise: By the time we finish today, you'll have a clear, customized plan to get your home sold for the absolute maximum the market will pay — with minimal stress."},
{anchor:"MULTIPLE OPINIONS",script:"Quick question before we start — are you getting multiple opinions on listing your home?"},
{type:"response",text:"If yes: \"Great. Smart sellers often do. What matters most to you in choosing who to work with?\" (Note their answer — address it throughout.)"},
{type:"response",text:"If no: \"Appreciate the trust. I'll make sure you feel confident we're the right fit.\""},
{anchor:"ROADMAP",script:"To make sure we cover everything and protect your time, here's our simple 3-step roadmap: Understand your situation and goals, build your tailored marketing plan, and comparative market analysis and pricing strategy."},
{anchor:"PERMISSION",script:"The first step is the foundation — the more I understand your unique situation, the better I can deliver exactly what you're looking for. With your permission, may I ask a few questions?"},
]},
{id:"why",emoji:"❓",title:"DISCOVERY PART 1: WHY",cue:"Empathetic, curious. Mirror, echo, reflect. Let them talk 80% of the time.",flow:["Big picture","Route by emotion","Go deeper","Perfect outcome"],lines:[
{anchor:"BIG PICTURE",script:"Thank you. Let's start with the big picture — what's bringing you to the point of thinking about selling right now?"},
{type:"stage",text:"Listen carefully and choose the appropriate response"},
{type:"response",text:"If Positive (Upsizing/Relocation/New chapter): \"That's exciting! What are you looking forward to most about this change? My job is to make this easy so you can focus on what's next.\""},
{type:"response",text:"If Difficult (Divorce/Debt/Probate/Health): \"Thank you for sharing — I know that's not easy. This stays completely confidential, and I've helped many families in similar situations move forward quickly and discreetly.\""},
{anchor:"GO DEEPER",script:"What makes now the right time? What's changed recently?"},
{anchor:"PERFECT OUTCOME",script:"If everything goes perfectly, what does this move really allow you to do next?"},
]},
{id:"where",emoji:"📍",title:"DISCOVERY PART 1: WHERE",cue:"Curious, forward-looking. Connect their motivation to their next chapter.",flow:["Bridge from WHY","Found something?","Still looking?","Reflect back"],lines:[
{anchor:"JOURNEY",script:"That makes total sense. So where does this journey take you next — have you started looking for your next place, or found something already?"},
{type:"response",text:"If they've found something: \"That's exciting — tell me about it! What do you love most? Do you already have an accepted offer or a firm closing date?\""},
{type:"response",text:"If still looking: \"What are you looking for in your next home? And roughly, what price range are you targeting?\" (Helps reverse-engineer needed sale price)"},
{anchor:"REFLECT BACK",script:"So you're moving to [location/type] because [their reason] — that sounds like a great fit for what you described."},
]},
{id:"when",emoji:"📅",title:"DISCOVERY PART 1: WHEN",cue:"Practical, protective. You're looking out for their timeline and finances.",flow:["Sell before buy?","Ideal date","Strong offer scenario","Flexibility"],lines:[
{anchor:"SELL FIRST",script:"To keep you safe financially — does this home need to sell before you can buy the next one?"},
{anchor:"IDEAL DATE",script:"In your ideal scenario, what's the perfect move-out date? Any must-hit deadlines — job start, school, lease ending?"},
{anchor:"STRONG OFFER",script:"If we get a strong offer tomorrow, what's the earliest you'd be ready to hand over keys?",cue:"← Use if needed"},
{anchor:"FLEXIBILITY",script:"Would you need flexibility — like staying a few extra days after closing?",cue:"← Use if needed"},
]},
{id:"priorities",emoji:"🎯",title:"PART 2: PRIORITIES",cue:"Direct but warm. Help them rank what matters most.",flow:["Price vs Speed vs Stress","Rank them","Success definition"],lines:[
{anchor:"MOST IMPORTANT",script:"That gives me a clear picture — thank you. When it comes to selling, what's most important to you? Some people tell me \"the absolute highest price possible\"… others want a quick sale so they can move on… and some just want it to be as low-stress as possible. What feels most important for you?"},
{type:"response",text:"If they say \"everything\": \"That's very common. If you had to rank them — price, timing, and convenience — how would you order them?\""},
{anchor:"SUCCESS",script:"When this is all done, what would make you feel like it was a complete success?"},
]},
{id:"concerns",emoji:"⚠️",title:"PART 2: CONCERNS",cue:"Gentle, protective. Surface the fears they might not volunteer.",flow:["Deal-breakers","Eliminate one worry","Examples if stuck"],lines:[
{anchor:"DEAL-BREAKERS",script:"Price gets the headlines, but the terms are what keep you safe. Besides price, do you have any deal-breakers? Specific dates? Fixtures you want to keep?"},
{anchor:"ONE WORRY",script:"I want to take the weight off your shoulders. If you could eliminate one specific worry from this process right now, what would it be?"},
{type:"stage",text:"If they hesitate, offer examples:"},
{type:"response",text:"\"Is it strangers walking through your home? The negotiation? Or just the uncertainty of not knowing the timeline?\""},
{type:"response",text:"After they answer: \"Perfect. That's exactly what we'll manage together.\""},
]},
{id:"decision",emoji:"🧭",title:"PART 2: DECISION-MAKING",cue:"Calibrating. Adjust your language based on their experience level.",flow:["Last time sold?","Route by experience","Taken care of","Communication"],lines:[
{anchor:"LAST TIME",script:"To help me tailor this process — when was the last time you sold a home?"},
{type:"response",text:"If recent (1-5 years): \"How was that experience? What worked well, and what was missing that you really need this time?\""},
{type:"response",text:"If long ago (10+ years): \"A lot has changed since then — especially with technology and buyer behavior. I'll guide you through every step so nothing catches you off guard.\""},
{type:"response",text:"If first time: \"That's exciting — you're in good hands. I'll walk you through every step so you never feel lost or unsure.\""},
{anchor:"TAKEN CARE OF",script:"When all is said and done, what's the one thing that will make you feel truly taken care of?"},
{anchor:"COMMUNICATION",script:"For communication — what works best: text, email, or call? And how often for updates: weekly, only when there's news, or something else?"},
]},
{id:"recap",emoji:"🎬",title:"PART 3: THE RECAP",cue:"Confident playback. Prove you listened. This is your credibility moment.",flow:["Summarize everything","Confirm","Protect equity","Dream price"],lines:[
{anchor:"STRAIGHT",script:"Just to make sure I've got everything straight…"},
{anchor:"PLAYBACK",script:"It sounds like the main reason you're selling is [motivation], you're hoping to [next plans], ideally around [timeline]. Your top priorities are [priorities in order], and you want to make sure [key concerns] are handled well. You're looking for an agent who [what they said matters]."},
{anchor:"MISS ANYTHING",script:"Did I miss anything or get anything wrong? I want to be sure I'm seeing it exactly the way you do."},
{type:"stage",text:"They confirm"},
{anchor:"PROTECT EQUITY",script:"Perfect. My job now is to protect your equity and deliver exactly what you've described."},
{anchor:"DREAM PRICE",script:"Last question — just between us: What's the dream price you're quietly hoping for? Even a ballpark helps.",cue:"← This unlocks their real expectation"},
{type:"tip",text:"If commission question arises: \"Excellent question — we'll go through every cost line-by-line in Step 3 so you see exactly what you keep. For now, knowing your target helps me build the strongest pricing strategy possible.\""},
{anchor:"TRANSITION",script:"Transition to Tailored Plan →"},
]}
];

const ALL_ANCHORS=[];DATA.forEach(s=>s.lines.forEach(l=>{if(l.anchor)ALL_ANCHORS.push({...l,sectionTitle:s.title,sectionEmoji:s.emoji})}));
let currentMode='read',quizState={index:0,score:0,answered:[]},tpState={currentLine:0,playing:false,interval:null,speed:3000},fillDifficulty=3;

function setMode(m){currentMode=m;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`.nav-btn[onclick="setMode('${m}')"]`).classList.add('active');if(m==='quiz')quizState={index:0,score:0,answered:new Array(ALL_ANCHORS.length).fill(null)};if(m==='firstletter'){}
  if(m==='teleprompter'){tpState.currentLine=0;tpState.playing=false;clearInterval(tpState.interval)}render()}

function render(){const app=document.getElementById('app');switch(currentMode){case'read':app.innerHTML=renderRead();break;case'quiz':app.innerHTML=renderQuiz();break;case'fill':app.innerHTML=renderFill();break;case'firstletter':app.innerHTML=renderFirstLetter();break;case'teleprompter':app.innerHTML=renderTeleprompter();break}}

function renderRead(){return DATA.map(section=>`<div class="section"><div class="section-header" onclick="toggleSection(this)"><span class="emoji">${section.emoji}</span>${section.title}<span class="toggle">▼</span></div><div class="section-body"><div class="delivery-cue">${section.cue}</div>${section.flow?`<div class="flow-map"><span class="label">Flow:</span>${section.flow.map((f,i)=>`<span class="flow-step">${f}</span>${i<section.flow.length-1?'<span class="flow-arrow">→</span>':''}`).join('')}</div>`:'' }${section.lines.map(line=>{if(line.type==='response')return`<div class="response-box">${line.text}</div>`;if(line.type==='tip')return`<div class="tip-box">${line.text}</div>`;if(line.type==='stage')return`<div class="stage-dir">(${line.text})</div>`;let h='';if(line.beat)h+=`<div class="beat-label">${line.beat}</div>`;h+=`<div class="anchor-line"><span class="anchor-word">${line.anchor}</span><span class="anchor-script">${line.script}</span>${line.cue?`<span class="anchor-cue">${line.cue}</span>`:''}</div>`;return h}).join('')}</div></div>`).join('')}

function toggleSection(el){el.classList.toggle('collapsed');el.nextElementSibling.classList.toggle('hidden')}

function renderQuiz(){const total=ALL_ANCHORS.length,current=ALL_ANCHORS[quizState.index],correct=quizState.answered.filter(a=>a===true).length;if(quizState.index>=total)return`<div class="quiz-container"><div class="quiz-prompt">🎉 Complete!</div><div class="score-bar" style="justify-content:center;flex-direction:column;gap:8px;"><div class="score-value" style="font-size:48px;">${correct}/${total}</div><div class="score-label">${correct===total?'Perfect!':correct>=total*0.8?'Strong!':'Keep practicing.'}</div></div><button class="quiz-next-btn" onclick="quizState={index:0,score:0,answered:new Array(${total}).fill(null)};render();">Try Again</button></div>`;const options=[current.anchor],others=ALL_ANCHORS.filter((_,i)=>i!==quizState.index).map(a=>a.anchor);while(options.length<4&&others.length>0){const idx=Math.floor(Math.random()*others.length);if(!options.includes(others[idx]))options.push(others[idx]);others.splice(idx,1)}for(let i=options.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[options[i],options[j]]=[options[j],options[i]]}const answered=quizState.answered[quizState.index];return`<div class="quiz-container"><div class="quiz-progress">${quizState.answered.map((a,i)=>`<div class="quiz-dot ${i===quizState.index?'current':a===true?'done':a===false?'wrong':''}"></div>`).join('')}</div><div class="score-bar"><div><div class="score-label">Score</div><div class="score-value">${correct}</div></div><div><div class="score-label">Question</div><div class="score-value">${quizState.index+1}/${total}</div></div><div class="score-detail">${current.sectionEmoji} ${current.sectionTitle}</div></div><div class="quiz-section-label">What anchor comes next?</div><div class="quiz-prompt">${quizState.index===0?'First anchor?':`After: ${ALL_ANCHORS[quizState.index-1].anchor}`}</div><div class="quiz-options">${options.map(opt=>`<div class="quiz-option ${answered!==null?(opt===current.anchor?'correct':quizState._selected===opt?'wrong':''):''}" onclick="${answered===null?`quizAnswer('${opt.replace(/'/g,"\\'")}','${current.anchor.replace(/'/g,"\\'")}')`:''}" style="${answered!==null?'cursor:default;':''}">${opt}</div>`).join('')}</div>${answered!==null?`<div class="quiz-reveal"><div style="margin-bottom:8px;"><span class="anchor-word">${current.anchor}</span></div><div class="script">${current.script}</div>${current.cue?`<div style="margin-top:8px;font-size:13px;color:var(--green);font-style:italic;">${current.cue}</div>`:''}</div><button class="quiz-next-btn" onclick="quizState.index++;render();">Next →</button>`:''}</div>`}

function quizAnswer(s,c){quizState.answered[quizState.index]=s===c;quizState._selected=s;if(s===c)quizState.score++;render()}

function splitResponse(text){
  // Try to split on first quoted portion: label "script"
  var m=text.match(/^(.*?)\u201c(.*?)\u201d(.*)$/);
  if(m) return {label:m[1].trim(), script:m[2].trim(), suffix:m[3].trim()};
  // Try escaped straight quotes
  m=text.match(/^(.*?)"(.*?)"(.*)$/);
  if(m) return {label:m[1].trim(), script:m[2].trim(), suffix:m[3].trim()};
  // Try split on first colon followed by text
  var ci=text.indexOf(':');
  if(ci>0 && ci<text.length-1) return {label:text.substring(0,ci+1).trim(), script:text.substring(ci+1).trim(), suffix:''};
  return {label:'', script:text, suffix:''};
}

function renderFill(){return`<div class="fill-container"><div class="fill-controls"><button class="fill-ctrl-btn ${fillDifficulty===1?'active':''}" onclick="fillDifficulty=1;render();">★</button><button class="fill-ctrl-btn ${fillDifficulty===2?'active':''}" onclick="fillDifficulty=2;render();">★★</button><button class="fill-ctrl-btn ${fillDifficulty===3?'active':''}" onclick="fillDifficulty=3;render();">★★★</button><button class="fill-ctrl-btn ${fillDifficulty===4?'active':''}" onclick="fillDifficulty=4;render();">★★★★</button><button class="fill-ctrl-btn ${fillDifficulty===5?'active':''}" onclick="fillDifficulty=5;render();">★★★★★</button><button class="fill-ctrl-btn ${fillDifficulty===6?'active':''}" onclick="fillDifficulty=6;render();">★★★★★★</button></div><p style="text-align:center;font-size:13px;color:var(--gray);margin-bottom:24px;">Click blanks to reveal.</p><div style="text-align:center;font-size:11px;color:var(--gray);margin-bottom:20px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;"><span>★ Key words</span><span>★★ Every 4th</span><span>★★★ Every 2nd</span><span>★★★★ 3 of 4</span><span>★★★★★ First 3 words</span><span>★★★★★★ Anchor only</span></div>${DATA.map(section=>`<div class="fill-card"><div class="fill-section-tag">${section.emoji} ${section.title}</div>${section.lines.map(line=>{if(line.type==='response'){var r=splitResponse(line.text);return`<div class="response-box" style="display:block;"><span>${r.label}</span> <span class="fill-text" style="display:inline;">${blankify(r.script,fillDifficulty)}</span>${r.suffix?' <span style="font-style:italic;opacity:0.7;">'+r.suffix+'</span>':''}</div>`}if(line.type==='tip'){return`<div class="tip-box">${line.text}</div>`}if(line.type==='stage'){return`<div class="stage-dir">(${line.text})</div>`}if(!line.anchor)return'';let h='';if(line.beat)h+=`<div class="beat-label">${line.beat}</div>`;h+=`<div style="margin:8px 0;"><span class="fill-anchor">${line.anchor}</span><div class="fill-text">${blankify(line.script,fillDifficulty)}</div></div>`;return h}).join('')}</div>`).join('')}</div>`}

function blankify(t,d){
  var w=t.split(' ');
  var B=function(x){return '<span class="fill-blank" onclick="this.classList.add(\'revealed\')">'+x+'</span>'};
  if(d===6) return w.map(B).join(' ');
  if(d===5){var skip=0;for(var j=0;j<w.length&&j<5;j++){if(/[,&…]/.test(w[j])||w[j]==='&'){skip=j+1;}else if(skip>0){break;}}return w.map(function(x,i){return i<skip+3?x:B(x)}).join(' ');}
  if(d===4) return w.map(function(x,i){return i%4===0?x:B(x)}).join(' ');
  if(d===3) return w.map(function(x,i){return i%2===1?B(x):x}).join(' ');
  if(d===2) return w.map(function(x,i){return i%4===3?B(x):x}).join(' ');
  return w.map(function(x){
    var c=x.replace(/[^a-zA-Z]/g,'').toLowerCase();
    if(c.length>5) return B(x);
    return x;
  }).join(' ');
}

function firstLetterify(t){
  var w=t.split(' ');
  return w.map(function(x,i){
    if(x.length===0) return x;
    var first=x.charAt(0);
    var rest=x.substring(1).replace(/[a-zA-Z]/g,'_');
    var hint=first+rest;
    return '<span class="fl-word" data-w="'+encodeURIComponent(x)+'" onclick="this.textContent=decodeURIComponent(this.getAttribute(\'data-w\'));this.classList.add(\'fl-revealed\')">'+hint+'</span>';
  }).join(' ');
}


function renderFirstLetter(){
  return '<div class="fl-container"><p style="text-align:center;font-size:13px;color:var(--gray);margin-bottom:24px;">First letter shown, rest hidden. Click a word to reveal it. Practice recalling from just the first letters.</p>'+
  DATA.map(function(section){
    return '<div class="fl-card"><div class="fill-section-tag">'+section.emoji+' '+section.title+'</div>'+
    section.lines.map(function(line){
      if(line.type==='response'){
        var r=splitResponse(line.text);
        return '<div class="response-box" style="display:block;"><span>'+r.label+'</span> <span class="fl-text" style="display:inline;">'+firstLetterify(r.script)+'</span>'+(r.suffix?' <span style="font-style:italic;opacity:0.7;">'+r.suffix+'</span>':'')+'</div>';
      }
      if(line.type==='tip') return '<div class="tip-box">'+line.text+'</div>';
      if(line.type==='stage') return '<div class="stage-dir">('+line.text+')</div>';
      if(!line.anchor) return '';
      var h='';
      if(line.beat) h+='<div class="beat-label">'+line.beat+'</div>';
      h+='<div style="margin:12px 0;"><span class="fill-anchor">'+line.anchor+'</span><div class="fl-text">'+firstLetterify(line.script)+'</div></div>';
      return h;
    }).join('')+'</div>';
  }).join('')+'</div>';
}

function renderTeleprompter(){const allLines=[];DATA.forEach(s=>{allLines.push({type:'section',text:`${s.emoji} ${s.title}`});s.lines.forEach(l=>{if(l.type==='response')allLines.push({type:'response',text:`↩ ${l.text}`});else if(l.type==='tip')allLines.push({type:'tip',text:`💡 ${l.text}`});else if(l.type==='stage')allLines.push({type:'stage',text:`(${l.text})`});else if(l.anchor)allLines.push({type:'line',anchor:l.anchor,text:l.script})})});return`<div class="teleprompter-container"><div class="teleprompter-text">${allLines.map((l,i)=>{const cls=i===tpState.currentLine?'active':Math.abs(i-tpState.currentLine)<=2?'near':'';if(l.type==='section')return`<span class="tp-line ${cls}" onclick="tpGoTo(${i})"><span class="tp-section-break">${l.text}</span></span>`;if(l.type==='response'||l.type==='tip')return`<span class="tp-line ${cls}" onclick="tpGoTo(${i})" style="font-style:italic;font-size:16px;color:rgba(249,168,37,0.7);">${l.text}</span>`;if(l.type==='stage')return`<span class="tp-line ${cls}" onclick="tpGoTo(${i})" style="font-style:italic;font-size:16px;">${l.text}</span>`;return`<span class="tp-line ${cls}" onclick="tpGoTo(${i})"><span class="tp-anchor">${l.anchor}</span>${l.text}</span>`}).join('')}</div></div><div class="tp-controls"><button class="tp-btn" onclick="tpPrev()">← Prev</button><button class="tp-btn" onclick="tpTogglePlay()">${tpState.playing?'⏸ Pause':'▶ Play'}</button><button class="tp-btn" onclick="tpNext()">Next →</button></div><div class="tp-speed">Speed: <button class="tp-btn" style="padding:4px 12px;font-size:12px;" onclick="tpChangeSpeed(-500)">−</button> ${(tpState.speed/1000).toFixed(1)}s <button class="tp-btn" style="padding:4px 12px;font-size:12px;" onclick="tpChangeSpeed(500)">+</button> &nbsp;|&nbsp; Arrow keys to navigate</div>`}

function tpGoTo(i){tpState.currentLine=i;render();scrollTpActive()}
function tpNext(){const n=[];DATA.forEach(s=>{n.push({});s.lines.forEach(()=>n.push({}))});if(tpState.currentLine<n.length-1)tpState.currentLine++;render();scrollTpActive()}
function tpPrev(){if(tpState.currentLine>0)tpState.currentLine--;render();scrollTpActive()}
function tpTogglePlay(){tpState.playing=!tpState.playing;if(tpState.playing)tpState.interval=setInterval(tpNext,tpState.speed);else clearInterval(tpState.interval);render()}
function tpChangeSpeed(d){tpState.speed=Math.max(1000,Math.min(8000,tpState.speed+d));if(tpState.playing){clearInterval(tpState.interval);tpState.interval=setInterval(tpNext,tpState.speed)}render()}
function scrollTpActive(){const a=document.querySelector('.tp-line.active');if(a)a.scrollIntoView({behavior:'smooth',block:'center'})}
document.addEventListener('keydown',e=>{if(currentMode==='teleprompter'){if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();tpNext()}if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();tpPrev()}if(e.key===' '){e.preventDefault();tpTogglePlay()}}});
render();
</script>
</body>
