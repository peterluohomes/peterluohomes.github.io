<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daily Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#15273f; --navy2:#1d3458; --gold:#c7a45a; --gold-d:#a8843a;
  --cream:#f8f3e8; --card:#fffdf7; --ink:#202833; --muted:#5d6675; --line:#e7dec9;
  --good:#2f7d5b;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);background:var(--cream);
  line-height:1.5;padding-bottom:calc(2rem + env(safe-area-inset-bottom))}
h1,h2{font-family:'Playfair Display',Georgia,serif}
.wrap{max-width:760px;margin:0 auto}

header{background:var(--navy);color:#fff;padding:1.1rem 1rem .9rem;border-bottom:3px solid var(--gold)}
header .eyebrow{font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:700}
header h1{font-size:1.7rem;font-weight:800;margin-top:.15rem}
header p{font-size:.8rem;color:#c8cfdb;margin-top:.15rem}

.datebar{position:sticky;top:0;z-index:20;background:var(--navy2);color:#fff;
  padding:.55rem 1rem;display:flex;align-items:center;gap:.5rem;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.datebar .lbl{font-weight:700;font-size:.95rem;min-width:11rem;text-align:center}
.navbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;
  width:2.1rem;height:2.1rem;border-radius:8px;font-size:1.1rem;cursor:pointer;line-height:1}
.navbtn:hover{background:rgba(255,255,255,.22)}
.today-btn{background:var(--gold);border:none;color:var(--navy);font-weight:700;font-size:.78rem;
  padding:.45rem .7rem;border-radius:8px;cursor:pointer;letter-spacing:.04em}

main{max-width:760px;margin:0 auto;padding:1rem .8rem 3rem}

/* summary */
.summary{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem;
  margin-bottom:1rem;display:flex;gap:1rem;align-items:center;box-shadow:0 1px 3px rgba(20,30,50,.05)}
.ring{flex:0 0 auto;position:relative;width:84px;height:84px}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .pct b{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--navy);line-height:1}
.ring .pct span{font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.sumright{flex:1 1 auto;min-width:0}
.sumright .big{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--navy);font-weight:700}
.sumright .streak{font-size:.78rem;color:var(--gold-d);font-weight:700;margin-top:.1rem}
.sumright .streak.none{color:var(--muted);font-weight:500}
.strip{display:flex;gap:.35rem;margin-top:.6rem}
.dot{flex:1;text-align:center;cursor:pointer;border:none;background:none;padding:0}
.dot .c{width:100%;max-width:2rem;aspect-ratio:1;margin:0 auto;border-radius:50%;border:1.5px solid var(--line);
  background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff}
.dot.today .c{box-shadow:0 0 0 2px var(--navy)}
.dot .d{font-size:.55rem;color:var(--muted);margin-top:.2rem}

.tools{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.btn{font-family:inherit;font-weight:700;font-size:.78rem;border-radius:9px;padding:.45rem .8rem;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--navy)}
.btn:hover{border-color:var(--gold)}

/* categories */
.cat{margin-bottom:1.1rem}
.cathead{display:flex;align-items:baseline;justify-content:space-between;gap:.5rem;
  padding:0 .2rem .35rem;border-bottom:2px solid var(--gold);margin-bottom:.5rem}
.cathead .ct{font-family:'Playfair Display',serif;font-size:1.12rem;font-weight:800;color:var(--navy)}
.cathead .ct small{font-family:'DM Sans';font-weight:500;font-size:.72rem;color:var(--muted);letter-spacing:.02em;margin-left:.4rem}
.cathead .cnt{font-size:.78rem;font-weight:700;color:var(--gold-d);font-variant-numeric:tabular-nums;white-space:nowrap}

.item{display:flex;align-items:center;gap:.7rem;background:var(--card);border:1px solid var(--line);
  border-radius:11px;padding:.55rem .7rem;margin-bottom:.4rem;transition:background .15s}
.item.done{background:#f3efe2}
.chk{appearance:none;-webkit-appearance:none;flex:0 0 auto;width:1.45rem;height:1.45rem;border:2px solid var(--gold);
  border-radius:7px;cursor:pointer;position:relative;background:#fff}
.chk:checked{background:var(--gold);border-color:var(--gold)}
.chk:checked::after{content:"";position:absolute;left:.45rem;top:.18rem;width:.32rem;height:.62rem;
  border:solid #fff;border-width:0 .17rem .17rem 0;transform:rotate(45deg)}
.chk:focus-visible{outline:2px solid var(--navy);outline-offset:2px}
.link{flex:1 1 auto;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:.6rem;
  text-decoration:none;color:inherit}
.link .nm{font-weight:600;font-size:.95rem;color:var(--navy);overflow:hidden;text-overflow:ellipsis}
.item.done .nm{color:var(--muted);text-decoration:line-through}
.link .go{flex:0 0 auto;display:flex;align-items:center;gap:.35rem;color:var(--gold-d);font-size:.7rem;font-weight:700}
.link .go .arrow{font-size:1rem;line-height:1}
.link:hover .nm{color:var(--gold-d)}

#toast{position:fixed;left:50%;bottom:1.3rem;transform:translateX(-50%) translateY(2rem);background:var(--navy);color:#fff;
  padding:.6rem 1.1rem;border-radius:10px;font-size:.85rem;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);
  opacity:0;transition:.3s;pointer-events:none;z-index:50;border-left:3px solid var(--gold)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{font-size:.72rem;color:var(--muted);text-align:center;margin-top:1rem;line-height:1.5}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="eyebrow">Command Center</div>
    <h1>Daily Directory</h1>
    <p>Open each tool, check off what you've done. Resets fresh every day.</p>
  </div>
</header>

<div class="datebar">
  <button class="navbtn" id="prevDay" aria-label="Previous day">&#8249;</button>
  <span class="lbl" id="dateLbl"></span>
  <button class="navbtn" id="nextDay" aria-label="Next day">&#8250;</button>
  <button class="today-btn" id="todayBtn">Today</button>
</div>

<main>
  <div class="summary">
    <div class="ring">
      <svg width="84" height="84" viewBox="0 0 84 84">
        <circle cx="42" cy="42" r="34" fill="none" stroke="#e7dec9" stroke-width="8"></circle>
        <circle id="ringFg" cx="42" cy="42" r="34" fill="none" stroke="#c7a45a" stroke-width="8"
          stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"></circle>
      </svg>
      <div class="pct"><b id="ringPct">0%</b><span>done</span></div>
    </div>
    <div class="sumright">
      <div class="big" id="sumText">0 of 0 done today</div>
      <div class="streak none" id="streakText">No streak yet</div>
      <div class="strip" id="strip"></div>
    </div>
  </div>

  <div class="tools">
    <button class="btn" id="resetDay">Clear this day</button>
  </div>

  <div id="cats"></div>

  <p class="note">Links open in a new tab so this board stays put. Your check-offs are saved on this device only.</p>
</main>

<div id="toast"></div>

<script>
"use strict";

/* ---------------- activity directory ---------------- */
const CONFIG = [
  {cat:"Daily Work", items:[
    {id:"planer", name:"Planer", path:"./planer"}
  ]},
  {cat:"Wellness", items:[
    {id:"wellness", name:"Wellness Tracker", path:"./pd/wellness"},
    {id:"relax",    name:"Relaxing",         path:"./pd/relax"},
    {id:"fasting",  name:"Fasting Journal",  path:"./pd/fasting"},
    {id:"sleep",    name:"Sleep Journal",    path:"./pd/sleep"}
  ]},
  {cat:"Dev", items:[
    {id:"routines", name:"Routines", path:"./pd/routines"},
    {id:"precepts", name:"Precepts", path:"./pd/precepts"},
    {id:"mental",   name:"Mental",   path:"./pd/mentalimprov"},
    {id:"yuanyuan", name:"Yuanyuan", path:"./pd/yuanyuan"}
  ]},
  {cat:"Leads", items:[
    {id:"leadfollow", name:"Lead Follow up",   path:"./leads/expired"},
    {id:"doorknock",  name:"Door Knocking",    path:"./leads/doorknock"},
    {id:"expired",    name:"Expired Listings", path:"./leads/followup"}
  ]},
  {cat:"Listing", items:[
    {id:"clientcomm",   name:"Client Communication",            path:"./tools/tracker"},
    {id:"sellercomm",   name:"Seller Communication",            path:"./seller/scomms"},
    {id:"sellerupdate", name:"Seller Update",                   path:"./seller/supdate"},
    {id:"clientservice",name:"Client Service",                  path:"./seller/sservice"},
    {id:"delivery",     name:"System-based Delivery",           path:"./seller/sdelivery"},
    {id:"checkfreehold",name:"Sold to Closing Checklist \u2014 Freehold", path:"./seller/checklist_freehold"},
    {id:"checkcondo",   name:"Sold to Closing Checklist \u2014 Condo",    path:"./seller/checklist_potlcondo"},
    {id:"commpaths",    name:"Five Communication Paths",        path:"./tools/communicationpaths"},
    {id:"feedback",     name:"Feedback Collection",             path:"./tools/feedback"}
  ]},
  {cat:"Practicing", sub:"Listing Presentation (EN)", items:[
    {id:"prac_voice",    name:"Voice",    path:"./mm/flp5"},
    {id:"prac_anchor",   name:"Anchor",   path:"./listing/lpanchor"},
    {id:"prac_random",   name:"Random",   path:"./tools/drill"},
    {id:"prac_memorize", name:"Memorize", path:"./mm/"},
    {id:"prac_script",   name:"Script",   path:"./listings/lpscript2"}
  ]}
];
const ALL_IDS = CONFIG.flatMap(c=>c.items.map(i=>i.id));
const TOTAL = ALL_IDS.length;
const RING_C = 213.6;

/* ---------------- helpers ---------------- */
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,"0");
const todayISO = () => { const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); };
function shiftDate(iso,days){ const [y,m,d]=iso.split("-").map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+days); return dt.getFullYear()+"-"+pad(dt.getMonth()+1)+"-"+pad(dt.getDate()); }
function toDate(iso){ const [y,m,d]=iso.split("-").map(Number); return new Date(y,m-1,d); }
const WD=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function prettyDate(iso){ const d=toDate(iso); const t=todayISO(); if(iso===t)return "Today, "+MON[d.getMonth()]+" "+d.getDate(); if(iso===shiftDate(t,-1))return "Yesterday"; return WD[d.getDay()]+", "+MON[d.getMonth()]+" "+d.getDate(); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1600); }

/* ---------------- IndexedDB ---------------- */
let db;
function openDB(){ return new Promise((res,rej)=>{
  const r=indexedDB.open("dailyDirectoryDB",1);
  r.onupgradeneeded=e=>{ const d=e.target.result; if(!d.objectStoreNames.contains("days")) d.createObjectStore("days",{keyPath:"date"}); };
  r.onsuccess=e=>{db=e.target.result;res();}; r.onerror=e=>rej(e.target.error);
}); }
function tx(m){ return db.transaction("days",m).objectStore("days"); }
function dbGet(date){ return new Promise((res,rej)=>{const r=tx("readonly").get(date);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}); }
function dbAll(){ return new Promise((res,rej)=>{const r=tx("readonly").getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);}); }
function dbPut(v){ return new Promise((res,rej)=>{const r=tx("readwrite").put(v);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}); }
function dbDel(k){ return new Promise((res,rej)=>{const r=tx("readwrite").delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}); }

/* ---------------- state ---------------- */
let curDate, dayDone={}, allDays=[];

/* ---------------- build list (once) ---------------- */
function buildList(){
  const root=$("cats");
  CONFIG.forEach((c,ci)=>{
    const sec=document.createElement("div"); sec.className="cat";
    const sub=c.sub?'<small>'+c.sub+'</small>':'';
    sec.innerHTML='<div class="cathead"><div class="ct">'+c.cat+sub+'</div><div class="cnt" data-cat="'+ci+'">0/'+c.items.length+'</div></div>';
    c.items.forEach(it=>{
      const row=document.createElement("div"); row.className="item"; row.id="row_"+it.id;
      row.innerHTML=
        '<input type="checkbox" class="chk" id="chk_'+it.id+'" aria-label="Mark '+it.name+' done">'+
        '<a class="link" href="'+it.path+'" target="_blank" rel="noopener">'+
          '<span class="nm">'+it.name+'</span>'+
          '<span class="go">open <span class="arrow">&#8599;</span></span>'+
        '</a>';
      sec.appendChild(row);
      row.querySelector(".chk").addEventListener("change",e=>toggle(it.id,e.target.checked));
    });
    root.appendChild(sec);
  });
}

/* ---------------- rendering ---------------- */
function refreshChecks(){
  ALL_IDS.forEach(id=>{
    const chk=$("chk_"+id), row=$("row_"+id);
    const on=!!dayDone[id]; chk.checked=on; row.classList.toggle("done",on);
  });
  // category counts
  CONFIG.forEach((c,ci)=>{
    const done=c.items.filter(i=>dayDone[i.id]).length;
    document.querySelector('.cnt[data-cat="'+ci+'"]').textContent=done+"/"+c.items.length;
  });
  // overall
  const done=ALL_IDS.filter(id=>dayDone[id]).length;
  const pct=TOTAL?Math.round(done/TOTAL*100):0;
  $("ringFg").style.strokeDashoffset = RING_C*(1-done/TOTAL);
  $("ringFg").setAttribute("stroke", pct===100?"#2f7d5b":"#c7a45a");
  $("ringPct").textContent=pct+"%";
  $("sumText").textContent = done+" of "+TOTAL+" done "+(curDate===todayISO()?"today":"this day");
}

function renderStreak(){
  // active-day streak: consecutive days (ending today or yesterday) with >=1 done
  const map={}; allDays.forEach(d=>{ map[d.date]=Object.keys(d.done||{}).length; });
  let streak=0, cur=todayISO();
  if(!(map[cur]>0)) cur=shiftDate(cur,-1); // allow streak to count through yesterday if today not started
  while(map[cur]>0){ streak++; cur=shiftDate(cur,-1); }
  const el=$("streakText");
  if(streak>=1){ el.textContent=streak+"-day streak"; el.classList.remove("none"); }
  else { el.textContent="No streak yet \u2014 check one off"; el.classList.add("none"); }
}

function renderStrip(){
  const map={}; allDays.forEach(d=>{ map[d.date]=Object.keys(d.done||{}).length; });
  const strip=$("strip"); strip.innerHTML="";
  for(let i=6;i>=0;i--){
    const iso=shiftDate(todayISO(),-i);
    const cnt=map[iso]||0, pct=cnt/TOTAL;
    const b=document.createElement("button"); b.className="dot"+(iso===curDate?" today":"");
    const fill = cnt===0 ? "var(--cream)" : (pct>=1 ? "var(--good)" : "var(--gold)");
    const op = cnt===0?1:Math.max(.35,pct);
    b.innerHTML='<div class="c" style="background:'+fill+';opacity:'+op+'">'+(cnt||"")+'</div><div class="d">'+WD[toDate(iso).getDay()][0]+'</div>';
    b.addEventListener("click",()=>loadDate(iso));
    strip.appendChild(b);
  }
}

async function loadDate(iso){
  curDate=iso; $("dateLbl").textContent=prettyDate(iso);
  const rec=await dbGet(iso); dayDone=rec&&rec.done?rec.done:{};
  refreshChecks(); renderStrip(); renderStreak();
}

async function toggle(id,on){
  if(on) dayDone[id]=true; else delete dayDone[id];
  const rec={date:curDate,done:dayDone};
  if(Object.keys(dayDone).length) await dbPut(rec); else await dbDel(curDate);
  // refresh cache entry
  allDays = allDays.filter(d=>d.date!==curDate);
  if(Object.keys(dayDone).length) allDays.push({date:curDate,done:{...dayDone}});
  refreshChecks(); renderStrip(); renderStreak();
}

/* ---------------- controls ---------------- */
$("prevDay").addEventListener("click",()=>loadDate(shiftDate(curDate,-1)));
$("nextDay").addEventListener("click",()=>loadDate(shiftDate(curDate,1)));
$("todayBtn").addEventListener("click",()=>loadDate(todayISO()));
$("resetDay").addEventListener("click",async()=>{
  if(!Object.keys(dayDone).length){ toast("Nothing to clear"); return; }
  if(!confirm("Clear all check-offs for "+prettyDate(curDate)+"?")) return;
  dayDone={}; await dbDel(curDate); allDays=allDays.filter(d=>d.date!==curDate);
  refreshChecks(); renderStrip(); renderStreak(); toast("Day cleared");
});

/* ---------------- init ---------------- */
(async function(){
  try{ await openDB(); }
  catch(e){ alert("Storage couldn't start. If you're in private browsing, switch to a normal window so your check-offs can be saved."); return; }
  buildList();
  allDays=await dbAll();
  await loadDate(todayISO());
})();
</script>
</body>
</html>
