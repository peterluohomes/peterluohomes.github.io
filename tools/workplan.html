<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

:root {
  --nv: #162A3E;
  --au: #C2A04E;
  --au2: #A6873A;
  --c7: #E0E8EF;
  --bg: #F7F9FC;
  --border: #999;
  --header-bg: #D9E2EC;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  font-family: 'Manrope', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Screen controls */
.screen-controls {
  max-width: 1060px;
  margin: 12px auto 8px;
  padding: 0 16px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.ctrl-btn {
  padding: 5px 16px;
  background: var(--au);
  color: #fff;
  border: none;
  font-family: 'Manrope', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}
.ctrl-btn:hover { background: var(--au2); }

.ctrl-btn-outline {
  padding: 5px 16px;
  background: transparent;
  color: var(--nv);
  border: 1px solid var(--c7);
  font-family: 'Manrope', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}
.ctrl-btn-outline:hover { border-color: var(--au); color: var(--au); }

.spacer { flex: 1; }

/* Page container — landscape letter size */
.page {
  width: 1056px;
  min-height: 816px;
  margin: 0 auto 20px;
  background: #fff;
  padding: 28px 36px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  position: relative;
}

/* Title */
.title-row {
  display: flex;
  align-items: baseline;
  margin-bottom: 12px;
}

.title-label {
  font-size: 16px;
  font-weight: 800;
  color: var(--nv);
  white-space: nowrap;
}

.title-input {
  flex: 1;
  border: none;
  border-bottom: 1px solid var(--border);
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--nv);
  padding: 2px 8px;
  margin-left: 8px;
  outline: none;
}
.title-input:focus { border-bottom-color: var(--au); }

/* Two-column layout */
.columns {
  display: flex;
  gap: 20px;
}

.col {
  flex: 1;
}

/* Table */
.task-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}

.task-table th {
  background: var(--header-bg);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 10px;
  color: var(--nv);
  padding: 5px 6px;
  border: 1px solid var(--border);
  text-align: center;
}

.task-table td {
  border: 1px solid var(--border);
  padding: 3px 5px;
  vertical-align: middle;
  height: 24px;
}

.task-table .col-status { width: 36px; text-align: center; }
.task-table .col-task { }
.task-table .col-date { width: 82px; text-align: center; }
.task-table .col-actions { width: 40px; text-align: center; border: none; }

/* Row action buttons */
.row-actions {
  display: flex;
  gap: 2px;
  justify-content: center;
}

.row-btn {
  width: 16px; height: 16px;
  border: none; background: transparent;
  font-size: 12px; color: #bbb;
  cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px;
  font-family: 'Manrope', sans-serif;
}
.row-btn:hover { color: var(--au); background: #f5f0e0; }
.row-btn.delete:hover { color: #C0392B; background: #fdecea; }

/* Editable cells */
.cell-input {
  width: 100%;
  border: none;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  color: var(--nv);
  padding: 0;
  outline: none;
  background: transparent;
}

.cell-input.center { text-align: center; }

/* Checkbox */
.status-cb {
  width: 14px;
  height: 14px;
  cursor: pointer;
  accent-color: var(--au);
}

/* Add row button */
.add-row-btn {
  display: block;
  width: 100%;
  margin-top: 4px;
  padding: 3px 0;
  background: transparent;
  border: 1px dashed var(--c7);
  color: var(--au);
  font-family: 'Manrope', sans-serif;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
}
.add-row-btn:hover { border-color: var(--au); background: #FDFBF5; }

@media print {
  body { background: #fff; }
  .screen-controls, .add-row-btn, .col-actions { display: none !important; }
  .page {
    box-shadow: none;
    margin: 0;
    padding: 20px 28px;
    width: 100%;
    min-height: auto;
  }
  @page {
    size: letter landscape;
    margin: 0.3in;
  }
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
</style>
</head>
<body>

<script>
// ── IndexedDB STORAGE LAYER ──────────────────────────────────────
const DB_NAME = 'plWorkplanDB';
const DB_VERSION = 1;
const STORE_NAME = 'workplan';
const DB_KEY = 'workplanState';
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = e => reject(e.target.error);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(key, val) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(STORE_NAME, 'readwrite');
    const req = tx.objectStore(STORE_NAME).put(val, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbClear() {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ── Auto-save (debounced) ────────────────────────────────────────
let _saveTimer = null;
function autoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    if (_db) {
      const state = getCurrentState();
      dbPut(DB_KEY, state).catch(e => console.error('IndexedDB save error:', e));
    }
  }, 400);
}

function getCurrentState() {
  return {
    title: document.getElementById('titleInput').value,
    left: getTableData('tbodyLeft'),
    right: getTableData('tbodyRight'),
  };
}

// ── Attach auto-save listeners to all inputs in a tbody ──────────
function attachAutoSave(tbody) {
  tbody.addEventListener('input', autoSave);
  tbody.addEventListener('change', autoSave);
}

// ── FILENAME / PRINT ─────────────────────────────────────────────
function buildFilename() {
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  let hh = now.getHours();
  const ampm = hh >= 12 ? 'PM' : 'AM';
  hh = hh % 12 || 12;
  const HH = String(hh).padStart(2, '0');
  const MM = String(now.getMinutes()).padStart(2, '0');
  const titleVal = document.getElementById('titleInput').value.trim();
  const address = titleVal ? titleVal.replace(/[<>:"/\\|?*]+/g, '').replace(/\s+/g, ' ').trim() : 'Workplan';
  return `${address}-${yyyy}-${mm}-${dd}-${HH}${MM}${ampm}`;
}

function updateDocTitle() {
  document.title = buildFilename();
}

function printWithTitle() {
  updateDocTitle();
  window.print();
}

// ── TABLE OPERATIONS ─────────────────────────────────────────────
function createRow(data) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-status"><input type="checkbox" class="status-cb" ${data.done ? 'checked' : ''}></td>
    <td class="col-task"><input class="cell-input" value="${data.task}" placeholder="Task description"></td>
    <td class="col-date"><input class="cell-input center" type="date" value="${data.start}"></td>
    <td class="col-date"><input class="cell-input center" type="date" value="${data.finish}"></td>
    <td class="col-actions">
      <div class="row-actions">
        <button class="row-btn insert" title="Insert row below" onclick="insertBelow(this)">+</button>
        <button class="row-btn delete" title="Delete row" onclick="deleteRow(this)">✕</button>
      </div>
    </td>
  `;
  return tr;
}

function insertBelow(btn) {
  const tr = btn.closest('tr');
  const newRow = createRow({ done: false, task: '', start: '', finish: '' });
  tr.parentNode.insertBefore(newRow, tr.nextSibling);
  autoSave();
}

function deleteRow(btn) {
  const tr = btn.closest('tr');
  tr.remove();
  autoSave();
}

function addRow(tbodyId) {
  const tbody = document.getElementById(tbodyId);
  tbody.appendChild(createRow({ done: false, task: '', start: '', finish: '' }));
  autoSave();
}

function initTable(tbodyId, tasks) {
  const tbody = document.getElementById(tbodyId);
  tbody.innerHTML = '';
  tasks.forEach(t => tbody.appendChild(createRow(t)));
}

function getTableData(tbodyId) {
  const rows = document.querySelectorAll('#' + tbodyId + ' tr');
  const data = [];
  rows.forEach(tr => {
    const cb = tr.querySelector('.status-cb');
    const inputs = tr.querySelectorAll('.cell-input');
    data.push({
      done: cb ? cb.checked : false,
      task: inputs[0] ? inputs[0].value : '',
      start: inputs[1] ? inputs[1].value : '',
      finish: inputs[2] ? inputs[2].value : '',
    });
  });
  return data;
}

// ── Restore full state ───────────────────────────────────────────
function restoreState(state) {
  if (state.title !== undefined) {
    document.getElementById('titleInput').value = state.title;
  }
  if (state.left) initTable('tbodyLeft', state.left);
  if (state.right) initTable('tbodyRight', state.right);
  updateDocTitle();
}

// ── SAVE / LOAD JSON FILES ───────────────────────────────────────
function saveData() {
  const data = getCurrentState();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = buildFilename() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function loadData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      // Restore title — if JSON title is empty, extract address from the JSON filename
      let title = data.title || '';
      if (!title) {
        const baseName = file.name.replace(/\.json$/i, '');
        const cleaned = baseName.replace(/-\d{4}-\d{2}-\d{2}-\d{2}\d{2}(AM|PM)$/i, '');
        if (cleaned && cleaned !== baseName) {
          title = cleaned;
        }
      }
      data.title = title;

      restoreState(data);
      autoSave();
    } catch (err) {
      alert('Error loading file: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ── CLEAR DB ─────────────────────────────────────────────────────
function clearDB() {
  if (!confirm('Clear all saved data from IndexedDB?\nThe work plan will be emptied. This cannot be undone.')) return;
  const reset = () => {
    document.getElementById('tbodyLeft').innerHTML = '';
    document.getElementById('tbodyRight').innerHTML = '';
    document.getElementById('titleInput').value = '';
    updateDocTitle();
  };
  if (_db) {
    dbClear().then(reset).catch(e => console.error('Clear error:', e));
  } else {
    reset();
  }
}

// ── INIT ─────────────────────────────────────────────────────────
// Attach auto-save listeners to both tbodies (delegation covers added rows too)
attachAutoSave(document.getElementById('tbodyLeft'));
attachAutoSave(document.getElementById('tbodyRight'));
document.getElementById('titleInput').addEventListener('input', () => { updateDocTitle(); autoSave(); });

openDB().then(() => dbGet(DB_KEY)).then(saved => {
  if (saved && typeof saved === 'object' && (saved.left || saved.right)) {
    restoreState(saved);
  } else {
    initTable('tbodyLeft', leftTasks);
    initTable('tbodyRight', rightTasks);
    updateDocTitle();
  }
}).catch(err => {
  console.error('IndexedDB init failed:', err);
  initTable('tbodyLeft', leftTasks);
  initTable('tbodyRight', rightTasks);
  updateDocTitle();
});
</script>
