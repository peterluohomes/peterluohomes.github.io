<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peter Luo Homes — All posts</title>
<meta name="description" content="Toronto & York Region real estate">
<link rel="stylesheet" href="/blog/assets/style.css">
</head>
<body>
<header class="site">
  <a class="brand" href="/blog/en/">Peter Luo Homes</a>
  <nav><a class="on" href="/blog/en/">All posts</a><a href="/blog/zh/">中文</a></nav>
</header>
<main class="index">
  <p class="tagline">Toronto & York Region real estate</p>
  <ul class="cards" id="cards"><li class="empty">No posts yet.</li></ul>
</main>
<footer class="site"><span>© 2026 Peter Luo Homes</span></footer>
<script>
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
fetch('posts.json?t='+Date.now()).then(function(r){return r.json();}).then(function(d){
  var posts=(d.posts||d||[]).slice().sort(function(a,b){return String(b.date||'').localeCompare(String(a.date||''));});
  var el=document.getElementById('cards');
  if(!posts.length){el.innerHTML='<li class="empty">No posts yet.</li>';return;}
  el.innerHTML=posts.map(function(p){
    var u=p.mediaUrl||p.thumb||'';
    var t=p.mediaType||(p.thumb?'image':'');
    var thumb= (t==='video'&&u) ? '<video muted playsinline preload="metadata" src="'+esc(u)+'#t=0.5"></video>'
             : (u ? '<img loading="lazy" src="'+esc(u)+'" alt="">' : '');
    return '<li class="card"><a href="'+esc(p.url)+'">'+
      '<div class="thumb">'+thumb+'</div>'+
      '<div class="c"><span class="d">'+esc(p.dateLabel||p.date)+'</span>'+
      '<h2>'+esc(p.title)+'</h2><p>'+esc(p.excerpt||'')+'</p>'+
      '<span class="more">Read more →</span></div></a></li>';
  }).join('');
}).catch(function(){document.getElementById('cards').innerHTML='<li class="empty">No posts yet.</li>';});
</script>
</body>
</html>
