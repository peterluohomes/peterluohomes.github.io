<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="circle"><circle cx="128" cy="128" r="118"/></clipPath>
  </defs>
  <!-- navy backing circle -->
  <circle cx="128" cy="128" r="126" fill="#15273f"/>
  <!-- your photo, cropped to a circle -->
  <image clip-path="url(#circle)" x="8" y="8" width="240" height="240"
         preserveAspectRatio="xMidYMid slice"
         href="https://peterluo.homes/peterluol.png"
         xlink:href="https://peterluo.homes/peterluol.png"/>
  <!-- gold brand ring -->
  <circle cx="128" cy="128" r="118" fill="none" stroke="#c7a45a" stroke-width="7"/>
</svg>
