<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POA Memorization Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1A1A2E;
  --blue: #2C5F7C;
  --blue-light: #3A7CA5;
  --green: #2E7D32;
  --green-bg: #E8F5E9;
  --orange: #D4760A;
  --orange-bg: #FFF3E0;
  --gray: #64748B;
  --light: #F8FAFC;
  --lighter: #EBF3F8;
  --white: #FFFFFF;
  --red: #C62828;
  --red-bg: #FFEBEE;
  --gold: #F9A825;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(26,26,46,0.08);
  --shadow-lg: 0 8px 32px rgba(26,26,46,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--light);
  color: var(--navy);
  min-height: 100vh;
}

/* === NAV === */
.nav {
  background: var(--navy);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.nav-title {
  color: var(--white);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.nav-modes {
  display: flex;
  gap: 6px;
  margin-left: auto;
}
.nav-btn {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 16px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-btn:hover { background: rgba(255,255,255,0.15); color: var(--white); }
.nav-btn.active {
  background: var(--blue);
  color: var(--white);
  border-color: var(--blue-light);
}

/* === MAIN CONTAINER === */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* === MODE 1: READ THROUGH === */
.section {
  margin-bottom: 32px;
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  background: var(--navy);
  color: var(--white);
  border-radius: var(--radius) var(--radius) 0 0;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.section-header:hover { background: #252542; }
.section-header .emoji { font-size: 20px; }
.section-header .toggle {
  margin-left: auto;
  font-size: 18px;
  transition: transform 0.3s;
}
.section-header.collapsed .toggle { transform: rotate(-90deg); }

.section-body {
  background: var(--white);
  border: 1px solid #E2E8F0;
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 20px;
  overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s;
}
.section-body.hidden {
  max-height: 0;
  padding: 0 20px;
  border: none;
}

.delivery-cue {
  background: var(--green-bg);
  border-left: 3px solid var(--green);
  padding: 10px 16px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--green);
  font-style: italic;
}

.section-subtitle {
  font-size: 14.5px;
  font-weight: 500;
  color: var(--blue);
  background: var(--lighter);
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 12px;
  line-height: 1.5;
  border-left: 3px solid var(--blue-light);
}
.delivery-cue::before { content: "🎯 "; }

.flow-map {
  background: var(--lighter);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 13px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
}
.flow-map .label {
  font-weight: 700;
  color: var(--blue);
  margin-right: 4px;
}
.flow-step {
  background: var(--white);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--navy);
  border: 1px solid #E2E8F0;
}
.flow-arrow { color: var(--blue-light); font-size: 14px; }

.beat-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--blue);
  font-style: italic;
  margin: 16px 0 8px;
  padding-left: 4px;
}

.anchor-line {
  padding: 12px 16px;
  margin: 8px 0;
  border-radius: 8px;
  border-left: 3px solid var(--orange);
  background: #FFFAF5;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}
.anchor-line:hover {
  background: var(--orange-bg);
  transform: translateX(2px);
}
.anchor-word {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--orange);
  background: rgba(212,118,10,0.1);
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 8px;
}
.anchor-script {
  font-size: 14.5px;
  line-height: 1.65;
  color: var(--navy);
}
.anchor-cue {
  display: block;
  margin-top: 6px;
  font-size: 12px;
  font-style: italic;
  color: var(--green);
}

.stage-dir {
  font-size: 13px;
  font-style: italic;
  color: var(--gray);
  padding: 4px 0 4px 20px;
}

.checkin-box {
  background: var(--orange-bg);
  border-left: 3px solid var(--orange);
  border-radius: 0 8px 8px 0;
  padding: 12px 16px;
  margin-top: 16px;
  font-size: 14px;
}
.checkin-box .tag {
  font-weight: 700;
  color: var(--orange);
  font-size: 13px;
}

/* === MODE 2: ANCHOR CHAIN QUIZ === */
.quiz-container {
  text-align: center;
  padding: 40px 20px;
}
.quiz-progress {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.quiz-dot {
  width: 28px;
  height: 6px;
  border-radius: 3px;
  background: #E2E8F0;
  transition: all 0.3s;
}
.quiz-dot.done { background: var(--green); }
.quiz-dot.current { background: var(--orange); width: 40px; }
.quiz-dot.wrong { background: var(--red); }

.quiz-section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.quiz-prompt {
  font-size: 28px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 8px;
}
.quiz-hint {
  font-size: 14px;
  color: var(--gray);
  margin-bottom: 32px;
}
.quiz-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  max-width: 500px;
  margin: 0 auto 24px;
}
.quiz-option {
  padding: 16px;
  border: 2px solid #E2E8F0;
  border-radius: var(--radius);
  background: var(--white);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--navy);
}
.quiz-option:hover { border-color: var(--blue); background: var(--lighter); }
.quiz-option.correct {
  border-color: var(--green);
  background: var(--green-bg);
  color: var(--green);
}
.quiz-option.wrong {
  border-color: var(--red);
  background: var(--red-bg);
  color: var(--red);
}

.quiz-reveal {
  background: var(--white);
  border: 1px solid #E2E8F0;
  border-radius: var(--radius);
  padding: 24px;
  margin: 24px auto;
  max-width: 600px;
  text-align: left;
  box-shadow: var(--shadow);
}
.quiz-reveal .script {
  font-size: 15px;
  line-height: 1.7;
  color: var(--navy);
}

.quiz-next-btn {
  background: var(--blue);
  color: var(--white);
  border: none;
  padding: 14px 32px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 16px;
}
.quiz-next-btn:hover { background: var(--blue-light); transform: translateY(-1px); }

/* === MODE 3: FILL IN BLANKS === */
.fill-container { padding: 20px 0; }

.fill-card {
  background: var(--white);
  border: 1px solid #E2E8F0;
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.fill-section-tag {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.fill-anchor {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--orange);
  background: rgba(212,118,10,0.1);
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 12px;
  display: inline-block;
}
.fill-text {
  font-size: 15px;
  line-height: 1.75;
  color: var(--navy);
}
.fill-blank {
  display: inline-block;
  min-width: 120px;
  border-bottom: 2px dashed var(--orange);
  color: transparent;
  padding: 0 4px;
  margin: 0 2px;
  cursor: pointer;
  transition: all 0.3s;
  border-radius: 2px;
  position: relative;
  user-select: none;
}
.fill-blank:hover { background: rgba(212,118,10,0.05); }
.fill-blank.revealed {
  color: var(--green);
  font-weight: 600;
  border-bottom-color: var(--green);
  background: rgba(46,125,50,0.05);
}

.fill-controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 24px;
}
.fill-ctrl-btn {
  background: var(--white);
  color: var(--navy);
  border: 1px solid #E2E8F0;
  padding: 10px 20px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.fill-ctrl-btn:hover { border-color: var(--blue); background: var(--lighter); }
.fill-ctrl-btn.active { background: var(--blue); color: var(--white); border-color: var(--blue); }

/* === MODE 4: TELEPROMPTER === */
.teleprompter-container {
  background: #0A0A14;
  border-radius: var(--radius);
  padding: 40px 32px;
  min-height: 500px;
  position: relative;
  overflow: hidden;
}
.teleprompter-text {
  color: rgba(255,255,255,0.35);
  font-size: 22px;
  line-height: 2;
  transition: all 0.3s;
}
.teleprompter-text .tp-line {
  display: block;
  padding: 8px 0;
  transition: all 0.4s;
  cursor: pointer;
}
.teleprompter-text .tp-line.active {
  color: rgba(255,255,255,0.95);
  font-size: 24px;
  transform: scale(1.01);
}
.teleprompter-text .tp-line.near {
  color: rgba(255,255,255,0.55);
}
.teleprompter-text .tp-line .tp-anchor {
  color: var(--orange);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  background: rgba(212,118,10,0.2);
  padding: 2px 6px;
  border-radius: 4px;
  margin-right: 6px;
}
.teleprompter-text .tp-line .tp-section-break {
  display: block;
  color: var(--blue-light);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-top: 20px;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.tp-controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 24px;
}
.tp-btn {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.8);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 10px 24px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.tp-btn:hover { background: rgba(255,255,255,0.15); color: white; }
.tp-speed {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  text-align: center;
  margin-top: 12px;
}

/* === SCORE === */
.score-bar {
  background: var(--white);
  border: 1px solid #E2E8F0;
  border-radius: var(--radius);
  padding: 16px 24px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: var(--shadow);
}
.score-label { font-size: 13px; color: var(--gray); font-weight: 500; }
.score-value { font-size: 24px; font-weight: 700; color: var(--navy); }
.score-detail { font-size: 13px; color: var(--gray); margin-left: auto; }

/* === RESPONSIVE === */
@media (max-width: 640px) {
  .nav { flex-wrap: wrap; padding: 12px 16px; }
  .nav-modes { width: 100%; overflow-x: auto; }
  .nav-btn { white-space: nowrap; font-size: 12px; padding: 6px 12px; }
  .quiz-options { grid-template-columns: 1fr; }
  .quiz-prompt { font-size: 22px; }
  .teleprompter-text { font-size: 18px; }
  .teleprompter-text .tp-line.active { font-size: 20px; }
}

.fl-word{cursor:pointer;transition:all 0.2s;border-bottom:1px dotted var(--orange);padding:0 1px}
.fl-word:hover{background:rgba(212,118,10,0.05)}
.fl-word.fl-revealed{border-bottom-color:var(--green);color:var(--green);font-weight:600}

.fl-container{padding:20px 0}
.fl-card{background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.fl-text{font-size:15px;line-height:2;color:var(--navy);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-title">📋 POA Trainer</div>
  <div class="nav-modes">
    <button class="nav-btn active" onclick="setMode('read')">📖 Read</button>
    <button class="nav-btn" onclick="setMode('quiz')">🧠 Quiz</button>
    <button class="nav-btn" onclick="setMode('fill')">✏️ Fill Blanks</button>
    <button class="nav-btn" onclick="setMode('firstletter')">🔤 First Letter</button>
    <button class="nav-btn" onclick="setMode('teleprompter')">📺 Teleprompter</button>
  </div>
</nav>

<div class="container" id="app"></div>

      { anchor: "NO SURPRISES", script: "No surprises, no last-minute reductions." },
    ],
    checkin: "Jane & Mike, this is how we protect every dollar. Are you comfortable with this level of negotiation and protection working for you?"
  },
  {
    id: "conclusion",
    emoji: "🎬",
    title: "CONCLUSION",
    cue: "Quiet confidence. Let the weight of everything you\u2019ve said settle.",
    lines: [
      { anchor: "NOT A PITCH", script: "Jane, Mike \u2014 this isn\u2019t a pitch. It\u2019s exactly what I\u2019m going to do for you." },
      { anchor: "TOGETHER", script: "In a market that rewards the prepared, you\u2019ll have certainty, leverage, and someone fully committed to delivering an outstanding result \u2014 together.", cue: "← hold eye contact on \"together\"" },
    ]
  },
  {
    id: "close",
    emoji: "🎯",
    title: "THREE-STEP CLOSE",
    cue: "Deliberate pace. Each step earns the next. Don\u2019t rush.",
    flow: ["Tie-Down (recap value)", "Process Close (get the yes)", "Pivot to CMA"],
    lines: [
      { beat: "Step 1: The Value Tie-Down", anchor: "BLUEPRINT RECAP", script: "Jane, Mike \u2014 we\u2019ve covered the complete blueprint \u2014 The Pinnacle Listing System that maximizes the value of your home. You\u2019ve seen how we make your home irresistible, how we flood it with the right buyers, and how I protect every dollar through negotiation and appraisal." },
      { beat: "Step 2: The Process Close", anchor: "ONE QUESTION", script: "Before we move to pricing and launch strategy \u2014 one important question: Based on everything you\u2019ve seen, the preparation, the marketing, the negotiation \u2014 do you feel confident that this strategic process will get you the highest price in today\u2019s market?" },
      { type: "stage", text: "Wait for \u201CYes\u201D \u2014 pause \u2014 let them say it" },
      { beat: "Step 3: Pivot to CMA", anchor: "PIVOTAL", script: "Jane & Mike, we\u2019ve aligned on your goals, and mapped out our plan of action. Now comes the pivotal part: pricing and launch strategy. This directly impacts your timeline, stress, and net proceeds." },
    ]
  }
];

// Build expanded data: inject section title, subtitle, and check-in as practisable lines
const EXPANDED_DATA = DATA.map(section => {
  const expanded = [];
  // Section title as a line
  expanded.push({ anchor: section.emoji + ' ' + section.title, script: section.title + (section.subtitle ? ' — ' + section.subtitle : ''), isHeader: true });
  // Original script lines
  section.lines.forEach(line => expanded.push(line));
  // Check-in as a line — unique per section
  if (section.checkin) {
    expanded.push({ anchor: '✅ ' + section.title, script: section.checkin, isCheckin: true });
  }
  return { ...section, expandedLines: expanded };
});

// Build flat anchor list for quiz
const ALL_ANCHORS = [];
EXPANDED_DATA.forEach(section => {
  section.expandedLines.forEach(line => {
    if (line.anchor) {
      ALL_ANCHORS.push({ ...line, sectionTitle: section.title, sectionEmoji: section.emoji, sectionSubtitle: section.subtitle || '' });
    }
  });
});

let currentMode = 'read';
let quizState = { index: 0, score: 0, answered: [], showingReveal: false };
let tpState = { currentLine: 0, playing: false, interval: null, speed: 3000 };

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-btn[onclick="setMode('${mode}')"]`).classList.add('active');
  if (mode === 'quiz') { quizState = { index: 0, score: 0, answered: new Array(ALL_ANCHORS.length).fill(null), showingReveal: false }; }
  if (mode === 'teleprompter') { tpState.currentLine = 0; tpState.playing = false; clearInterval(tpState.interval); }
  render();
}

function render() {
  const app = document.getElementById('app');
  switch(currentMode) {
    case 'read': app.innerHTML = renderRead(); break;
    case 'quiz': app.innerHTML = renderQuiz(); break;
    case 'fill': app.innerHTML = renderFill(); break;
    case 'firstletter': app.innerHTML = renderFirstLetter(); break;
    case 'teleprompter': app.innerHTML = renderTeleprompter(); break;
  }
}

// === READ MODE ===
function renderRead() {
  return DATA.map(section => `
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="emoji">${section.emoji}</span>
        ${section.title}
        <span class="toggle">▼</span>
      </div>
      <div class="section-body">
        ${section.subtitle ? `<div class="section-subtitle">${section.subtitle}</div>` : ''}
        <div class="delivery-cue">${section.cue}</div>
        ${section.flow ? `
          <div class="flow-map">
            <span class="label">Flow:</span>
            ${section.flow.map((f, i) => `<span class="flow-step">${f}</span>${i < section.flow.length - 1 ? '<span class="flow-arrow">→</span>' : ''}`).join('')}
          </div>
        ` : ''}
        ${section.lines.map(line => {
          if (line.type === 'stage') return `<div class="stage-dir">(${line.text})</div>`;
          let html = '';
          if (line.beat) html += `<div class="beat-label">${line.beat}</div>`;
          html += `<div class="anchor-line">
            <span class="anchor-word">${line.anchor}</span>
            <span class="anchor-script">${line.script}</span>
            ${line.cue ? `<span class="anchor-cue">${line.cue}</span>` : ''}
          </div>`;
          return html;
        }).join('')}
        ${section.checkin ? `
          <div class="checkin-box">
            <span class="tag">✅ CHECK-IN:</span> ${section.checkin}
          </div>
        ` : ''}
      </div>
    </div>
  `).join('');
}

function toggleSection(el) {
  el.classList.toggle('collapsed');
  const body = el.nextElementSibling;
  body.classList.toggle('hidden');
}

// === QUIZ MODE ===
function renderQuiz() {
  const total = ALL_ANCHORS.length;
  const current = ALL_ANCHORS[quizState.index];
  const correct = quizState.answered.filter(a => a === true).length;
  const wrong = quizState.answered.filter(a => a === false).length;

  if (quizState.index >= total) {
    return `
      <div class="quiz-container">
        <div class="quiz-prompt">🎉 Complete!</div>
        <div class="score-bar" style="justify-content:center;flex-direction:column;gap:8px;">
          <div class="score-value" style="font-size:48px;">${correct}/${total}</div>
          <div class="score-label">${correct === total ? 'Perfect! You own this script.' : correct >= total * 0.8 ? 'Strong! Almost there.' : 'Keep practicing — you\'ll get it.'}</div>
        </div>
        <button class="quiz-next-btn" onclick="quizState = {index:0,score:0,answered:new Array(${total}).fill(null),showingReveal:false}; render();">Try Again</button>
      </div>
    `;
  }

  // Generate 4 options (1 correct + 3 random)
  const options = [current.anchor];
  const others = ALL_ANCHORS.filter((_, i) => i !== quizState.index).map(a => a.anchor);
  while (options.length < 4 && others.length > 0) {
    const idx = Math.floor(Math.random() * others.length);
    if (!options.includes(others[idx])) options.push(others[idx]);
    others.splice(idx, 1);
  }
  // Shuffle
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }

  const answered = quizState.answered[quizState.index];

  return `
    <div class="quiz-container">
      <div class="quiz-progress">
        ${quizState.answered.map((a, i) => `<div class="quiz-dot ${i === quizState.index ? 'current' : a === true ? 'done' : a === false ? 'wrong' : ''}"></div>`).join('')}
      </div>
      <div class="score-bar">
        <div><div class="score-label">Score</div><div class="score-value">${correct}</div></div>
        <div><div class="score-label">Question</div><div class="score-value">${quizState.index + 1}/${total}</div></div>
        <div class="score-detail">${current.sectionEmoji} ${current.sectionTitle}${current.sectionSubtitle ? `<div style="font-size:11px;color:var(--blue);margin-top:4px;font-style:italic;">${current.sectionSubtitle}</div>` : ''}</div>
      </div>
      <div class="quiz-section-label">What anchor comes next?</div>
      <div class="quiz-prompt">${quizState.index === 0 ? 'First anchor?' : `After: ${ALL_ANCHORS[quizState.index - 1].anchor}`}</div>
      <div class="quiz-hint">What's the next anchor word in the chain?</div>
      <div class="quiz-options">
        ${options.map(opt => `
          <div class="quiz-option ${answered !== null ? (opt === current.anchor ? 'correct' : quizState._selected === opt ? 'wrong' : '') : ''}"
               onclick="${answered === null ? `quizAnswer('${opt.replace(/'/g, "\\'")}', '${current.anchor.replace(/'/g, "\\'")}')` : ''}"
               style="${answered !== null ? 'cursor:default;' : ''}">
            ${opt}
          </div>
        `).join('')}
      </div>
      ${answered !== null ? `
        <div class="quiz-reveal">
          <div style="margin-bottom:8px;"><span class="anchor-word">${current.anchor}</span></div>
          <div class="script">${current.script}</div>
          ${current.cue ? `<div style="margin-top:8px;font-size:13px;color:var(--green);font-style:italic;">${current.cue}</div>` : ''}
        </div>
        <button class="quiz-next-btn" onclick="quizState.index++; render();">Next →</button>
      ` : ''}
    </div>
  `;
}

function quizAnswer(selected, correct) {
  const isCorrect = selected === correct;
  quizState.answered[quizState.index] = isCorrect;
  quizState._selected = selected;
  if (isCorrect) quizState.score++;
  render();
}

// === FILL BLANKS MODE ===
let fillDifficulty=3;

function renderFill() {
  return `
    <div class="fill-container">
      <div class="fill-controls">
        <button class="fill-ctrl-btn ${fillDifficulty===1?'active':''}" onclick="fillDifficulty=1;render();">★</button>
        <button class="fill-ctrl-btn ${fillDifficulty===2?'active':''}" onclick="fillDifficulty=2;render();">★★</button>
        <button class="fill-ctrl-btn ${fillDifficulty===3?'active':''}" onclick="fillDifficulty=3;render();">★★★</button>
        <button class="fill-ctrl-btn ${fillDifficulty===4?'active':''}" onclick="fillDifficulty=4;render();">★★★★</button>
        <button class="fill-ctrl-btn ${fillDifficulty===5?'active':''}" onclick="fillDifficulty=5;render();">★★★★★</button>
        <button class="fill-ctrl-btn ${fillDifficulty===6?'active':''}" onclick="fillDifficulty=6;render();">★★★★★★</button>
      </div>
      <p style="text-align:center;font-size:13px;color:var(--gray);margin-bottom:24px;">Click blanks to reveal. Try to recall before clicking.</p>
      ${EXPANDED_DATA.map(section => `
        <div class="fill-card">
          ${section.expandedLines.map(line => {
            if (line.type === 'stage') return `<div class="stage-dir">(${line.text})</div>`;
            let html = '';
            if (line.beat) html += `<div class="beat-label">${line.beat}</div>`;
            const anchorClass = line.isHeader ? 'fill-anchor" style="background:var(--navy);color:var(--white);font-size:13px;padding:4px 10px;' : line.isCheckin ? 'fill-anchor" style="background:rgba(212,118,10,0.15);color:var(--orange);' : 'fill-anchor';
            html += `<div style="margin:8px 0;">
              <span class="${anchorClass}">${line.anchor}</span>
              <div class="fill-text">${blankify(line.script, fillDifficulty)}</div>
            </div>`;
            return html;
          }).join('')}
        </div>
      `).join('')}
    </div>
  `;
}

function blankify(t,d){
  var w=t.split(' ');
  var B=function(x){return '<span class="fill-blank" onclick="this.classList.add(\'revealed\')">'+x+'</span>'};
  if(d===6) return w.map(B).join(' ');
  if(d===5){var skip=0;for(var j=0;j<w.length&&j<5;j++){if(/[,&…]/.test(w[j])||w[j]==='&'){skip=j+1;}else if(skip>0){break;}}return w.map(function(x,i){return i<skip+3?x:B(x)}).join(' ');}
  if(d===4) return w.map(function(x,i){return i%4===0?x:B(x)}).join(' ');
  if(d===3) return w.map(function(x,i){return i%2===1?B(x):x}).join(' ');
  if(d===2) return w.map(function(x,i){return i%4===3?B(x):x}).join(' ');
  return w.map(function(x){
    var c=x.replace(/[^a-zA-Z]/g,'').toLowerCase();
    if(c.length>5) return B(x);
    return x;
  }).join(' ');
}

function firstLetterify(t){
  var w=t.split(' ');
  return w.map(function(x,i){
    if(x.length===0) return x;
    var first=x.charAt(0);
    var rest=x.substring(1).replace(/[a-zA-Z]/g,'_');
    var hint=first+rest;
    return '<span class="fl-word" data-w="'+encodeURIComponent(x)+'" onclick="this.textContent=decodeURIComponent(this.getAttribute(\'data-w\'));this.classList.add(\'fl-revealed\')">'+hint+'</span>';
  }).join(' ');
}


function renderFirstLetter(){
  return '<div class="fl-container"><p style="text-align:center;font-size:13px;color:var(--gray);margin-bottom:24px;">First letter shown, rest hidden. Click a word to reveal it. Practice recalling from just the first letters.</p>'+
  EXPANDED_DATA.map(function(section){
    return '<div class="fl-card">'+
    section.expandedLines.map(function(line){
      if(!line.anchor) return '';
      var h='';
      if(line.beat) h+='<div class="beat-label">'+line.beat+'</div>';
      var anchorStyle = line.isHeader ? 'background:var(--navy);color:var(--white);font-size:13px;padding:4px 10px;' : line.isCheckin ? 'background:rgba(212,118,10,0.15);color:var(--orange);' : '';
      h+='<div style="margin:12px 0;"><span class="fill-anchor" style="'+anchorStyle+'">'+line.anchor+'</span><div class="fl-text">'+firstLetterify(line.script)+'</div></div>';
      return h;
    }).join('')+
    '</div>';
  }).join('')+'</div>';
}

function renderTeleprompter() {
  const allLines = [];
  DATA.forEach(section => {
    allLines.push({ type: 'section', text: `${section.emoji} ${section.title}` });
    if (section.subtitle) allLines.push({ type: 'subtitle', text: section.subtitle });
    section.lines.forEach(line => {
      if (line.type === 'stage') {
        allLines.push({ type: 'stage', text: `(${line.text})` });
      } else {
        allLines.push({ type: 'line', anchor: line.anchor, text: line.script, cue: line.cue });
      }
    });
    if (section.checkin) {
      allLines.push({ type: 'checkin', text: section.checkin });
    }
  });

  return `
    <div class="teleprompter-container" id="tp-box">
      <div class="teleprompter-text" id="tp-text">
        ${allLines.map((l, i) => {
          const cls = i === tpState.currentLine ? 'active' : Math.abs(i - tpState.currentLine) <= 2 ? 'near' : '';
          if (l.type === 'section') return `<span class="tp-line ${cls}" data-idx="${i}" onclick="tpGoTo(${i})"><span class="tp-section-break">${l.text}</span></span>`;
          if (l.type === 'stage') return `<span class="tp-line ${cls}" data-idx="${i}" onclick="tpGoTo(${i})" style="font-style:italic;font-size:16px;">${l.text}</span>`;
          if (l.type === 'checkin') return `<span class="tp-line ${cls}" data-idx="${i}" onclick="tpGoTo(${i})" style="color:rgba(212,118,10,0.7);">✅ ${l.text}</span>`;
          return `<span class="tp-line ${cls}" data-idx="${i}" onclick="tpGoTo(${i})"><span class="tp-anchor">${l.anchor}</span>${l.text}</span>`;
        }).join('')}
      </div>
    </div>
    <div class="tp-controls">
      <button class="tp-btn" onclick="tpPrev()">← Prev</button>
      <button class="tp-btn" onclick="tpTogglePlay()" id="tp-play-btn">${tpState.playing ? '⏸ Pause' : '▶ Play'}</button>
      <button class="tp-btn" onclick="tpNext()">Next →</button>
    </div>
    <div class="tp-speed">Speed: <button class="tp-btn" style="padding:4px 12px;font-size:12px;" onclick="tpChangeSpeed(-500)">−</button> ${(tpState.speed/1000).toFixed(1)}s <button class="tp-btn" style="padding:4px 12px;font-size:12px;" onclick="tpChangeSpeed(500)">+</button> &nbsp;|&nbsp; Use ← → arrow keys to navigate</div>
  `;
}

function tpGoTo(idx) {
  tpState.currentLine = idx;
  render();
  scrollTpActive();
}

function tpNext() {
  const allLines = [];
  DATA.forEach(s => { allLines.push({}); if (s.subtitle) allLines.push({}); s.lines.forEach(() => allLines.push({})); if (s.checkin) allLines.push({}); });
  if (tpState.currentLine < allLines.length - 1) tpState.currentLine++;
  render();
  scrollTpActive();
}

function tpPrev() {
  if (tpState.currentLine > 0) tpState.currentLine--;
  render();
  scrollTpActive();
}

function tpTogglePlay() {
  tpState.playing = !tpState.playing;
  if (tpState.playing) {
    tpState.interval = setInterval(tpNext, tpState.speed);
  } else {
    clearInterval(tpState.interval);
  }
  render();
}

function tpChangeSpeed(delta) {
  tpState.speed = Math.max(1000, Math.min(8000, tpState.speed + delta));
  if (tpState.playing) {
    clearInterval(tpState.interval);
    tpState.interval = setInterval(tpNext, tpState.speed);
  }
  render();
}

function scrollTpActive() {
  const active = document.querySelector('.tp-line.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (currentMode === 'teleprompter') {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); tpNext(); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); tpPrev(); }
    if (e.key === ' ') { e.preventDefault(); tpTogglePlay(); }
  }
});

// Initial render
render();
</script>
</body>
</html>
