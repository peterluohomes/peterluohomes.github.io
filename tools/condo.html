<style>

  .btn { padding: 8px 18px; font-family: 'Josefin Sans', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border: none; border-radius: 2px; transition: all 0.2s; }
  .btn-gold { background: var(--gold-light); color: var(--dark); }
  .btn-gold:hover { background: var(--gold); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
  .btn-outline:hover { border-color: var(--gold-light); color: var(--gold-light); }

  /* CONTAINER */

  .header-fields .full { grid-column: 1 / -1; }
  .field-group label { display: block; font-size: 9px; letter-spacing: 0.2em; color: var(--gold-light); text-transform: uppercase; margin-bottom: 5px; }

  .legend-unit { background: var(--unit-light); color: var(--unit-color); }

  /* ITEM ROW — 4 columns: checkbox | label | tag | note */

  /* COLUMN HEADERS */

<script>
// ── NUMBER FORMATTING ──────────────────────────

function digitsOnly(v) { return v.replace(/[^\d]/g, ''); }

function fmtPrice(el) {
  const cur = el.selectionStart;
  const raw = digitsOnly(el.value);
  if (!raw) { el.value = ''; return; }
  el.value = '$' + parseInt(raw, 10).toLocaleString('en-CA');
}

function fmtFee(el) {
  const hasMo = el.value.toLowerCase().includes('/');
  const base = el.value.split('/')[0];
  // allow digits and one decimal point
  const cleaned = base.replace(/[^\d.]/g, '');
  const parts = cleaned.split('.');
  const intPart = parts[0] ? parseInt(parts[0], 10).toLocaleString('en-CA') : '';
  const decPart = parts.length > 1 ? '.' + parts[1].slice(0, 2) : '';
  if (!intPart) { el.value = ''; return; }
  el.value = '$' + intPart + decPart + (hasMo ? ' / mo' : '');
}

function fmtTax(el) {
  const cleaned = el.value.replace(/[^\d.]/g, '');
  const parts = cleaned.split('.');
  const intPart = parts[0] ? parseInt(parts[0], 10).toLocaleString('en-CA') : '';
  const decPart = parts.length > 1 ? '.' + parts[1].slice(0, 2) : '';
  if (!intPart) { el.value = ''; return; }
  el.value = '$' + intPart + decPart;
}

function fmtSqft(el) {
  const hasSqft = el.value.toLowerCase().includes('sq');
  const raw = digitsOnly(el.value.replace(/sq.*$/i, ''));
  if (!raw) { el.value = ''; return; }
  el.value = parseInt(raw, 10).toLocaleString('en-CA') + (hasSqft ? ' sq ft' : '');
}

// ── CUSTOM ITEMS: keyed by sectionId + catName, one blank slot per category ──
function initCustomItems() {
  const result = {};
  SECTIONS.forEach(sec => {
    result[sec.id] = {};
    sec.categories.forEach(cat => {
      // one blank editable slot per category
      const id = 'preset_' + sec.id + '_' + cat.name.replace(/\s+/g,'_');
      const defaultTag = sec.id === 'location' ? 'loc' : sec.id === 'building' ? 'bld' : 'unit';
      result[sec.id][cat.name] = [{ id, label: '', tag: defaultTag }];
    });
  });
  return result;
}

// ── STATE ──────────────────────────────────────
let state = {};
let customItems = initCustomItems();

// ── RENDER ─────────────────────────────────────

function buildUI() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  SECTIONS.forEach(section => {
    const div = document.createElement('div');
    div.className = 'section';
    div.id = 'sec-' + section.id;

    const header = document.createElement('div');
    header.className = 'section-header section-' + section.color;
    header.innerHTML =
      '<div class="section-title"><span class="section-icon">' + section.icon + '</span>' + section.title + '</div>' +
      '<span class="section-toggle open" id="toggle-' + section.id + '">&#9662;</span>';
    header.onclick = () => toggleSection(section.id);
    div.appendChild(header);

    const body = document.createElement('div');
    body.className = 'section-body open';
    body.id = 'body-' + section.id;

    body.innerHTML =
      '<div class="col-headers">' +
      '<span></span><span>Feature</span><span>Category</span><span>Note</span>' +
      '</div>';

    section.categories.forEach(cat => {
      const catDiv = document.createElement('div');
      catDiv.className = 'category';
      catDiv.innerHTML = '<div class="category-title">' + cat.name + '</div>';
      // Standard items
      cat.items.forEach(item => {
        const itemId = makeId(section.id, cat.name, item.label);
        catDiv.appendChild(buildItemRow(itemId, item.label, item.tag, false));
      });
      // Custom slot(s) for this category
      const slots = (customItems[section.id] && customItems[section.id][cat.name]) || [];
      slots.forEach(ci => catDiv.appendChild(buildItemRow(ci.id, ci.label, ci.tag, true)));

      // Two spacer checkboxes at end of each subcategory (PDF blank-line formatting)
      for (let si = 1; si <= 2; si++) {
        const sid = 'spacer__' + section.id + '__' + btoa(cat.name).replace(/=/g,'') + '__' + si;
        if (!state[sid]) state[sid] = { checked: false };
        const spacerRow = document.createElement('div');
        spacerRow.className = 'spacer-row';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'item-check';
        cb.checked = !!state[sid].checked;
        cb.addEventListener('change', function() { state[sid].checked = this.checked; });
        const lbl = document.createElement('span');
        lbl.className = 'spacer-label';
        lbl.textContent = '\u2015 blank line spacer (PDF formatting) \u2015';
        spacerRow.appendChild(cb);
        spacerRow.appendChild(lbl);
        catDiv.appendChild(spacerRow);
      }

      body.appendChild(catDiv);
    });

    // Single add-row at section bottom with subcategory dropdown
    const catOptions = section.categories.map(cat =>
      '<option value="' + cat.name.replace(/"/g,'&quot;') + '">' + cat.name + '</option>'
    ).join('');
    const defaultTag = section.id === 'location' ? 'loc' : section.id === 'building' ? 'bld' : 'unit';
    const addRow = document.createElement('div');
    addRow.className = 'add-row';
    addRow.innerHTML =
      '<select id="add-cat-' + section.id + '">' + catOptions + '</select>' +
      '<input type="text" id="add-label-' + section.id + '" placeholder="Add custom feature to selected category...">' +
      '<button class="btn-add" onclick="addCustomItem(\'' + section.id + '\',\'' + defaultTag + '\')">+ Add</button>';
    body.appendChild(addRow);

    div.appendChild(body);
    container.appendChild(div);
  });
}

function buildItemRow(itemId, label, tag, isCustom) {
  const s = state[itemId] || { checked: false, note: '' };
  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = 'row-' + itemId;

  const esc = str => (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const tagLabel = tag === 'loc' ? 'Location' : tag === 'bld' ? 'Building' : 'Unit';
  const labelHtml = isCustom
    ? '<input class="item-label-custom" value="' + esc(label) + '" placeholder="Custom feature..." oninput="updateCustomLabel(\'' + itemId + '\', this.value)">'
    : '<span class="item-label">' + esc(label) + '</span>';

  row.innerHTML =
    '<input type="checkbox" class="item-check"' + (s.checked ? ' checked' : '') + ' onchange="updateState(\'' + itemId + '\', \'checked\', this.checked)">' +
    labelHtml +
    '<span class="item-tag tag-' + tag + '">' + tagLabel + '</span>' +
    '<input class="item-note-input" type="text" placeholder="Add a note..." value="' + esc(s.note) + '" oninput="updateState(\'' + itemId + '\', \'note\', this.value)">';

  return row;
}

function toggleSection(id) {
  const body = document.getElementById('body-' + id);
  const toggle = document.getElementById('toggle-' + id);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

// ── STATE MANAGEMENT ───────────────────────────

function makeId(sectionId, catName, label) {
  return (sectionId + '||' + catName + '||' + label).replace(/\s+/g, '_');
}

function updateState(itemId, field, value) {
  if (!state[itemId]) state[itemId] = { checked: false, note: '' };
  state[itemId][field] = value;
}

function updateCustomLabel(itemId, value) {
  SECTIONS.forEach(sec => {
    if (!customItems[sec.id]) return;
    Object.values(customItems[sec.id]).forEach(slots => {
      const ci = slots.find(x => x.id === itemId);
      if (ci) ci.label = value;
    });
  });
}

function addCustomItem(sectionId, defaultTag) {
  const labelEl = document.getElementById('add-label-' + sectionId);
  const catEl   = document.getElementById('add-cat-'   + sectionId);
  const label   = labelEl.value.trim();
  const catName = catEl.value;
  if (!label) return;
  if (!customItems[sectionId]) customItems[sectionId] = {};
  if (!customItems[sectionId][catName]) customItems[sectionId][catName] = [];
  const id = 'custom_' + Date.now();
  customItems[sectionId][catName].push({ id, label, tag: defaultTag });
  state[id] = { checked: false, note: '' };
  labelEl.value = '';
  buildUI();
  toast('Feature added to "' + catName + '".');
}

// ── SAVE / LOAD ────────────────────────────────

function gatherHeaderData() {
  return {
    address: document.getElementById('h_address').value,
    type:    document.getElementById('h_type').value,
    floor:   document.getElementById('h_floor').value,
    price:   document.getElementById('h_price').value,
    tax:     document.getElementById('h_tax').value,
    fee:     document.getElementById('h_fee').value,
    sqft:    document.getElementById('h_sqft').value,
    beds:    document.getElementById('h_beds').value,
    parking: document.getElementById('h_parking').value,
    agent:   document.getElementById('h_agent').value,
    remarks: document.getElementById('remarks').value,
  };
}

function setHeaderData(d) {
  if (!d) return;
  const map = { address:'h_address', type:'h_type', floor:'h_floor', price:'h_price',
                tax:'h_tax', fee:'h_fee', sqft:'h_sqft', beds:'h_beds', parking:'h_parking', agent:'h_agent' };
  Object.entries(map).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (el && d[k] !== undefined) el.value = d[k];
  });
  const rem = document.getElementById('remarks');
  if (rem && d.remarks !== undefined) rem.value = d.remarks;
}

function saveJSON() {
  const data = { version: 3, header: gatherHeaderData(), state, customItems };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (document.getElementById('h_address').value || 'condo-report').replace(/[^a-zA-Z0-9]/g, '-') + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Report saved.');
}

function loadJSON() { document.getElementById('fileInput').click(); }

function handleFileLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      state = data.state || {};
      customItems = data.customItems || initCustomItems();
      buildUI();
      setHeaderData(data.header);
      autoSave();
      toast('Report loaded.');
    } catch { alert('Invalid file.'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function resetForm() {
  if (!confirm('Reset all fields and clear saved data?\nThis cannot be undone.')) return;
  state = {};
  customItems = initCustomItems();
  buildUI();
  ['h_address','h_type','h_floor','h_price','h_tax','h_fee','h_sqft','h_beds','h_parking','h_agent','remarks'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { if (el.tagName === 'SELECT') el.selectedIndex = 0; else el.value = ''; }
  });
  if (_db) { dbClearStore().catch(e => console.error('Clear error:', e)); }
  toast('Form reset.');
}

// ── PDF EXPORT ─────────────────────────────────

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
  const pageW = 215.9, pageH = 279.4;
  const margin = 14, contentW = pageW - margin * 2;
  let y = 0;

  const C = {
    dark:      [26,  26,  26],
    gold:      [184, 150, 12],
    goldLight: [212, 175, 55],
    cream:     [253, 250, 243],
    loc:       [44,  95,  110],
    bld:       [74,  55,  40],
    unit:      [45,  74,  53],
    mid:       [74,  74,  74],
    light:     [122, 122, 122],
    white:     [255, 255, 255],
  };

  function checkPage(needed) {
    if (y + (needed || 10) > pageH - 16) { doc.addPage(); y = 14; }
  }

  // ── PDF HEADER — mirrors HTML 2-column grid layout ──
  function drawHeader() {
    const hd = gatherHeaderData();

    // Count rows (2-column grid, same as HTML)
    let rows = 0;
    if (hd.address  || hd.type)    rows++;  // Row 1: Address | Type
    if (hd.floor    || hd.sqft)    rows++;  // Row 2: Floor   | Sqft
    if (hd.price    || hd.tax)     rows++;  // Row 3: Price   | Tax
    if (hd.fee      || hd.beds)    rows++;  // Row 4: Fee     | Beds
    if (hd.parking  || hd.agent)   rows++;  // Row 5: Parking | Agent
    const headerH = 30 + rows * 14;

    doc.setFillColor(...C.dark);
    doc.rect(0, 0, pageW, headerH, 'F');
    doc.setFillColor(...C.gold);
    doc.rect(0, 0, pageW, 1.5, 'F');
    let hy = 12;

    // Eyebrow
    doc.setFontSize(6.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(...C.goldLight);
    doc.text('PINNACLE LISTING SYSTEM  |  PETER LUO  |  RE/MAX REALTRON REALTY INC.', margin + 4, hy);
    hy += 7;

    // Main title
    doc.setFontSize(16); doc.setFont('helvetica', 'bold'); doc.setTextColor(...C.white);
    doc.text('Condo Property Feature & Value Report', margin + 4, hy);
    hy += 3;

    // Gold rule
    doc.setDrawColor(...C.goldLight); doc.setLineWidth(0.35);
    doc.line(margin + 4, hy, margin + contentW, hy);
    hy += 6;

    // 2-column layout — left col | right col
    const colW = (contentW / 2) - 6;
    const xL = margin + 4;
    const xR = margin + 4 + contentW / 2;

    function drawField(lbl, val, x) {
      if (!val) return;
      doc.setFontSize(5.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(...C.goldLight);
      doc.text(lbl, x, hy);
      doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(...C.white);
      doc.text(val, x, hy + 5, { maxWidth: colW });
    }

    // Row 1: Property Address | Property Type
    if (hd.address || hd.type) {
      drawField('PROPERTY ADDRESS', hd.address, xL);
      drawField('PROPERTY TYPE',    hd.type,    xR);
      hy += 14;
    }
    // Row 2: Floor / Unit Level | Square Footage
    if (hd.floor || hd.sqft) {
      drawField('FLOOR / UNIT LEVEL', hd.floor, xL);
      drawField('SQUARE FOOTAGE',     hd.sqft,  xR);
      hy += 14;
    }
    // Row 3: List Price | Property Tax / Year
    if (hd.price || hd.tax) {
      drawField('LIST PRICE',          hd.price, xL);
      drawField('PROPERTY TAX / YEAR', hd.tax,   xR);
      hy += 14;
    }
    // Row 4: Maintenance Fee / Month | Bedrooms / Bathrooms
    if (hd.fee || hd.beds) {
      drawField('MAINTENANCE FEE / MONTH', hd.fee,  xL);
      drawField('BEDROOMS / BATHROOMS',    hd.beds, xR);
      hy += 14;
    }
    // Row 5: Parking / Locker | Prepared By / Date
    if (hd.parking || hd.agent) {
      const dateStr = hd.agent ? hd.agent + '  |  ' + new Date().toLocaleDateString('en-CA') : new Date().toLocaleDateString('en-CA');
      drawField('PARKING / LOCKER',   hd.parking, xL);
      drawField('PREPARED BY / DATE', dateStr,    xR);
      hy += 14;
    }

    y = hy + 4;
  }

  // ── SECTION HEADER (pure text — no emoji so no encoding issues) ──
  function drawSectionHeader(section) {
    checkPage(12);
    const col = section.color === 'loc' ? C.loc : section.color === 'bld' ? C.bld : C.unit;
    doc.setFillColor(...col);
    doc.rect(margin, y, contentW, 8, 'F');
    doc.setTextColor(...C.white);
    doc.setFontSize(8.5); doc.setFont('helvetica', 'bold');
    doc.text(section.pdfLabel, margin + 4, y + 5.5);
    y += 10;
  }

  function drawCategoryLabel(name) {
    checkPage(8);
    doc.setFontSize(6.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(...C.light);
    doc.text(name.toUpperCase(), margin + 2, y + 4.5);
    doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.3);
    doc.line(margin + 2 + doc.getTextWidth(name.toUpperCase()) + 3, y + 3.5, margin + contentW, y + 3.5);
    y += 7;
  }

  function drawItem(itemId, label, tag) {
    const s = state[itemId];
    if (!s || !s.checked) return;

    const note = (s.note || '').trim();
    const noteW  = note ? 60 : 0;
    const labelW = contentW - 8 - noteW - 6;

    const labelLines = doc.splitTextToSize(label, labelW);
    const noteLines  = note ? doc.splitTextToSize(note, noteW - 2) : [];
    const nLines = Math.max(labelLines.length, noteLines.length, 1);
    const rowH = 5 + nLines * 4.5 + 2;

    checkPage(rowH + 2);

    // Row background
    doc.setFillColor(248, 248, 248);
    doc.rect(margin, y, contentW, rowH, 'F');

    // Gold checkbox square
    doc.setFillColor(...C.gold);
    doc.rect(margin + 1, y + 1.5, 3.5, 3.5, 'F');

    // Feature label — starts right after checkbox, no tag badge
    const labelX = margin + 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...C.mid);
    labelLines.forEach((line, i) => doc.text(line, labelX, y + 4.5 + i * 4.5));

    // Note (italic, right side)
    if (note) {
      const noteX = margin + contentW - noteW + 2;
      doc.setFont('helvetica', 'italic'); doc.setFontSize(6.5); doc.setTextColor(...C.light);
      noteLines.forEach((line, i) => doc.text(line, noteX, y + 4.5 + i * 4.5));
    }

    y += rowH + 1;
  }

  // ── RENDER ──
  drawHeader();

  SECTIONS.forEach(section => {
    const hasAny =
      section.categories.some(cat => {
        const stdChecked = cat.items.some(item => {
          const id = makeId(section.id, cat.name, item.label);
          return state[id] && state[id].checked;
        });
        const custChecked = ((customItems[section.id] || {})[cat.name] || [])
          .some(ci => ci.label && state[ci.id] && state[ci.id].checked);
        return stdChecked || custChecked;
      });

    if (!hasAny) return;
    drawSectionHeader(section);

    section.categories.forEach(cat => {
      const stdChecked = cat.items.some(item => {
        const id = makeId(section.id, cat.name, item.label);
        return state[id] && state[id].checked;
      });
      const catCustom = ((customItems[section.id] || {})[cat.name] || [])
        .filter(ci => ci.label && state[ci.id] && state[ci.id].checked);
      if (!stdChecked && !catCustom.length) return;

      drawCategoryLabel(cat.name);
      cat.items.forEach(item => drawItem(makeId(section.id, cat.name, item.label), item.label, item.tag));
      catCustom.forEach(ci => drawItem(ci.id, ci.label, ci.tag));

      // Spacer blank lines for this subcategory
      for (let si = 1; si <= 2; si++) {
        const sid = 'spacer__' + section.id + '__' + btoa(cat.name).replace(/=/g,'') + '__' + si;
        if (state[sid] && state[sid].checked) { checkPage(5); y += 5; }
      }
    });
  });

  // Remarks
  const remarks = document.getElementById('remarks').value.trim();
  if (remarks) {
    checkPage(20);
    doc.setFillColor(...C.dark);
    doc.rect(margin, y, contentW, 7, 'F');
    doc.setTextColor(...C.goldLight); doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
    doc.text('ADDITIONAL REMARKS', margin + 3, y + 4.8);
    y += 9;
    doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(...C.mid);
    doc.splitTextToSize(remarks, contentW - 6).forEach(line => {
      checkPage(6); doc.text(line, margin + 3, y + 5); y += 5;
    });
  }

  // Footers
  const totalPages = doc.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFillColor(...C.dark);
    doc.rect(0, pageH - 10, pageW, 10, 'F');
    doc.setFillColor(...C.gold);
    doc.rect(0, pageH - 10, pageW, 0.8, 'F');
    doc.setTextColor(...C.goldLight); doc.setFontSize(6.5); doc.setFont('helvetica', 'normal');
    doc.text('Pinnacle Listing System  |  Peter Luo  |  RE/MAX Realtron Realty Inc., Brokerage', margin, pageH - 4);
    doc.setTextColor(100, 100, 100);
    doc.text('Page ' + i + ' of ' + totalPages, pageW - margin, pageH - 4, { align: 'right' });
  }

  const addr = document.getElementById('h_address').value || 'condo-report';
  doc.save(addr.replace(/[^a-zA-Z0-9]/g, '-') + '-feature-report.pdf');
  toast('PDF exported.');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── IndexedDB STORAGE LAYER ───────────────────
const DB_NAME = 'plCondoReportDB';
const DB_VERSION = 1;
const STORE_NAME = 'condoreport';
const DB_KEY = 'condoState';
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => { const db = e.target.result; if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME); };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = e => reject(e.target.error);
  });
}
function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function dbPut(key, val) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(STORE_NAME, 'readwrite');
    const req = tx.objectStore(STORE_NAME).put(val, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}
function dbClearStore() {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ── Auto-save (debounced) ─────────────────────
let _saveTimer = null;
function autoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    if (_db) {
      const data = { version: 3, header: gatherHeaderData(), state, customItems };
      dbPut(DB_KEY, data).catch(e => console.error('IndexedDB save error:', e));
    }
  }, 500);
}

// ── Attach auto-save to header fields ─────────
['h_address','h_type','h_floor','h_price','h_tax','h_fee','h_sqft','h_beds','h_parking','h_agent'].forEach(id => {
  const el = document.getElementById(id);
  if (el) { el.addEventListener('input', autoSave); el.addEventListener('change', autoSave); }
});
const remarksEl = document.getElementById('remarks');
if (remarksEl) remarksEl.addEventListener('input', autoSave);

// ── Attach auto-save to sections container (delegation covers all dynamic items) ──
document.getElementById('sections-container').addEventListener('input', autoSave);
document.getElementById('sections-container').addEventListener('change', autoSave);
document.getElementById('sections-container').addEventListener('click', e => {
  // Catch checkbox toggles that don't fire input/change on the container
  if (e.target.closest('.item-row') || e.target.closest('.opt')) {
    setTimeout(autoSave, 50);
  }
});

// ── INIT ──────────────────────────────────────
buildUI();

openDB().then(() => dbGet(DB_KEY)).then(saved => {
  if (saved && typeof saved === 'object' && (saved.header || saved.state)) {
    state = saved.state || {};
    customItems = saved.customItems || initCustomItems();
    buildUI();
    setHeaderData(saved.header);
  }
}).catch(err => {
  console.error('IndexedDB init failed:', err);
});
</script>
</body>
</html>
