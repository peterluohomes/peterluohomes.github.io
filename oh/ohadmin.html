<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Open House Admin — Pinnacle Listing System</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2b4a;--navy2:#243560;--navy3:#0f1d33;
  --gold:#c9a84c;--gold2:#e0c070;--gold-dim:rgba(201,168,76,0.12);
  --cream:#faf6ee;--cream2:#f0e8d5;--border:#ddd3bc;
  --text:#2c2c2c;--muted:#888;--faint:#bbb;
  --surface:#fff;--radius:12px;
  --green:#2e7d50;--red:#c0392b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;min-height:100dvh;overscroll-behavior:none}

/* ── Header ── */
.header{background:linear-gradient(135deg,var(--navy3) 0%,var(--navy) 60%,var(--navy2) 100%);padding:20px 20px 18px;text-align:center;position:relative;overflow:hidden;flex-shrink:0}
.header::before{content:'';position:absolute;top:-50%;right:-15%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.1) 0%,transparent 70%);pointer-events:none}
.header-badge{display:inline-block;font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,0.35);padding:3px 12px;border-radius:20px;margin-bottom:8px}
.header h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);line-height:1.1;margin-bottom:2px}
.header p{font-size:12px;color:rgba(250,246,238,0.45);letter-spacing:0.5px}

/* ── Auth Bar ── */
.auth-bar{background:var(--navy);border-bottom:2px solid rgba(201,168,76,0.2);padding:12px 16px;display:flex;gap:10px;align-items:center;flex-shrink:0}
.auth-bar label{font-size:12px;font-weight:600;color:var(--gold);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.auth-bar input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:8px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--cream);outline:none}
.auth-bar input::placeholder{color:rgba(250,246,238,0.3)}
.auth-bar input:focus{border-color:var(--gold)}

/* ── Main ── */
.main{flex:1;padding:16px;max-width:700px;width:100%;margin:0 auto;overflow-y:auto;padding-bottom:100px}

/* ── Slot Card ── */
.slot{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;transition:box-shadow 0.2s}
.slot.has-data{border-left:4px solid var(--green)}
.slot-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;-webkit-user-select:none}
.slot-num{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--navy);width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--gold-dim);border-radius:8px;flex-shrink:0}
.slot-summary{flex:1;margin-left:12px;min-width:0}
.slot-addr{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-agent{font-size:12px;color:var(--muted);margin-top:1px}
.slot-empty{font-size:14px;color:var(--faint);font-style:italic}
.slot-chevron{font-size:18px;color:var(--faint);transition:transform 0.25s;flex-shrink:0;margin-left:8px}
.slot.open .slot-chevron{transform:rotate(180deg)}

.slot-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.slot.open .slot-body{display:block}

/* ── Fields inside slot ── */
.fg{margin-bottom:12px}
.fg:last-child{margin-bottom:0}
.fg-lbl{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;display:block}
.fg-inp{width:100%;border:2px solid var(--border);border-radius:8px;background:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);padding:10px 12px;outline:none;transition:border-color 0.2s}
.fg-inp:focus{border-color:var(--gold)}
.fg-inp::placeholder{color:#b0a898}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fg-area{resize:none;min-height:60px;line-height:1.5}
.fg-charcount{font-size:11px;color:var(--muted);text-align:right;margin-top:2px}
.fg-charcount.over{color:var(--red);font-weight:700}

.slot-section-lbl{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);margin:16px 0 8px;padding-top:12px;border-top:1px dashed var(--border)}

.slot-actions{display:flex;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.btn-clear{flex:1;padding:10px;background:var(--cream);border:2px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--red);cursor:pointer;transition:all 0.15s}
.btn-clear:hover{border-color:var(--red);background:rgba(192,57,43,0.05)}

/* ── Bottom Bar ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:2px solid rgba(201,168,76,0.25);padding:12px 16px;display:flex;gap:10px;z-index:100}
.btn-save{flex:1;padding:14px;background:var(--navy2);border:2px solid var(--gold);border-radius:var(--radius);color:var(--gold);font-family:'Playfair Display',serif;font-size:18px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;position:relative;text-align:center}
.btn-save:hover{background:var(--navy)}
.btn-save:active{transform:scale(0.98)}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}
.btn-save .spinner{display:none;width:20px;height:20px;border:3px solid rgba(201,168,76,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto}
.btn-save.loading .btn-text{display:none}
.btn-save.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

.btn-load{padding:14px 20px;background:none;border:2px solid rgba(201,168,76,0.3);border-radius:var(--radius);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn-load:hover{border-color:var(--gold);background:rgba(201,168,76,0.08)}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);border:1px solid var(--gold);color:var(--gold);font-size:14px;font-weight:500;padding:10px 20px;border-radius:24px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:var(--red);color:var(--red)}

/* ── Responsive ── */
@media(min-width:600px){
  .header{padding:28px 24px 24px}
  .header h1{font-size:26px}
  .main{padding:20px 24px;padding-bottom:100px}
  .slot-header{padding:16px 20px}
  .slot-body{padding:0 20px 20px}
  .fg-inp{font-size:16px}
}
</style>
</head>
<body style="display:flex;flex-direction:column;min-height:100vh;min-height:100dvh">

<header class="header">
  <div class="header-badge">Pinnacle Listing System</div>
  <h1>Open House Admin</h1>
  <p>Configure properties &amp; hosting agents</p>
</header>

<div class="auth-bar">
  <label>GitHub Token</label>
  <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
</div>

<div class="main" id="main"></div>

<div class="bottom-bar">
  <button class="btn-load" id="btn-load" onclick="loadFromGitHub()">↓ Load</button>
  <button class="btn-save" id="btn-save" onclick="saveToGitHub()">
    <span class="btn-text">Save to GitHub →</span>
    <div class="spinner"></div>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
var GH_OWNER = 'peterluohomes';
var GH_REPO  = 'oh';
var GH_FILE  = 'ohconfig.json';
var GH_BRANCH = 'main';
var MAX_SLOTS = 10;
var MAX_FEAT_CHARS = 350;

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
var slots = [];
for(var i=0;i<MAX_SLOTS;i++){
  slots.push({
    address:'', lotSize:'', sqft:'', yearBuilt:'', tax:'', features:'',
    listingUrl:'', virtualTourUrl:'',
    agentName:'', agentPhone:'', agentEmail:''
  });
}
var fileSha = null; // needed for GitHub update

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  var html = '';
  for(var i=0;i<MAX_SLOTS;i++){
    var s = slots[i];
    var hasData = !!(s.address && s.address.trim());
    var num = i+1;
    html += '<div class="slot'+(hasData?' has-data':'')+'" id="slot-'+i+'">';
    html += '<div class="slot-header" onclick="toggleSlot('+i+')">';
    html += '<div class="slot-num">'+num+'</div>';
    html += '<div class="slot-summary">';
    if(hasData){
      html += '<div class="slot-addr">'+esc(s.address)+'</div>';
      html += '<div class="slot-agent">'+(s.agentName?esc(s.agentName):'No agent assigned')+'</div>';
    } else {
      html += '<div class="slot-empty">Empty — tap to configure</div>';
    }
    html += '</div>';
    html += '<div class="slot-chevron">▾</div>';
    html += '</div>';

    html += '<div class="slot-body">';

    // Property fields
    html += fg('Address *','text',i,'address',s.address,'123 Main Street, Toronto');
    html += '<div class="fg-row">';
    html += fg('Lot Size','text',i,'lotSize',s.lotSize,'30 × 120 Ft');
    html += fg('Square Footage','text',i,'sqft',s.sqft,'2,450 SQFT');
    html += '</div>';
    html += '<div class="fg-row">';
    html += fg('Year Built','text',i,'yearBuilt',s.yearBuilt,'2005');
    html += fg('Property Tax','text',i,'tax',s.tax,'$4,200');
    html += '</div>';

    // Features textarea with char count
    html += '<div class="fg">';
    html += '<label class="fg-lbl">Features (max '+MAX_FEAT_CHARS+' chars)</label>';
    html += '<textarea class="fg-inp fg-area" id="f-'+i+'-features" placeholder="Renovated kitchen. South-facing yard. Steps to subway." oninput="updateFeat('+i+')" maxlength="'+MAX_FEAT_CHARS+'">'+esc(s.features)+'</textarea>';
    html += '<div class="fg-charcount" id="cc-'+i+'">'+(s.features?s.features.length:0)+'/'+MAX_FEAT_CHARS+'</div>';
    html += '</div>';

    // URL fields
    html += '<div class="slot-section-lbl">Listing Links</div>';
    html += fgUrl('MLS Listing URL','url',i,'listingUrl',s.listingUrl,'https://realtor.ca/listing...',60);
    html += fgUrl('Virtual Tour URL','url',i,'virtualTourUrl',s.virtualTourUrl,'https://my.matterport.com/...',60);

    // Agent section
    html += '<div class="slot-section-lbl">Hosting Agent</div>';
    html += fg('Agent Name','text',i,'agentName',s.agentName,'Peter Luo');
    html += '<div class="fg-row">';
    html += fg('Agent Phone','tel',i,'agentPhone',s.agentPhone,'647-824-3718');
    html += fg('Agent Email','email',i,'agentEmail',s.agentEmail,'agent@example.com');
    html += '</div>';

    // Actions
    html += '<div class="slot-actions">';
    html += '<button class="btn-clear" onclick="clearSlot('+i+')">Clear Slot #'+num+'</button>';
    html += '</div>';

    html += '</div>'; // slot-body
    html += '</div>'; // slot
  }
  document.getElementById('main').innerHTML = html;
}

function fg(label,type,slotIdx,field,value,placeholder){
  return '<div class="fg">'
    +'<label class="fg-lbl">'+label+'</label>'
    +'<input class="fg-inp" type="'+type+'" id="f-'+slotIdx+'-'+field+'" value="'+escAttr(value||'')+'" placeholder="'+esc(placeholder||'')+'" oninput="updateField('+slotIdx+',\''+field+'\',this.value)">'
    +'</div>';
}

function fgUrl(label,type,slotIdx,field,value,placeholder,maxLen){
  var len = (value||'').length;
  return '<div class="fg">'
    +'<label class="fg-lbl">'+label+' (max '+maxLen+' chars)</label>'
    +'<input class="fg-inp" type="'+type+'" id="f-'+slotIdx+'-'+field+'" value="'+escAttr(value||'')+'" placeholder="'+esc(placeholder||'')+'" maxlength="'+maxLen+'" oninput="updateUrlField('+slotIdx+',\''+field+'\',this.value,'+maxLen+')">'
    +'<div class="fg-charcount" id="uc-'+slotIdx+'-'+field+'">'+len+'/'+maxLen+'</div>'
    +'</div>';
}

function toggleSlot(i){
  var el = document.getElementById('slot-'+i);
  el.classList.toggle('open');
}

function updateField(i,field,val){
  slots[i][field] = val;
  // Update summary in header
  var slotEl = document.getElementById('slot-'+i);
  var hasData = !!(slots[i].address && slots[i].address.trim());
  slotEl.classList.toggle('has-data', hasData);
  var summary = slotEl.querySelector('.slot-summary');
  if(hasData){
    summary.innerHTML = '<div class="slot-addr">'+esc(slots[i].address)+'</div>'
      +'<div class="slot-agent">'+(slots[i].agentName?esc(slots[i].agentName):'No agent assigned')+'</div>';
  } else {
    summary.innerHTML = '<div class="slot-empty">Empty — tap to configure</div>';
  }
}

function updateUrlField(i,field,val,maxLen){
  slots[i][field] = val;
  var cc = document.getElementById('uc-'+i+'-'+field);
  var len = val.length;
  cc.textContent = len+'/'+maxLen;
  cc.classList.toggle('over', len >= maxLen);
}

function updateFeat(i){
  var el = document.getElementById('f-'+i+'-features');
  slots[i].features = el.value;
  var cc = document.getElementById('cc-'+i);
  var len = el.value.length;
  cc.textContent = len+'/'+MAX_FEAT_CHARS;
  cc.classList.toggle('over', len >= MAX_FEAT_CHARS);
}

function clearSlot(i){
  if(!confirm('Clear all data for slot #'+(i+1)+'?')) return;
  slots[i] = {address:'',lotSize:'',sqft:'',yearBuilt:'',tax:'',features:'',listingUrl:'',virtualTourUrl:'',agentName:'',agentPhone:'',agentEmail:''};
  render();
  showToast('Slot #'+(i+1)+' cleared');
}

// ═══════════════════════════════════════════════════════════
// GITHUB API
// ═══════════════════════════════════════════════════════════
function getToken(){
  var t = document.getElementById('gh-token').value.trim();
  if(!t){ showToast('Enter your GitHub token first','error'); return null; }
  return t;
}

function apiUrl(){
  return 'https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE+'?ref='+GH_BRANCH;
}

function loadFromGitHub(){
  var token = getToken();
  if(!token) return;

  showToast('Loading config…');
  fetch(apiUrl(),{
    headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}
  })
  .then(function(r){
    if(r.status===404){ showToast('No config file found — starting fresh'); return null; }
    if(!r.ok) throw new Error('GitHub API error: '+r.status);
    return r.json();
  })
  .then(function(data){
    if(!data) return;
    fileSha = data.sha;
    var content = atob(data.content.replace(/\n/g,''));
    var config = JSON.parse(content);
    if(Array.isArray(config.properties)){
      for(var i=0;i<MAX_SLOTS;i++){
        if(config.properties[i]){
          slots[i] = Object.assign({address:'',lotSize:'',sqft:'',yearBuilt:'',tax:'',features:'',listingUrl:'',virtualTourUrl:'',agentName:'',agentPhone:'',agentEmail:''}, config.properties[i]);
        } else {
          slots[i] = {address:'',lotSize:'',sqft:'',yearBuilt:'',tax:'',features:'',listingUrl:'',virtualTourUrl:'',agentName:'',agentPhone:'',agentEmail:''};
        }
      }
    }
    render();
    showToast('Config loaded ✓');
  })
  .catch(function(err){
    console.error(err);
    showToast('Load failed: '+err.message,'error');
  });
}

function saveToGitHub(){
  var token = getToken();
  if(!token) return;

  // Validate — at least check features length and URL lengths
  for(var i=0;i<MAX_SLOTS;i++){
    if(slots[i].features && slots[i].features.length > MAX_FEAT_CHARS){
      showToast('Slot #'+(i+1)+' features exceeds '+MAX_FEAT_CHARS+' chars','error');
      return;
    }
    if(slots[i].listingUrl && slots[i].listingUrl.length > 60){
      showToast('Slot #'+(i+1)+' listing URL exceeds 60 chars','error');
      return;
    }
    if(slots[i].virtualTourUrl && slots[i].virtualTourUrl.length > 60){
      showToast('Slot #'+(i+1)+' virtual tour URL exceeds 60 chars','error');
      return;
    }
  }

  var config = {
    updated: new Date().toISOString(),
    properties: slots
  };

  var json = JSON.stringify(config, null, 2);
  var base64 = btoa(unescape(encodeURIComponent(json)));

  var body = {
    message: 'Update open house config — '+new Date().toLocaleString(),
    content: base64,
    branch: GH_BRANCH
  };
  if(fileSha) body.sha = fileSha;

  var btn = document.getElementById('btn-save');
  btn.classList.add('loading');
  btn.disabled = true;

  fetch(apiUrl().split('?')[0],{
    method:'PUT',
    headers:{
      'Authorization':'Bearer '+token,
      'Accept':'application/vnd.github.v3+json',
      'Content-Type':'application/json'
    },
    body: JSON.stringify(body)
  })
  .then(function(r){
    if(!r.ok) return r.json().then(function(d){throw new Error(d.message||'API error '+r.status);});
    return r.json();
  })
  .then(function(data){
    fileSha = data.content.sha;
    btn.classList.remove('loading');
    btn.disabled = false;
    showToast('Saved to GitHub ✓');
  })
  .catch(function(err){
    btn.classList.remove('loading');
    btn.disabled = false;
    console.error(err);
    showToast('Save failed: '+err.message,'error');
  });
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var toastTimer;
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(type==='error'?' error':'')+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('show');},3500);
}

// ── Init ──
render();
</script>
</body>
</html>
