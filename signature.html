<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Peter Luo - Real Estate Broker at RE/MAX Realtron Realty Inc., Brokerage">
    <meta name="author" content="Peter Luo">
    <title>Peter Luo | Real Estate Broker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;700&display=swap');
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .signature {
            max-width: 620px;
            background-color: #1f1f1f;
            border-radius: 10px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .headshot {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 3px solid #000000;
        }
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .info { flex: 1; }
        .name {
            color: #e60000;
            font-size: 32px;
            font-weight: bold;
            margin: 0 0 4px 0;
        }
        .company {
            color: #00aaff;
            font-size: 17px;
            margin-bottom: 22px;
        }
        .contact {
            margin-bottom: 12px;
            font-size: 15.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .contact a {
            color: #00aaff;
            text-decoration: none;
        }
        .contact a:hover { text-decoration: underline; }
        .address {
            margin-top: 18px;
            font-size: 14.5px;
            color: #aaaaaa;
        }
        .remax-logo {
            height: 55px;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="signature">
        <!-- Logo container: headshot + realtron logo below it, centered -->
        <div class="logo-container">
            <img src="logo.png" alt="Peter Luo" class="headshot" 
                 onerror="this.src='https://via.placeholder.com/160?text=Peter+Luo';">
            
            <img src="realtron.jpg" alt="RE/MAX Realtron" class="remax-logo" 
                 onerror="this.style.display='none';">
        </div>
        
        <div class="info">
            <h1 class="name">
                <span style="color: #DC1C2E;">Peter</span> 
                <span style="color: #003DA5;">Luo</span>
            </h1>

            <p class="company">
                <span style="color: #DC1C2E;">RE</span>
                <span style="color: #003DA5;">/</span>
                <span style="color: #DC1C2E;">MAX</span>
                <span style="color: #003DA5;"> Realtron Realty Inc., Brokerage</span>
            </p>
            
            <div class="contact">
                <span style="color: #000000; font-size: 18px;">✆</span> 
                <a href="tel:+16478243718">(647) 824-3718</a>
            </div>
            <div class="contact">
                <span style="color: #000000; font-size: 18px;">✉️</span> 
                <a href="mailto:peterluo@peterluo.com">peterluo@peterluo.com</a>
            </div>
            <div class="contact">
                <span style="color: #000000; font-size: 18px;">🌐</span> 
                <a href="https://peterluo.com" target="_blank">peterluo.com</a> • 
                <a href="https://peterluo.homes" target="_blank">peterluo.homes</a>
            </div>
            <div class="contact">
                <span style="color: #000000; font-size: 18px;">📍</span> 
                505 Hwy 7 E, PH01, Thornhill, ON L3T 7T1
            </div>
        </div>
    </div>
</body>
</html>
