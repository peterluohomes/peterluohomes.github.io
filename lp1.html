<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Listing Presentation EN</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f7f5f0; --white: #ffffff; --border: #e0dbd0; --bg2: #eeebe3;
  --gold-bg: #fdf6e3; --gold-border: #e8d5a0; --gold-tag: #a07820;
  --warm-dark: #5a4a2a; --navy: #1b3a6b; --light: #aaaaaa; --mid: #777777;
  --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
  --safe-left: env(safe-area-inset-left,0px); --safe-right: env(safe-area-inset-right,0px);
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: var(--bg); min-height: 100vh;
  padding-top: var(--safe-top); padding-left: var(--safe-left);
  padding-right: var(--safe-right); padding-bottom: calc(40px + var(--safe-bottom));
  display: flex; flex-direction: column;
}
header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 20px 24px 16px; text-align: center;
}
.header-title { font-size: 22px; font-weight: 700; color: var(--warm-dark); line-height: 1.2; }
main { flex: 1; padding: 20px 18px 0; max-width: 500px; margin: 0 auto; width: 100%; }
.tool-pair { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 12px; }
.tool-item {
  display: flex; align-items: center; gap: 16px; padding: 16px 20px;
  border-bottom: 1px solid var(--border); text-decoration: none; color: inherit;
  min-height: 68px; -webkit-user-select: none; user-select: none;
}
.tool-icon {
  width: 44px; height: 44px; border-radius: 12px; background: var(--gold-bg);
  border: 1px solid var(--gold-border); display: flex; align-items: center;
  justify-content: center; font-size: 20px; flex-shrink: 0;
}
.tool-info { flex: 1; min-width: 0; }
.tool-name { font-size: 16px; font-weight: 600; color: var(--warm-dark); line-height: 1.3; }
#pos-pill {
  display: inline-block; margin-top: 4px;
  font-size: 11px; font-weight: 700; color: var(--navy);
  background: #eef2fb; border: 1px solid #c8d6f0;
  padding: 2px 9px; border-radius: 8px;
}
#audio-stats { font-size: 12px; color: var(--light); margin-top: 3px; }
#play-btn {
  width: 100%; padding: 12px;
  background: var(--navy); color: #fff;
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.03em;
}
#play-btn:active { opacity: 0.8; }
#lpen-audio { width: 100%; height: 36px; accent-color: var(--navy); margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="header-title">Listing Presentation EN</div>
</header>

<main>
  <div class="tool-pair">
    <div class="tool-item" style="gap:16px; flex-direction:column; align-items:flex-start;">

      <div style="display:flex; align-items:center; gap:16px; width:100%;">
        <div class="tool-icon">🎙️</div>
        <div class="tool-info">
          <div class="tool-name">Voice</div>
          <div id="pos-pill">Saved position: 0:00</div>
          <div id="audio-stats">Loading stats…</div>
        </div>
        <button onclick="resetStats()" title="Reset stats"
          style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--light);padding:4px;flex-shrink:0;">↺</button>
      </div>

      <button id="play-btn" onclick="tapPlay()">▶ Play from saved position</button>

      <audio id="lpen-audio" loop controls controlsList="nodownload">
        <source src="./mp3/lpen.mp3" type="audio/mpeg">
      </audio>

    </div>
  </div>
</main>

<script>
(function () {
  const STORE_KEY = 'lpen_stats';
  const POS_KEY   = 'lpen_pos';
  const audio     = document.getElementById('lpen-audio');
  const statsEl   = document.getElementById('audio-stats');
  const posPill   = document.getElementById('pos-pill');
  const playBtn   = document.getElementById('play-btn');

  // ── Persisted stats ──────────────────────────────────────────────────────
  let stats = JSON.parse(localStorage.getItem(STORE_KEY) || '{"plays":0,"totalSec":0}');

  // ── Tracking state ───────────────────────────────────────────────────────
  //
  // STRATEGY: hybrid currentTime-delta + wall-clock gap recovery.
  //
  // Normal playback (screen on):
  //   timeupdate fires ~4x/s. We diff audio.currentTime tick-to-tick.
  //   Small forward deltas (≤ MAX_CT_DELTA) = real audio → accumulate.
  //   Large jumps (seeks, loop-wraps) = ignored.
  //
  // Screen-off / tab-hidden (iOS throttles or stops timeupdate):
  //   On visibilitychange/focus restore, we compare wall-clock elapsed vs
  //   currentTime elapsed and take the MINIMUM, capped at MAX_GAP_SEC.
  //   This recovers screen-off time without inflating on seeks.
  //
  let prevAudioTime = null;
  let prevWallTime  = null;
  let wasPlaying    = false;  // guards play-counter against resume double-count
  let seekPending   = false;
  let unsavedSec    = 0;

  const MAX_CT_DELTA = 1.5;    // currentTime jump larger than this = seek/loop
  const MAX_GAP_SEC  = 7200;   // sanity cap: never credit more than 2 h in one gap
  const SAVE_EVERY   = 5;      // flush localStorage every N seconds

  // ── Helpers ──────────────────────────────────────────────────────────────
  function fmtTime(sec) {
    sec = Math.floor(sec);
    if (sec < 60) return sec + 's';
    const m = Math.floor(sec / 60), s = sec % 60;
    if (m < 60) return m + 'm ' + (s ? s + 's' : '');
    const h = Math.floor(m / 60), rm = m % 60;
    return h + 'h ' + (rm ? rm + 'm' : '');
  }

  function fmtPos(sec) {
    sec = Math.floor(sec);
    const m = Math.floor(sec / 60), s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function renderStats() {
    statsEl.textContent =
      '▶ ' + stats.plays + (stats.plays === 1 ? ' play' : ' plays') +
      ' · ⏱ ' + fmtTime(stats.totalSec) + ' total';
  }

  function saveStats() {
    localStorage.setItem(STORE_KEY, JSON.stringify(stats));
  }

  function addTime(sec) {
    if (sec <= 0) return;
    stats.totalSec += sec;
    unsavedSec += sec;
    renderStats();
    if (unsavedSec >= SAVE_EVERY) {
      unsavedSec = 0;
      saveStats();
    }
  }

  // ── Position memory ──────────────────────────────────────────────────────
  function savePos() {
    const pos = audio.currentTime;
    if (pos > 0) {
      localStorage.setItem(POS_KEY, pos.toFixed(2));
      posPill.textContent = 'Saved position: ' + fmtPos(pos);
      playBtn.textContent = '▶ Play from ' + fmtPos(pos);
    }
  }

  const savedPos = parseFloat(localStorage.getItem(POS_KEY) || '0');
  if (savedPos > 0) {
    posPill.textContent = 'Saved position: ' + fmtPos(savedPos);
    playBtn.textContent = '▶ Play from ' + fmtPos(savedPos);
    seekPending = true;
  }

  // ── tapPlay — seek must be inside the user-gesture on iOS ────────────────
  window.tapPlay = function () {
    if (seekPending) {
      audio.currentTime = savedPos;
      seekPending = false;
    }
    audio.play();
    playBtn.textContent = '▶ Playing…';
  };

  // ── Core: timeupdate ─────────────────────────────────────────────────────
  let lastPosSave = 0;

  audio.addEventListener('timeupdate', () => {
    const wallNow = Date.now();

    // Position save every 3 s
    if (wallNow - lastPosSave >= 3000) {
      savePos();
      lastPosSave = wallNow;
    }

    if (audio.paused) return;

    const ctNow = audio.currentTime;

    if (prevAudioTime !== null && prevWallTime !== null) {
      const ctDelta   = ctNow - prevAudioTime;
      const wallDelta = (wallNow - prevWallTime) / 1000;

      if (ctDelta > 0 && ctDelta <= MAX_CT_DELTA) {
        // Normal tick — screen on, timeupdate firing regularly
        addTime(ctDelta);
      } else if (wallDelta > MAX_CT_DELTA && wallDelta <= MAX_GAP_SEC) {
        // Gap detected (screen-off / throttled).
        // Take min(wallDelta, ctGap) — don't over-count a seek.
        const ctGap = Math.abs(ctDelta);
        addTime(Math.min(wallDelta, ctGap > 0 ? ctGap : wallDelta));
      }
      // Negative/zero ctDelta with small wallDelta = loop-wrap or stall; skip.
    }

    prevAudioTime = ctNow;
    prevWallTime  = wallNow;
  });

  // Seeking resets both anchors so the position gap isn't counted
  audio.addEventListener('seeked', () => {
    prevAudioTime = audio.currentTime;
    prevWallTime  = Date.now();
  });

  // ── Recover gap when screen turns back on ────────────────────────────────
  function recoverGap() {
    if (audio.paused || prevWallTime === null) return;
    const wallDelta = (Date.now() - prevWallTime) / 1000;
    if (wallDelta > MAX_CT_DELTA && wallDelta <= MAX_GAP_SEC) {
      addTime(wallDelta);
      saveStats();
    }
    // Reset anchors; next timeupdate re-establishes them
    prevAudioTime = null;
    prevWallTime  = null;
  }

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) recoverGap();
    else flushAll();
  });
  window.addEventListener('focus', recoverGap);

  // ── Play event ───────────────────────────────────────────────────────────
  audio.addEventListener('play', () => {
    if (!wasPlaying) {
      stats.plays++;
      saveStats();
      renderStats();
    }
    wasPlaying    = true;
    prevAudioTime = audio.currentTime;
    prevWallTime  = Date.now();
  });

  // ── Flush on pause / end / hide ──────────────────────────────────────────
  function flushAll() {
    savePos();
    prevAudioTime = null;
    prevWallTime  = null;
    wasPlaying    = false;
    unsavedSec    = 0;
    saveStats();
    renderStats();
  }

  audio.addEventListener('pause', () => {
    flushAll();
    playBtn.textContent = audio.currentTime > 0
      ? '▶ Play from ' + fmtPos(audio.currentTime)
      : '▶ Play from saved position';
  });

  audio.addEventListener('ended', () => {
    localStorage.removeItem(POS_KEY);
    posPill.textContent = 'Saved position: 0:00';
    playBtn.textContent = '▶ Play from saved position';
    seekPending = false;
    flushAll();
  });

  window.addEventListener('pagehide', flushAll);
  window.addEventListener('blur', flushAll);

  // ── Reset ────────────────────────────────────────────────────────────────
  window.resetStats = function () {
    if (!confirm('Reset play stats and saved position?')) return;
    stats = { plays: 0, totalSec: 0 };
    localStorage.removeItem(POS_KEY);
    audio.currentTime = 0;
    seekPending   = false;
    prevAudioTime = null;
    prevWallTime  = null;
    wasPlaying    = false;
    unsavedSec    = 0;
    posPill.textContent = 'Saved position: 0:00';
    playBtn.textContent = '▶ Play from saved position';
    saveStats();
    renderStats();
  };

  renderStats();
})();
</script>
</body>
</html>
