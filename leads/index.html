<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Lead Flow</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f7f5f0; --white: #ffffff; --border: #e0dbd0; --bg2: #eeebe3;
  --gold-bg: #fdf6e3; --gold-border: #e8d5a0; --gold-tag: #a07820;
  --warm-dark: #5a4a2a; --navy: #1b3a6b; --light: #aaaaaa; --mid: #777777;
  --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
  --safe-left: env(safe-area-inset-left,0px); --safe-right: env(safe-area-inset-right,0px);
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: var(--bg); min-height: 100vh;
  padding-top: var(--safe-top); padding-left: var(--safe-left);
  padding-right: var(--safe-right); padding-bottom: calc(40px + var(--safe-bottom));
  display: flex; flex-direction: column;
}
header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 20px 24px 16px; text-align: center;
}
.header-title { font-size: 22px; font-weight: 700; color: var(--warm-dark); line-height: 1.2; }
main { flex: 1; padding: 20px 18px 0; max-width: 500px; margin: 0 auto; width: 100%; }
.section-label {
  font-size: 12px; font-weight: 700; color: var(--light); text-transform: uppercase;
  letter-spacing: .1em; margin-bottom: 10px; margin-top: 20px; padding-left: 4px;
  display: flex; align-items: center; gap: 8px;
}
.section-label:first-of-type { margin-top: 0; }
.section-pill { background: var(--warm-dark); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.tool-pair { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 12px; }
.tool-item {
  display: flex; align-items: center; gap: 16px; padding: 16px 20px;
  border-bottom: 1px solid var(--border); text-decoration: none; color: inherit;
  min-height: 68px; -webkit-user-select: none; user-select: none;
}
.tool-item:active { background: var(--gold-bg); }
.tool-icon {
  width: 44px; height: 44px; border-radius: 12px; background: var(--gold-bg);
  border: 1px solid var(--gold-border); display: flex; align-items: center;
  justify-content: center; font-size: 20px; flex-shrink: 0;
}
.tool-info { flex: 1; min-width: 0; }
.tool-name { font-size: 16px; font-weight: 600; color: var(--warm-dark); line-height: 1.3; }
.tool-desc { font-size: 13px; color: var(--light); margin-top: 3px; line-height: 1.4; }
.tool-arrow { font-size: 20px; color: var(--light); flex-shrink: 0; font-weight: 300; }
.obj-item {
  display: flex; align-items: center; gap: 14px; padding: 13px 20px;
  text-decoration: none; color: inherit; background: var(--bg2);
  -webkit-user-select: none; user-select: none;
}
.obj-item:active { background: var(--gold-bg); }
.obj-badge {
  font-size: 10px; font-weight: 700; color: var(--gold-tag); background: var(--gold-bg);
  border: 1px solid var(--gold-border); padding: 3px 9px; border-radius: 8px;
  white-space: nowrap; flex-shrink: 0;
}
.obj-info { flex: 1; min-width: 0; }
.obj-name { font-size: 14px; font-weight: 600; color: var(--mid); line-height: 1.3; }
.obj-desc { font-size: 12px; color: var(--light); margin-top: 2px; }
.obj-arrow { font-size: 18px; color: var(--light); flex-shrink: 0; }
.lang-item {
  display: flex; align-items: center; gap: 14px; padding: 13px 20px;
  text-decoration: none; color: inherit; border-bottom: 1px solid var(--border);
  background: var(--bg2); -webkit-user-select: none; user-select: none;
}
.lang-item:last-child { border-bottom: none; }
.lang-item:active { background: var(--gold-bg); }
.lang-flag {
  font-size: 10px; font-weight: 700; color: var(--navy); background: #eef2fb;
  border: 1px solid #c8d6f0; padding: 3px 9px; border-radius: 8px;
  white-space: nowrap; flex-shrink: 0;
}
.lang-info { flex: 1; }
.lang-name { font-size: 14px; font-weight: 600; color: var(--mid); }
.lang-desc { font-size: 12px; color: var(--light); margin-top: 2px; }
.lang-arrow { font-size: 18px; color: var(--light); flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="header-title">Lead Flow</div>
</header>

<main>

  <div class="tool-pair">

    <!-- DOOR KNOCKING -->
    <a class="lang-item" href="./doorknock">
      <div class="lang-info">
        <div class="lang-name">Door Knocking</div>
      </div>
      <span class="lang-arrow">›</span>
    </a>

    <!-- LEAD FOLLOW-UP -->
    <a class="lang-item" href="./followup">
      <div class="lang-info">
        <div class="lang-name">Lead Follow-up</div>
      </div>
      <span class="lang-arrow">›</span>
    </a>

    <!-- EXPIRED LISTING -->
    <a class="lang-item" href="./expired">
      <div class="lang-info">
        <div class="lang-name">Expired Listing</div>
      </div>
      <span class="lang-arrow">›</span>
    </a>

    <!-- FUTURE ITEM 2 -->
    <a class="lang-item" href="" style="border-bottom:none;">
      <div class="lang-info">
        <div class="lang-name">Future item</div>
      </div>
      <span class="lang-arrow">›</span>
    </a>
  </div>

</main>

</body>
</html>
